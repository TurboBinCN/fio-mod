PriyUtils=PriyUtils

[mod-description]
PriyUtils=常用mod集合，包括装备小型化、水泵速度调高、挖井和机械爪能力速度功能

[mod-setting-name]
priyutils-mining-drill-output-speed-factor=采矿机：速度倍数
priyutils-mining-drill-mining-area-size=采矿机：区域大小倍数
priyutils-pumpjack-output-speed-factor=抽油机：速度倍数
priyutils-extra-module-slots=额外模块槽数量
priyutils-parameter-change-exclusions=手动排除列表

[mod-setting-description]
priyutils-mining-drill-output-speed-factor=将所有采矿机的采矿速度乘以该倍数（范围：0.01-120）。
priyutils-mining-drill-mining-area-size=将所有采矿机的采矿区域大小乘以该倍数（范围：1-32）。
priyutils-pumpjack-output-speed-factor=将所有抽油机的抽取速率乘以该倍数（范围：0.01-100）。
priyutils-extra-module-slots=增加所有采矿机和抽油机的模块槽数量（范围：0-20，上限20，仅适用于已有至少1个槽位的设备）。
priyutils-parameter-change-exclusions=通过将实体ID写入逗号分隔列表来排除钻机被修改。可以使用前缀 [color=yellow]s[/color]、[color=yellow]a[/color]、[color=yellow]m[/color] + 冒号来仅排除速度、区域大小或模块槽。\n[color=blue]示例：[/color] burner-mining-drill,sa:omega-drill

