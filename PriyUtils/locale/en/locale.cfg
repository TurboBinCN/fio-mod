[mod-setting-description]
priyutils-mining-drill-output-speed-factor=Multiplies the mining speed of all mining drills by this factor (range: 0.01-120).
priyutils-mining-drill-mining-area-size=Multiplies mining area size of all mining drills by this factor, with a few deliberate exclusions (range: 1-32).
priyutils-pumpjack-output-speed-factor=Multiplies the extraction rate of all pumpjacks by this factor (range: 0.01-100).
priyutils-extra-module-slots=Increases the current number of module slots for all mining drills and pumpjacks by this amount (range: 0-20, capped at 20, applies only if there is 1 slot already).
priyutils-parameter-change-exclusions=Exclude a drill from being changed by writing its entity ID to a comma-separated list. May receive the prefixes [color=yellow]s[/color], [color=yellow]a[/color], [color=yellow]m[/color] + colon to exclude only speed, area size or module slots.\n[color=blue]Example:[/color] burner-mining-drill,sa:omega-drill

