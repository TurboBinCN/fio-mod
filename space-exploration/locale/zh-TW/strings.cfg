page_space_exploration_text_1=歡迎來到 Space Exploration－太空探索。模組已經有許多內容，但它仍處於 [font=default-bold]開發中[/font] 階段，並且正在逐步修訂中。可能存在有些錯誤。\n\n[font=heading-2][color=#ffe6c0]開發中狀態？[/color][/font]\n太空探索仍在修訂當中，我將所有時間都投入到關鍵功能的開發中，而犧牲了模組相容性。 [color=red]除了必需和推薦的模組之外，不建議使用其他模組進行遊戲。[/color]\n\n處於開發中狀態時：如果模組導致遊戲/保存狀態損壞、崩潰、科技樹無效或核心玩法等問題，它將很快被標記為不相容，以保護新玩家。這意味著如果您使用了很多模組，那麼很可能其中一個模組稍後會因為您尚未發現的問題而被標記為不相容。當然，您可以自由編輯您的 info.json 檔案來嘗試不相容的模組，但您需要自行承擔風險：如果您的遊戲狀態因此而無法播放，我將無法幫助您。\n\n太空探索在維基上還有一些與 mod 相容性相關的附加資訊。\n\n[font=heading-2][color=#ffe6c0]推薦模組[/color][/font]\n (以下推薦你們參考，尤其是大範圍模組化生產的玩家．)\n• Module Inserter. 允許您從衛星視圖將模組放入機器中。\n• Grappling Gun.允許您跳過建築物，穿過湖泊。在太空中掉下去可以回到太空平台。（在移動時特別有用）。\n• Inserter Fuel Leech. 適用於AAI燃料機械臂階段，它讓燃料機械臂從正在收集的物品中為自己提供燃料。\n• Text Plates 允許您將文字放在地面上，用於標記行星名稱、站點名稱、太空船停靠區等。\n• Combat Mechanics Overhaul. 如果啟用「牆壁阻擋口水」選項，可以在離開星球時幫助防禦。修理城牆比修理砲塔便宜。\n• Bullet Trails. 模糊的線條表示子彈的彈道，這樣你就能看到它們射向何處，或者砲塔正在向哪個目標射擊。（看起來也很爽。）\n• Milestones. 追蹤您的里程碑以及您達成里程碑的速度。\n• FNEI or Recipe Book. 一個各種配方的瀏覽器。\n• 7 Segment Digits. 數值化監控你的目標，讓一切更加容易控制。\n• Art's Core. 別懷疑！裝了你的原礦會有不一樣色彩。\n• Auto Deconstruct. 會幫你把礦區開採完畢的採礦機標示回收，減少你的工作．\n• Better Train Behavior. 改變火車的行為，讓火車可以預知下一站的條件．應用於跳過火車站前往下一個條件．\n• Blueprint Requesters. 藍圖要多少材料？把藍圖丟在需求箱中，它就讓無人機把材料準備好．\n• Epic Artillery Sounds. 開炮！這種聲音的震撼力才讓戰場有Fu。\n• Krastorio 2 沒安裝這個大殺器，不算有玩過．\n• Fluid Must Flow for Space Exploration. 液體會消失是最大的問題，把管路變成大管，就能解決液體長途運輸消失的問題．\n• ...還有很多再開模組包來整合，或是上漢字的DC來交流。\n\n[font=heading-2][color=#ffe6c0]修改模組和作弊[/color][/font]\n獨立的太空探索需要花費70到700小時才能完成，平均約400小時。不建議使用其他修改模式，因為它們往往會破壞每個星球的資源平衡、物品物流、建築模式和遊戲進度。如果這是您第一次玩太空探索，應該避免用修改模式，否則您將不知道什麼東西損壞而導致的多米諾骨牌效應[color=red](強烈告訴宅宅們，好玩的遊戲要有耐心，猴急只會失敗．)[/color]\n如果科技樹嚴重損壞，多數修改模組都會被標記為不相容。長期目標是增加與少數精選微調模組的兼容性，確保兩者的主要機制和特性都得以保留，滿足兩者模組開發人員間的滿意。\n Krastorio 2 就是這類基本例子。[color=red](建議沒玩過太空探索的人先接觸Krastorio2，進階者可以兩者一併挑戰．)[/color]\n\n[font=heading-2][color=#ffe6c0]推薦設定[/color][/font]\n您必須啟用及安裝所有外星生物群落地形模組，否則遊戲會崩潰。\n\n除非您正在挑戰高資源型（例如高難度配方或馬拉松模式），否則不建議您的起始星球設定高資源。因為資源設定太高，就會減少擴展到其它星球的企圖心，也就只會宅在一顆星球上。\n\n[font=heading-2][color=#ffe6c0]相關網站[/color][/font]\nSpace Exploration Wiki: [color=blue]https://spaceexploration.miraheze.org [/color]\n協助和Discord群組: [color=blue]https://discord.gg/ymjUVMv [/color]\n\n我已經在這個模組上投入超過 4000 個小時開發時間。如果你喜歡它請考慮在 Patreon 上支持我： [color=blue]https://www.patreon.com/earendel [/color]\n\n漢字翻譯Discord群組在此：[color=blue]https://discord.gg/y7AXRdCQqv [/color]基於對宇宙科學的熱愛，修正許多科學上的觀點。指正及頂尖自動化模組藍圖都會在這裡發表。
menu_meteor_defence=[img=virtual-signal/se-meteor]流星雨防禦系統
title_meteor_defence=流星雨防禦
page_meteor_defence_text_1=流星雨是從天而降對其所落之處造成傷害。大多數流星雨是由太空中被撕碎的星球物質所構成的，因此某些行星都會有特殊的流星雨。流星雨會隨機襲擊大多數地區和星球。你可以在模組設定中更改襲擊的最大間隔。\n\n每場流星雨的流星數量都是隨機產生的，1顆流星雨為50%，2顆流星雨為25%，3顆流星雨為12.5%，4顆流星雨為6.25%，依此類推。\n\n流星雨防禦結構可以擊毀來襲的流星雨。它們是依排列順序發射，因此如果前方流星雨都被摧毀，後面的防禦系統就不會發射。防禦需要彈藥、充電時間、電力，額外的電力消耗並不小，因此平衡風險和成本將是玩家的決擇。\n\n[img=item/se-meteor-defence][color=#ffe6c0][font=heading-2]巨炮流星防禦裝置[/font][/color]與[img=item/se-meteor-point-defence][color=#ffe6c0][font=heading-2]區域流星防禦裝置[/font][/color]不同，區域只能保護單一有限區域有限數量免受流星雨的傷害，巨炮則能保護整顆行星免於遭受到大量流星雨的攻擊。但巨炮充電時間比區域更久，且需求的電力更大。\n\n[img=item/se-delivery-cannon-weapon-capsule] [color=#ffe6c0][font=heading-2]敵方投遞[/font][/color]\n流星雨防禦也會擊落敵對勢力發送的物質（僅限多人 PvP 模式中）。
menu_coremining=[img=item/se-core-miner-drill]核心採礦
title_coremining=核心採礦
page_coremining_text_1=核心採礦是無限資源的來源，但它需要大量電力，而且建造的越多，效率就越差。\n\n核心採礦是在核心裂縫上進行，而核心礦層只能在行星或衛星上找到。每個行星或衛星都有特定類型的核心礦產，這決定了它們擁有核心裂縫的類型，而核心裂縫則決定了它們產生的核心碎片的類型。例如銅礦行星中具有銅核裂縫，從而產生出銅碎片。開始的星球提供常見的資源裂縫，但其他星球會有單種主要類型礦產，及次要相關礦產。\n\n放置在星球上的第一個核心礦機是以100%的效率運作，但越多的額外礦機會降低星球上所有礦機的產出效率。放置額外的礦工會增加整體核心碎片的總輸出。要獲得 2 倍的總產出，你需要 2x2=4 個礦機，3x 的產出需要 3x3=9 個礦機，10x 的產出需要 10x10=100個礦機。每顆行星的核心礦層數量有限，較小的行星適合的採礦點較少。較小行星/衛星上的核心採礦總體上較慢，但較弱的重力使得更容易從地表獲取資源。\n\n在遊戲開始初期，你擁有多餘的電力，運作1個核心礦機很有幫助。如果你從小行星或小型島嶼開局的話，太陽能加上核心採礦可能是你獲得資源離開星球的唯一方法。\n\n遊戲後期從核心採礦中的獎勵會受益匪淺。最好是多個衛星上少數核心裂縫採礦，而不是幾顆星球上的許多核心礦場。\n\n[color=red](但多顆星球的後果就是要更強CPU更多的記憶體，這給不怕浩大工程的玩家們去想一想！最好都選擇衛星，否則你的存檔會很嚇人。)[/color]
menu_beacons=[img=item/se-wide-beacon-2]模塊分享塔
title_beacons=模塊分享塔
page_beacons_text_1=[color=#ffe6c0][font=heading-2]模塊分享塔過載[/font][/color][img=virtual-signal/se-beacon-overload]\n模塊分享塔過載是異星工廠中模塊機制的徹底改革。組裝機只會受到單個模塊分享塔的影響，超出的會過載並暫停生產。\n\n此次修正允許在分享塔中使用較多模塊，並在分享塔和組裝機中使用更強大的模塊，以獲得最大產量。這項更革會促進更廣泛的工廠設計。\n\n基本模塊不比模塊分享塔強大，不能將它們的效果疊加在單獨機器上，因此與普通模塊相比，可以提升強大效果。更強大的模塊分享塔能夠遠遠超過標準產量產出。\n\n從廣域角度下，玩家可以透過模組分享塔節省大量模塊，並可以圍繞影響較多範圍及多個建築物，創造複雜的流體或材料設計。\n\n受多個模塊分享塔影響的機器將標有「模塊分享塔過載」圖示並暫停所有生產。在此它們仍會消耗最小的電量。\n\n不同類型的模塊有不同的用途。基本模塊分享塔的功耗較低，因此對於節能裝置非常有用。廣域型模塊分享塔具有巨大的分享面積，可以影響更多機器。緊湊型模塊分享塔面積小，但傳輸效率高。
menu_launching_satellites=[img=item/satellite]發射衛星
title_launching_satellites=發射衛星
page_launching_satellites_text_1=你已經發射了[color=cyan]__1__[/color]衛星。\n\n[img=virtual-signal/se-remote-view][font=heading-2][color=#ffe6c0]導航衛星[/color][__CONTROL__se-remote-view__][/font]\n當你從衛星發射井將第一顆衛星發射上太空後，你可以透過按下[img=virtual-signal/se-remote-view]導航衛星視圖。或按下[__CONTROL__se-remote-view__]鍵存取此模式。在衛星視角中，你可以快速環視全局，甚至發現新區域。有些事情你無法在衛星視角中執行，例如直接放置機器或採礦。不過你可以做，例如使用藍圖、刪除裝置、預置實體、線路連接、更改機器生產類型等等。\n\n[img=se-map-gui-universe-explorer][font=heading-2][color=#ffe6c0]宇宙探索[/color][__CONTROL__se-universe-explorer__][/font]\n導航衛星還可以讓你查看其他地表，例如其他行星、衛星、小行星帶、小行星群和軌道。按[__CONTROL__se-universe-explorer__]顯示已知區域清單。然後你可以單擊「查看地表」以查看那裡有什麼東東。在嘗試航往另一顆行星之前，最好先偵察看看。\n\n發射衛星後行區域探索。\n\n[img=item/se-satellite-telemetry] [font=heading-2][color=#ffe6c0]衛星遙測[/color][/font]\n衛星發射後會返回衛星遙測數據，這是[img=item/se-rocket-science-pack]火箭科學中的重要組成部分。\n\n[img=item/se-space-probe-rocket][font=heading-2][color=#ffe6c0]太空探測器[/color][/font]\n[img=item/se-space-probe-rocket-silo]太空探測器火箭發射井設計用於太空中。它不是建造火箭，而是發射預先建造好的[img=item/se-space-probe-rocket]太空探測火箭。太空探測火箭比普通衛星火箭組件少得多，可以在製造中心進行預組裝，而不是將資源帶到火箭發射井。太空探測器火箭發射井可以廉價地發射衛星，但也可以從太空的特定位置發射更專業的探測器和收集器。
menu_pinned_locations=[img=se-pin-list-white]固定位置
title_pinned_locations=固定位置
page_pinned_locations_text_1=在解鎖[img=virtual-signal/se-remote-view]導航衛星視圖後，你可以訪問固定位置，這是一種可以在你導航過的所有地表上快速切換到工廠不同部分的功能。\n\n可以使用導航衛星視窗中的加號按鈕固定位置。當你新增或編輯固定位置時，你可以設定熱鍵。這使你可以透過按下鍵盤按鈕快速跳到重要位置，而無需通過宇宙資源管理器。\n\n[font=heading-2][color=#ffe6c0]臨時註腳[/color][/font]\n固定位置不需要透過選單進行設定。它們也可以使用「設定註腳」熱鍵進行設定。這將建立一個名稱或圖示的固定位置，但可以關聯的到「註腳位置」熱鍵立即就可以跳到該位置。\n\n[font=heading-2][color=#ffe6c0]所有Pins[/color][__CONTROL__se-remote-view-pins__][/font]\n註腳僅顯示在你所處的地表快速欄中。但是熱鍵可用於跳到另一個地表上，無論它在熱鍵欄中是否可見。如果你需要概覽所有固定位置，請按[__CONTROL__se-remote-view-pins__]以顯示所有固定位置的清單。此視圖中的註腳是根據標註所在的地表所組成。如果地表只有一個註腳，則其行將歸納到其父星的行列中。\n\n[font=heading-2][color=#ffe6c0]AAI 可程式車輛[/color][/font]使用內定和預設熱鍵可能會有衝突情況。如果你使用這兩個功能，需要調整熱鍵以獲得預期的行為。
menu_zone_discovery=[img=virtual-signal/se-planet-orbit]區域探索
title_zone_discovery=區域探索
page_zone_discovery_text_1=在這片宇宙區域中有許多恆星、行星、衛星、小行星帶和小行星群可供探索。\n\n[font=heading-2][color=#ffe6c0]導航衛星[/color][/font]\n你可以發射導航衛星來發現所在恆星系中的隨機性行星、衛星或小行星帶。如果該系統中沒有其他東西可供發現，那它還可以發現新的恆星，但無法發現環繞其他恆星運作的物體或深空中的任何物體。\n\n[font=heading-2][color=#ffe6c0]區域探索[/color][/font]\n你可以使用太空望遠鏡來尋找新的區域。這是透過「區域探索」來實現的。基本上可以隨機發現恆星、行星、衛星或小行星帶。\n\n[font=heading-2][color=#ffe6c0]鎖定區域探索[/color][/font]\n是鎖定特定區域和基礎研究相同功能，但如果你選擇了資源偏好（如下），它會尋找更有可能出現該地區的資源，因此你更有可能發現具開發的區域。請記住，在發現恆星之前無法發現行星，在發現行星之前無法發現衛星。不要指望每次都能找到你要找的東西。\n\n[font=heading-2][color=#ffe6c0]深空區域探索[/color][/font]\n深度空間區尋找感興趣的區域，是發現小行星帶的方法。小行星帶是唯一可以找到納奎石的地方。深度空間不是以資源為首要目標。\n\n[font=heading-2][color=#ffe6c0]鎖定區域探索選項：[/color][/font]
menu_space_capsule=[img=item/se-space-capsule]太空艙
title_space_capsule=太空艙
page_space_capsule_text_1=太空艙是一種小型個人火箭和火箭導航系統。它可以放置在地面上充當小型個人運輸火箭，或用於建造貨運火箭，充當火箭的控制系統和逃生艙。\n\n太空艙有自己的生命維持系統，因此如果你在太空中窒息時，你可以在太空艙中避難。\n\n如果在貨運火箭中使用，太空艙不會丟失。它將通過降落在地面或降落在火箭著陸平台上而回收。\n\n[font=heading-2][color=#ffe6c0]個人交通工具[/color][/font]\n[color=#f5cb48]單獨使用太空艙由「太空艙導航」所鎖定。[/color]一旦你研究了該技術，太空艙幾乎可以在任何地方使用，而不需要貨運火箭發射台.\n \n獨立的太空艙可以用來移動你的角色，但不適合運載貨物。雖然你可以攜帶一些必需品，例如維生罐，但容量極為有限，並且你攜帶的任何物品都可能會大幅增加燃料成本。如果你需要高效大量的物品運輸，請改用貨運火箭。\n\n行星發射：太空艙可以從行星發射，但需要一些幫助才能實現。它需要與貨運火箭貨艙段結合，以幫助離開大氣層。太空艙必需與貨運火箭結合，且使用過後火箭段無法回收。\n\n在太空中旅行：你可以在相鄰的區域之間旅行，例如從行星軌道到最近的衛星軌道、或從衛星軌道到小行星帶。雖然你可以在星際空間旅行，但目的地並不一定可靠。從軌道到下方的行星或衛星地表會更加容易，並且沒有限制。\n\n再來：太空艙可以以少量火箭燃料成本降落在行星或衛星上。請注意，著陸位置無法預測，你將需要更多的燃料或貨運火箭幫助才能再次起飛。\n\n緊急救援：緊急救援是將使用緊急用燃料儲備帶你回家。不需要額外的燃料。（不然你會困死在某星球上．）這將是一次性粗暴的著陸，會損壞太空艙，導致[img=item/se-space-capsule-scorched]損壞的太空艙，需要翻新才能再次工作。你可能會丟失在此旅程中獲得的角色庫存中最多 50% 的任何物品（倖存結果取整數值）。
menu_cargo_rockets=[img=virtual-signal/se-cargo-rocket]貨運火箭
title_cargo_rockets=貨運火箭
page_cargo_rockets_text_1=貨運火箭是從貨運火箭發射台（又稱發射平台）發射。\n\n你已經發射了[color=cyan]__1__[/color]貨運火箭。\n\n基於技術的損失修正：最大損失百分比減少[color=cyan]__2__%[/color]。\n\n基於技術性火箭生存能力修正：損失幾率減少[color=cyan]__3__%[/color]。\n\n基於技術的火箭可重複性修正：[color=cyan]__4__[/color]+/-最多恢復10 個（最多100）個部件。\n\n[font=heading-2][color=#ffe6c0]入門[/color][/font]在發射貨運火箭之前，你必須在安裝太空探索後，在衛星火箭（標準異星工廠又稱為「標準」發射井）中發射一顆衛星。 \n\n一旦建造了貨運火箭發射平台，接下來要建造火箭並為其提供燃料：\n\n • 將 100 個貨運火箭貨艙段放入庫存中。其中 10-30 個將在目的地從火箭中回收（如果沒掉到外面去的話！），透過研究可以回收得更多。 \n • 1 個太空艙進入前段。這將會在目的地被回收，並可以將你從軌道中帶回家。\n • 大量液體火箭燃料，通過管道從角落的 8個連接點銜接。所需的燃料量取決於你發射的行星的半徑以及目的地的距離。使用「著陸平台」名稱為目的地選項，它將會計算所需裝載的燃料量。\n\n如果火箭在貨艙段沒安裝完畢時．將無法發射。空火箭的燃料成本是裝滿火箭的 50%，因此可能的話最好使用滿火箭。\n\n你可以從前門進入貨運火箭發射台（按CONTROL來切換駕駛）。這將讓你乘坐火箭。你還要有一套太空套裝和救生罐，這樣你在發射到太空時才不會缺氧死亡。 \n\n你的第一枚火箭不會有任何地方可以著陸，因此第一支到達新星球的火箭是神風特攻隊。有時會錯過著陸平台，導致火箭墜毀。即使如此情況下，貨物也會封存貨艙中，因此你不會丟失所有貨物。 \n\n記得隨身攜帶一個火箭著陸平台，這樣你就可以為下一個火箭建造著陸地點。最好利用火箭中的空間，填充金屬、石頭、石油、煤炭、低密度結構、隔熱層和固體火箭燃料等等資源。\n\n在你所在位置建造一個火箭著陸平台，將讓你再次返回時能輕鬆著陸。\n\n[font=heading-2][color=#ffe6c0]目的地[/color][/font]一旦放置著陸平台後，請確保更新火箭發射井的目的地選項，以瞄準這個著陸平台，而不是隨機點。你可以執行此操作或透過衛星視圖（熱鍵“n”）遠端執行此操作。但是火箭不會發射到還有剩餘物品的著陸平台，請確保將其清空，以免火箭在家裡發呆。\n\n越遠的目的地，可靠性就越差。某些目的地類型（例如小行星帶）具有額外的安全懲罰，但可以透過研究來減輕這些處罰。\n\n[font=heading-2][color=#ffe6c0]基礎自動化[/color][/font]\n火箭發射井會輸出火箭中內部的訊號。你可以在「貨艙段< 100」的機械臂上設定條件，讓機械臂不會夾過頭。\n\n如果你在筒倉上設定了發射觸發條件，它會自動發射，但火箭不會自動發射到非清空的著陸平台（超出部份會被狗吃掉）。\n\n如果你選擇目的地為「具有名稱定義的著陸平台」，那麼它將搜索所有帶相同名稱的著陸平台任意登陸。精心設計的著陸平台，可以輕鬆設定火箭後勤系統。例如Ａ地平台沒清空，它會發射到Ｂ地相同名稱的平台上。\n\n[font=heading-3][color=#ffe6c0]輸入訊號[/color][/font]\n[img=virtual-signal/signal-green]綠色訊號：綠色訊號=1時發射，在觸發發射條件中設定。\n\n[font=heading-3][color=#ffe6c0]輸出訊號[/color][/font]\n[img=virtual-signal/signal-E]E 訊號：空艙=500 滿艙=0\n[img=virtual-signal/signal-F]F 訊號：滿艙=500 空艙=0 無裝任何貨物\n[img=virtual-signal/signal-L]L 訊號：目的地所需的液體火箭燃料量。\n[img=virtual-signal/se-cargo-rocket]火箭狀態訊號：如果火箭準備完成（即太空艙=1和貨艙=100），則傳回值1。\n[img=item/se-space-capsule]太空艙訊號：裝上太空艙=1 還沒裝=0。\n[img=item/se-cargo-rocket-section]貨艙段訊號：最大值是100 沒也發射不出去。\n[img=fluid/se-liquid-rocket-fuel]火箭燃料訊號：火箭中的液體燃料總量。
menu_delivery_cannons=[img=item/se-delivery-cannon]投遞巨炮
title_delivery_cannons=投遞巨炮
page_delivery_cannons_text_1=投遞巨炮是具有超遠距離射程的星際電磁炮。它們目的在發射堅固的均質資源，能夠承受突然的加速力。它無法發射複雜生產過程中的中間體或結構。\n\n巨炮只有一個目標點，它的目標就只有把這個目標點給裝到滿出來，只要有動力及彈藥艙，就會一直發射。如果你想為巨炮的開火添加條件，可以限制大炮裝載資源或使用限制彈藥艙的能力。\n\n當投遞彈藥艙落在地面上時，它會損壞。並且大部分資源都會被摧毀。只要箱子未滿，投遞炮箱就可以安全地捕捉彈藥艙。你可以使用不同的資源或多門巨炮向同一個箱子開火。\n\n建議將目標箱子保持為空的，或使用訊號傳輸限制大炮的輸入端。\n\n投送大炮的容量為1GJ，充電時會消耗50MW。巨炮的射程受到其儲存能量的限制。向更遠的地方射擊需要更多的能量。有些目的地可能比巨炮所能容納的能量還要高，因此它永遠無法開火。你可以在中間位置設定一個中繼站，分兩階段投送貨物。\n\n[img=item/se-delivery-cannon-weapon][font=heading-2][color=#ffe6c0]武器投遞[/color][/font]\n武器投遞的使用與非武器投遞類似，但發射的是武器而不是資源。除了巨炮可用的標準發射模式外，武器投送炮還有__1__和__2__模式。\n\n__1__模式：巨炮每次發射時都會自動選擇一個新目標。當目標區域內不再有敵人時，會自動關閉。在選擇新目標時，蠕蟲和巢穴的優先順序高於移動的敵人。自動射擊模式不如手動方式準確-[color=cyan]1%[/color]的時間，它會失去準頭。\n\n__2__模式：巨炮處於待命狀態，直到玩家使用[img=item/se-delivery-cannon-artillery-targeter-se-iridium-piledriver]遙控器瞄準選擇的目標。當選擇目標時，一門具有相對應彈藥類型和足夠能量的巨炮會向選定位置開火，然後返回待命裝填狀態。當使用遙控器瞄準多目標時，它們會排隊，當__2__模式下巨炮變得可用時，它們將會依序的朝目標區開火。如果用[img=item/se-delivery-cannon-artillery-targeter-se-iridium-piledriver]遙控器選擇的目標在幾分鐘內無法開火，它就會失去作用力。如果發生這種情況，請檢查武器是否供應正常，或改用__1__模式。
menu_steam_power=[img=item/se-big-turbine]蒸汽動力
title_steam_power=蒸氣動力
page_steam_power_text_1=太空探索中的蒸汽動力系統得到了極大的擴展。有熱和蒸汽兩種新方法，以及消耗蒸汽來發電的新方法。\n\n[img=item/se-electric-boiler][font=heading-2][color=#ffe6c0]電力鍋爐[/color][/font]\n鍋爐只能使用燃料來源產生蒸汽，而電力鍋爐則使用電力產生蒸汽。電力鍋爐產生的蒸汽量，比所需的電力還少，因此它對於正常的供電生產沒什麼大用處，也不能用於無限能量循環。但可利用多餘的電力來產生蒸氣，而蒸汽可以儲存節省能源，以便日後用於發電生產。與相同成本的蓄電池相比，這可以提供更高容量的存儲性，但能量效率轉換比低於蓄電池。較高溫度的蒸汽甚至會更節省空間。\n\n電力鍋爐可以產生較低溫度的蒸汽，用於需要蒸汽但不計較溫度的發電機，或者只是將水煮沸而已。\n\n[img=item/se-condenser-turbine][font=heading-2][color=#ffe6c0]冷凝式渦輪機[/color][/font]\n太空探索中的一些地方缺乏天然水源（例如軌道或無水行星）。在這些地方透過蒸汽渦輪機使用蒸汽動力，似乎是很困難的事情。因為蒸汽渦輪機所需的恆定水流，不可能全部由外部來供應。在這些情況下，凝汽式渦輪機就派上用場了。凝汽式渦輪機的工作原理與普通蒸汽渦輪機相似，但有一個關鍵區別：不是將進入的蒸汽排放到大氣中，而是凝結成水並從渦輪機中輸出。這使得凝汽式渦輪機可以在（大部分）閉環中使用，只需少量的水即可完成系統循環。請注意，凝汽式渦輪機的能效比蒸汽渦輪機稍低，這意味著當通過凝汽式渦輪機而不是蒸汽渦輪機運作時，你從相同熱量中獲得的功率會稍微少一些；這是相互間的一點點平衡。\n\n[img=item/se-big-turbine][font=heading-2][color=#ffe6c0]高溫蒸汽[/color][/font]\nAt從某種程度上來說，由於所需的蒸汽渦輪機數量較多，使用蒸汽產生大量電力開始變得笨拙。為了避免這種結構性問題，可以使用高溫蒸氣作為替代品。高溫蒸汽由高溫熱交換器產生，並由高溫渦輪發電機消耗，其能量密度極高。它可以用來大幅縮小蒸汽發電的規模。為了使用高溫熱交換機，需要有熱源。核反應器的溫度不足以與高溫熱交換器一起工作。相反，必須使用能量束接收器或反物質反應器作為熱源。標準熱管不能傳遞高溫；只有納奎提熱管能夠傳遞高溫熱量。這意味著，在納奎提熱管可用之前，高溫熱交換器只能放置在高溫熱源旁當烤肉架。
menu_lifesupport=[img=item/se-lifesupport-equipment-1]生命維持
title_lifesupport=生命維持
page_lifesupport_text_1=生命維持透過設備和維持罐共同作用。你需要兩者才能在惡劣的環境中生存。\n\n維持設備和維持罐可以在維持設施中製造。\n\n生命維持罐提供角色所需的資源並逐漸消耗。隨著生命維持光條的減少，新的罐子會直接從你的庫存中消耗。 \n\n維生設備被放置在裝甲網格中，但如果你使用太空套裝，它會內建 1 個維生設備。放置在設備網格中的額外維生設備，可以提高生命維持效率。如果你在非太空套裝中使用維生設備，那麼它會在敵對行星上保護你，但不會保護你免受太空真空的影響。\n\n[font=heading-2][color=#ffe6c0]敵對環境[/color][/font]\n敵對環境是指任何只要在那裡就會對你的身體造成傷害的區域。維生設備旨在透過為你提供適當的壓力、氧氣、水、營養、熱調節和輻射防護來保護你免受這些威脅。兩種主要類型的惡劣環境是：\n\n太空：維生系統需要維生設備（推進器服）才能在真空中正常運作。你無法在太空中使用其他類型裝甲來維持生命，你仍然會窒息。\n\n陸地：某些行星和衛星可能存在輻射、極冷、極熱或酸性大氣等危險，需要維生設備。 （即將推出）。如果使用某些生物武器，行星也需要生命維持（瘟疫世界）。這些區域的生命維持系統可以由太空套裝或放置在任何其他類型裝甲中的設備提供。
menu_space_sciences=[img=item/se-space-science-lab]太空科學
title_space_sciences=太空科學
page_space_sciences_text_1=大多數科學包只能在[img=item/se-space-science-lab]太空科學實驗室中產出，該實驗室只能在太空中使用。要繼續研究，你需要以某種方式將所有科學包送入太空（通常是透過貨運火箭）。最初合適的位置包括小行星帶以獲取原始資源、靠近恆星的軌道以獲取最佳的太陽能、行星或衛星的軌道以獲取建造基地的可行性。\n\n[img=item/space-science-pack]第一個太空科學是太空科學包，它將幫助你發展太空物流的基礎知識。\n\n接下來你可以選擇[img=item/production-science-pack]生產科學或[img=item/utility-science-pack]實用科學。兩者都是在太空中製造的，標誌著驅動科學數據的開始。製作資料卡，透過超級電腦運作這些卡，你（幾乎）能在最後回收這些卡。為了保持超級電腦涼爽，需要[img=fluid/se-space-coolant-hot]熱流體和[img=item/se-space-radiator]散熱器。\n\n[img=item/production-science-pack]生產科學需要在 Vulcanite 世界上建立一個前哨站。它提供對模塊分享塔、採礦生產力、生產力模組、Kovarex 濃縮和其他東西的訪問，以提高你的產量。生產科學引領你[img=item/se-material-science-pack-1]材料和[img=item/se-biological-science-pack-1]生物科學。\n\n[img=item/utility-science-pack]實用科學需要在冰晶石世界上建立一個前哨站。它提供了一些改變遊戲規則的技術，例如機器人後勤系統、火炮、升級的個人機器人港和升級的動力裝甲。實用科學引領你[img=item/se-astronomic-science-pack-1]天文學和[img=item/se-energy-science-pack-1]能源科學。\n\n[font=heading-2][color=#ffe6c0]專業科學[/color][/font]\n4個專業科學是天文學、生物、能源和材料。它們都是數據驅動的，並遵循執行實驗的過程，為超級電腦收集數據，以建立一個越來越準確的生命、宇宙和一切的模型。它們的技術水平大致相同，因此你可以自由選擇開發順序，但是，每種技術都在某種程度上需要特定的資源，因此在決定首先研究哪一種科學之前，請先看看你的太陽系。 \n \n[img=item/se-astronomic-science-pack-4]天文科學主要關注太空物流。\n\n[img=item/se-energy-science-pack-4]能源科學主要關注能源生產、電力傳輸和高科技產品。\n\n[img=item/se-material-science-pack-4]材料科學更關注重工業和升級。\n\n[img=item/se-biological-science-pack-4]生物科學專注於角色升級、醫學、生命維持、生物武器和生產力。\n\n[font=heading-2][color=#ffe6c0]深空科學[/color][/font]\n[img=item/se-deep-space-science-pack-1]深空科學專注於導航星際空間、反物質和扭曲時空。\n\n[font=heading-2][color=#ffe6c0]提示與技巧[/color][/font]\n透過解鎖更好的配方，空間科學生產的速度和效率將大大提高。注意你解鎖的替代配方，特別是模擬和洞察配方。\n\n太空科學實驗室的高生產力很重要，值得導航最佳獎勵的選項。\n\n你更有可能成為受限設計新系統速度的限制而不是資源需求的限制。不要試圖建造太大。首先引導一些簡單的東西在一起。如果你已經研究了所有可以研究的技術，那麼你可能應該研究下一個科學包，而不是增加產量。\n\n你可以推遲增加資源基礎設施，直到達到第4 層空間科學。\n\n更好的把你的基地模組化和利用模塊分享塔對生產速度產生調查，是玩太空探索的不二法門。\n\n
menu_space_elevators=[img=item/se-space-elevator]太空電梯
title_space_elevators=太空電梯
page_space_elevators_text_1=太空電梯將行星或衛星由地表與其同步軌道相連接起來。該結構提供直接的電源和訊號連接。火車可以進入電梯被提升到另一個空間。太空電梯非常適合流量大的路線，這些路線需要不斷運輸物品，但如果物品只是偶爾移動，效率就會很低。火箭和投遞巨炮的每次移動效率相對較高，而太空電梯的每次移動成本較低，但持續的維護成本較高。\n\n[font=heading-2][color=#ffe6c0]放置[/color][/font]\n太空電梯結構必須緊貼 2x2 軌道網格放置。當太空電梯被放置時，建築工地會出現在兩個地表、陸地和軌道上的相同座標上。如果兩個地表上都沒有空閒空間，則施工將被取消。如果發生這種情況，你可以點擊施工取消訊息中顯示的GPS標籤以查看另一地表上的佔用區域。\n\n[font=heading-2][color=#ffe6c0]施工[/color][/font]\n電梯一開始有 2 個錨點結構，但它們之間的連接（繫繩）尚未完成，需要更多的建築材料。錨點充當建築工地，需要電力和[img=item/se-space-elevator-cable]電纜來完成建造太空電梯。繫繩的全部成本取決於行星或衛星的半徑。打開太空電梯實體就可以看到建造狀態。兩端都可以為建造過程做出貢獻，但只需提供一側即可完成。\n\n[font=heading-2][color=#ffe6c0]維護[/color][/font]\n太空電梯需要以額外的[img=item/se-space-elevator-cable]太空電梯電纜形式進行維護。對維護影響最大的是時間的流逝，但每輛在結構上上下移動的車輛也會略微增加維護需求。維護成本也受到星球大小的影響；更高的引力帶意味著整體成本增加。你可以將滑鼠停留在零件進度條上來查看維護和運輸各個的成本。\n\n[font=heading-2][color=#ffe6c0]電線連接[/color][/font]\n電梯充當跨地表電線桿。連接到電梯結構中間部分的電源線和訊號線將直接連接到另一側的結構。此連接需要建立繫繩才能傳輸電力和訊號。\n\n[font=heading-2][color=#ffe6c0]火車連接[/color][/font]\n太空電梯可以重新命名，這會更改電梯兩端的內部車站名稱，它們各自都有一個表示向上或向下的箭頭後綴。如果將內部電梯站設定為目的地，火車可以自動使用電梯。不建議在電梯中手動導航長火車（因為當你切換地表時，玩家輸入會與火車分離，因此你需要不斷向前點擊以免卡住）。如果火車卡住，太空電梯設置中有一個選項可以迫使車廂向前移動，但需要有足夠的軌道讓車廂向前移動。啟用此選項後，你還應該確保出口始終沒有其他火車，否則向前推動的火車將強行撞入其他火車和鐵路塊。\n\n[font=heading-2][color=#ffe6c0]能量[/color][/font]\n太空電梯有一個能量緩衝區，分佈在兩個錨點之間。將火車推入軌道會消耗該緩衝區的能量，將火車從軌道送下將為緩衝區充電。除非緩衝區中的能量達到最低限度，否則結構不會移動新列車。將滑鼠懸停在能量進度條上，你可以看到將車輛送上電梯需要消耗多少能量。
menu_energy_beams=[img=item/se-energy-transmitter-emitter]能量束
title_energy_beams=能量束
page_energy_beams_text_1=[font=heading-2][color=#ffe6c0]日冕物質拋射[/color][/font]\n該區域的恆星經常噴射出危險的粒子流。行星或衛星誤入這些粒子流中的情況並不罕見。如果你在受影響的地表上有一個大型基地，你應該疏散、分散或分散你的資產，或者建造一個帶有大型蓄能器備份的保護傘防禦設施。如果你的基地很小，那麼很可能毫髮無傷。當地表受到威脅時，將至少提前 4 小時發出預警。下面列出了已知的威脅。
page_energy_beam_warning_text=[img=virtual-signal/se-star]警告：日冕物質拋射方向為__1__。\n估計防禦需求：__3__GW 峰值功率，120 秒內__4__GJ。預計到達時間：__2__秒。
page_energy_beams_text_2=[img=item/se-energy-beam-defence][font=heading-2][color=#ffe6c0]保護傘：能量束防禦[/color][/font]\n能量束防禦設施“保護傘”，可以防禦日冕物質拋射和天基能量束武器。它的工作原理是將磁性粒子懸浮到保護性氣泡中，然後根據需要重新排列和聚集粒子以擴散來襲的能量束。發揮作用的唯一要求是能量，基本功率為 10MW，但會根據攻擊光束的強度而增加。每個地表只需要 1 個防日冕物質拋射、防能量束武器 1 個保護傘就可以防禦高達 500GW 的攻擊力。對於日冕物質拋射，半徑為 5000 的行星和 100% 太陽能的基本功率需求預計在 2 分鐘內約為 160GJ，在 1 分鐘時峰值功率消耗為 2GW。該值隨區域的太陽能倍增器而增加或減少，對於固體，其根據相對於基礎半徑 5000 的半徑而增加或減少。對於來自能量束發射器的能量束，功率要求預計為目標處能量束強度的1/10（效率損失後）。\n\n「保護傘」可以保護行星/衛星及其軌道免受日冕物質拋射和能量束的影響。將「保護傘」放置在行星/衛星或軌道上將保護這兩個區域。\n\n[img=item/se-energy-transmitter-emitter][font=heading-2][color=#ffe6c0]能量光束[/color][/font]\n能量光束發射器能夠將能量傳送到不同的地表。它可以透過兩種主要方式做到這一點，要做為向遠處地表提供能量的方式“通電”，或做為切割光束武器“能量劍”。當處於戰鬥模式時，光束會連續損壞一個區域，但可以在目標地表上移動，切割出一條路徑。損壞率、面積和光束速度會根據注入光束的能量而增加。 「Auto-Glaive」模式具有自主目標選擇功能。\n\n能量束發射器有 4 個連接點，能量束室可以在這些連接點上進行端接。能量束室可以縱向連接，或長邊與短邊的中間相交，但不能直接並排連接。能量束注入器直接連接到能量束室的側面。每個能量束注入器都會增加所連接的能量束發射器的功率。要從光束收集能量，你需要在目標地表安裝能量束接收器，並使用發射器中的瞄準器將其選擇為目標。一旦光束將接收器作為目標，接收器就會升溫。熱量可以從側面的熱連接中獲取，為熱交換器和渦輪機提供動力。
