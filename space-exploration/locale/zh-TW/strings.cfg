[mod-name]
space-exploration=Space Exploration 太空探索

[mod-description]
space-exploration=建造貨運火箭將資源發射到太空中，乘坐著火箭進入太空。建立軌道太空平台進行高難度的科學研究。一步步地建造出太空船，將其從行星地表航行到其他行星、衛星、小行星帶，建造星際射線和深空採礦殖民地。導航外星系上的古代文物和深空失落的遺跡。在開發版本中，不建議安裝非依賴性模組。

