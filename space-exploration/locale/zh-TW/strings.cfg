[tips-and-tricks-item-description]
kr-faq=[font=default-bold]我查看原油點，它顯示 X，當我查看預期產量時，我看到不同的數字。為什麼？[/font]\n當你查看某個地點時，你會看到生產週期數。一個週期可生產 20 單位石油。因此，當你看到預期產量時，這就是周期數 * 20。\n\n[font=default-bold]如何收穫蠕變？[/font]\n[technology=military-science-pack]將提供對[item=kr-creep-collector]的訪問，這是一種快速而簡單的收穫蠕變的方法。你也可以手工收穫 蠕變，但這需要很長時間！\n\n[font=default-bold]我在哪裡可以獲得[item=space-research-data]？[/font]\n 而不是啟動一個以[item=satellite]作為有效貨運的火箭，你需要在太空中製作它。\n\n[font=default-bold]我不喜歡輻射。我可以停用輻射損傷嗎？[/font]\n 請參閱[font=default-bold]指令[/font]頁。

