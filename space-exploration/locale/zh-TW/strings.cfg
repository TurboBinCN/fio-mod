page_spaceships_text_1=太空船是巨大而強大的運載工具，可以將許多包含的結構、物品和玩家發射到太空，然後繞恆星系發射火箭並降落在其他地表上。
;page_spaceships_text_2=你目前擁有 [color=cyan]__1__[/color] 艘太空船。\n太空船所能達到的最大速度為 [color=cyan]__2__[/color] (指目前存在的太空船)\n\n[font=heading-2][color=#ffe6c0]太空船自動化[/color][/font]\n
page_spaceships_construction_text_1=[font=heading-2][color=#ffe6c0]結構[/color][/font]\n太空船由許多區塊和更小的組件組成，這些組件組合在一起可以製作出你自己設計的太空船。你設計的太空船，幾乎就像一個迷你可移動的平台。\n\n從太空船地板的平面圖開始。不要建造太大，因為你的前幾艘太空船將有嚴格的尺寸限制，可以通過研究擴展。在邊緣周圍放置船壁以形成艙室，並確保沒有間隙（包括對角線）。在內部某處放置一個太空船控制台，這是太空船的核心部分以及你如何控制它。放置控制台時，控制台會發出一些脈衝，因為控制台會計算出哪些部件已正確連接，哪些部件已正確銜接，以及你嘗試啟動哪些部件會分離。任何方塊在閃爍著紅色，則表示你的設計仍有存在問題，你可以通過檢查太空船控制台來診斷。你還需要一個太空船火箭推進器和一個太空船火箭發動機。增壓罐儲存航行太空所需的燃料並提供垂直起降組件。火箭發動機是為了在太空中緩慢燃燒，讓你到達目的地。而前面（總是指向北方）進行某種形式的防御，因為你所在的星雲充滿著碎片。\n\n[font=heading-2][color=#ffe6c0]應力限制[/color][/font]\n初期你的太空船大小將受到技術水平限制。附加技術可讓你建造更大的太空船。整體應力分兩部分計算：\n\nA 部分：船體應力主要基於船舶的尺寸和形狀。\n\nB 部分：容器應力基於船舶的物品和流體儲存容量。\n\n總計完整性應力取較大的應力因子，兩個值不相加。如果你的結構應力為 250，容器應力為 280，則完整性應力將為 280。\n\n船體應力條顯示3個數值。第一個是當前太空船區塊的船體應力。太空船最高10%的船體尺寸為淨空間。這個空間在應力計算中會被忽略，對使用在走廊中很有用處。第二個數值是忽略外的船體應力，用於估算結構內部空間的船舶應力值。第三個值是你的技術水平，所允許的最大壓力值。\n\n特別長的薄船，或是中間結構非常薄的船，不如圓形的堅固。寬體船很堅固，但必須清除更多的小行星障礙。\n\n一些結構對船體的完整性或加速性有特殊影響，例如 Nexus。\n\n[font=heading-2][color=#ffe6c0]精簡型[/color][/font]\n這個區域空間位於砂礫星雲中。如果你採用精簡化太空船設計，你的太空船最大航行速度會提高大約 30%。應該避免做像扁平的盒子形狀在前面，也不要做成楔形。最多 1/3 的船體前部為平坦比較有利，圓形也可以。你可以手動觸發完整性檢查以查看精簡形狀的狀況。\n\n[font=heading-2][color=#ffe6c0]速度[/color][/font]\n船體速度基於引擎的推力與船重（透過應力限制值）。引擎可以放置在船內/船上，但船後部空曠區域越大引擎效率越高。全封閉狀態引擎的效率為 60%。建造船體兩側的引擎也有一點點優勢。\n\n你可以為船舶設定目標速度，如果超過目標速度，那麼它會讓引擎接近目標速度以節省燃料。有 3 種速度限制選項，你可以進一步降低在小行星較多區域的速度，否則這些區域可能會擊垮你的防禦。\n\n[font=heading-2][color=#ffe6c0]長途運輸[/color][/font]\n當考慮長途旅程時，值得注意的是，在長途運輸中，你可以用衛星模式下做很多事情。你也可以通過衛星網路遠程向太空船下達指令。\n\n[font=heading-2][color=#ffe6c0]機械製作[/color][/font]\n[color=#ffaaaa]警告：為太空船製作機器，只能配合太空船所處的環境中。如果在太空船著陸時太空中的配料將會流失。某些陸基型機器可以在太空中運作，但它們在太空中將失去使用生產力模塊的能力。如果太空船在這些機器中使用生產力模塊，將被摧毀。[/color]\n\n[font=heading-2][color=#ffe6c0]太空船訊號[/color][/font]\n太空船控制台的右上部分可以與主體結構分開用電線連接，它輸出的訊號為：\n\n[img=item/se-spaceship-console]控制台編號表示是太空船的編號。\n[img=virtual-signal/signal-speed]速度訊號中數字表示太空船當前的速度：-1 停止，-2 已停泊。\n[img=virtual-signal/signal-distance]距離訊號表示要到達目的地：-1 到達，-2 已停泊，-3 沒有目的地設定。\n[img=virtual-signal/se-planet-orbit]訊號指示當前位置，如果有的話。\n[img=virtual-signal/signal-D]太空船當前所在位置的小行星密度用 D 訊號顯示。\n[img=virtual-signal/signal-A]如果太空船已泊定，則它用 A 訊號顯示泊定區域。\n\n[font=heading-2][color=#ffe6c0]電路訊號通道[/color][/font]\n太空船夾具上方的電源有電路網絡連接點。自動著陸連接夾具時，電源和電路網絡訊號會結合在一起，使電源和電路訊號在船舶和著陸點之間傳遞。\n\n
page_spaceships_automation_text_1=有兩種方法可以使太空船自動化。它可以像火車一樣使用調度程序進行控制。或者也可以使用電路手動控制。
page_spaceships_automation_scheduler_text_1=[font=heading-2][color=#ffe6c0]航行排程[/color][/font]\n太空船調度程序可以與火車非常相似的方式，實現太空船的自動化。時程表可以包含太空船應該前往的多個地點，以及在什麼條件下允許前進到下一個地點。可以為分配單獨的優先順序和限制。可以定義中斷來手動指揮太空船。船隻的時程表存放在其表中，多艘船可以共用同一個時程表。\n\n控制台主體結構左側可接受訊號輸入：\n[img=virtual-signal/signal-speed]速度訊號設置目標速度並啟動發動機。相反，負訊號會停止引擎。\n[img=virtual-signal/se-spaceship-launch]正值太空船發射訊號會觸發發射。\n[img=virtual-signal/se-planet-orbit]目的地訊號設置目的地（一旦你建造了一艘太空太空船，你就可以從宇宙導航器側面板看到一個區域的訊號）。\n\n注意：目的地訊號的類型（例如[img=virtual-signal/se-planet-orbit]或[img=virtual-signal/se-asteroid-belt]) 並且訊號的值/編號必須與要設置的目的地相匹配。\n\n注意：太空船控制台不接受[img=virtual-signal/se-spaceship-launch]發射或[img=virtual-signal/signal-speed]速度輸入，直到玩家手動發射並至少與太空船互動一次。這是為了防止藍圖太空船在機器人建造過程中意外發射。\n\n注意：控制台每秒只檢查輸入訊號的變化；太空船需要持續的訊號才能做出反應，單個脈衝訊號將不起作用。\n\n[font=heading-2][color=#ffe6c0]直接電路訊號[/color][/font]\n太空船夾具在上方是電源和電路網絡連接點。自動著陸連接夾具時，電源和電路網絡訊號會合在一起，使電源和電路訊號在船舶和著陸點之間傳遞。\n\n[font=heading-2][color=#ffe6c0]自動著陸[/color][/font]\n為了使太空船著陸，必須向控制台提供一對泊定訊號，如：\n“使用左夾具”（[img=virtual-signal/se-anchor-using-left-clamp]) 或是“使用右夾具“ ([img=virtual-signal/se-anchor-to-right-clamp])\n“泊定至右夾具“ ([img=virtual-signal/se-anchor-using-right-clamp]) 與“泊定至左夾具” ([img=virtual-signal/se-anchor-to-left-clamp])\n\n“泊點使用.. .“ 訊號必須與船上的夾具值匹配。\n“泊定到...”訊號的值必須與目的地的夾具值匹配。\n你可以通過打開用戶界面查看和更改這些夾具的值。如果發現與提供給船舶控制台的“泊定使用……”和“泊定到……”訊號匹配，則船舶將嘗試連接這兩個夾具的情況下著陸。請謹慎使用。\n\n[font=heading-2][color=#ffe6c0]夾具[/color][/font]\n要設置夾具的編號，請打開夾具圖形界面並更改，將訊號發送到你希望的夾具編號。你永遠不需要更改訊號的類型。\n\n你可以通過向其傳遞紅色訊號來禁用泊定位置。\n\n[font=heading-2][color=#ffe6c0]著陸示例[/color][/font]\n太空船有一個編號為 315 的左夾具。在那個夾具的界面中，訊號是[img=virtual-signal/se-anchor-using-left-clamp]，值為 315。\n著陸地表有一個編號為 147 的右夾具。在該夾具的界面中，訊號是[img=virtual-signal/se-anchor-using-right-clamp]，值為 147。\n為了讓太空太空船著陸使用這兩個夾子，太空船控制台的左側必須傳遞以下訊號：\n[img=virtual-signal/se-anchor-using-left-clamp]315\[img=virtual-signal/se-anchor-using-right-clamp]147\n\n
page_spaceships_automation_circuits_text_1=[font=heading-2][color=#ffe6c0]使用航行電路[/color][/font]\n控制台的主要結構可以接受自左側的訊號輸入:\n[img=virtual-signal/signal-speed]正值訊號為設定到達目標速度並啟動引擎，負值則會停止引擎。\n[img=virtual-signal/se-spaceship-launch] 正值的太空船發射訊號會觸發發射。\n[img=virtual-signal/se-planet-orbit] 目的地的訊號設定(可以從宇宙導航器面版上看到區域訊號).\n\n注意：目的地訊號類型(例如[img=virtual-signal/se-planet-orbit] 或 [img=virtual-signal/se-asteroid-belt]) 訊號的數值必須符合設定的目地的。\n\n注意：除非玩家手動發射並啟動太空船至少一次，否則太空船控制台不會接受。[img=virtual-signal/se-spaceship-launch] 發射或是 [img=virtual-signal/signal-speed] 速度輸入是為了防止藍圖由機器人建造過程中意外發射太空船。\n\n注意：控制台每秒檢查輸入訊號的變化；船隻需要持續的訊號，單一訊號無法正常運作。\n\n[font=heading-2][color=#ffe6c0]自動著陸[/color][/font]\n要使太空船著陸，必須向控制台提供一對停泊訊號，可以是：\n"使用左夾具泊定" ([img=virtual-signal/se-anchor-using-left-clamp]) 或是"泊定到右夾具" ([img=virtual-signal/se-anchor-to-right-clamp])\n"泊定到右夾具" ([img=virtual-signal/se-anchor-using-right-clamp]) 與"泊定到左夾具" ([img=virtual-signal/se-anchor-to-left-clamp])\n\n的訊號值必須與連接器的值相符 "泊定使用..."的訊號值必須與連接器的值相符。\n「泊定到...」訊號的值必須與目的地的夾具值相符。\n您可以透過開啟夾具的界面來查看和變更夾具上的這些值。如果發現向太空船控制台發出的“使用泊定...”和“泊定到...”訊號匹配，太空船就會嘗試使用連接的兩個夾具著陸。請謹慎使用。\n\n太空船總是會選擇優先順序最高的夾具，可以透過電路設置 [img=virtual-signal/signal-P]太空船的限制就會被忽略。\n\n[font=heading-2][color=#ffe6c0]夾具[/color][/font]\n若要設定夾具的編號，請開啟夾具界面，並將夾具訊號的數值變更為你希望的夾具編號。您永遠不需要改變訊號的類型。\n\n您可以透過向泊定夾具發送紅色訊號來停用它。\n\n[font=heading-2][color=#ffe6c0]著陸範例[/color][/font]\n太空船有一個編號為 315 的左夾具。[img=virtual-signal/se-anchor-using-left-clamp] 其值為 315。\n著陸地有一個編號為 147 的右夾具。 [img=virtual-signal/se-anchor-using-right-clamp]其值為 147。\n為了讓太空船使用這兩個夾子著陸，必須向太空船控制台的左側傳遞以下訊號：\n[img=virtual-signal/se-anchor-using-left-clamp]315[img=virtual-signal/se-anchor-to-right-clamp]147\n\n
menu_arcospheres=[img=item/se-arcosphere-a]弧光球
title_arcospheres=弧光球
page_arcospheres_text_1=弧光球是近乎完美的納米工程鈉晶體球。它們的來源不明，但最常見的是漂浮在星際空間深處。\n\n每一個都包含一個超時空維度的連結，並允許你與一個小的第 4 度空間維度互動。這些球體可以被極化，這樣它們就可以在相對彼此移動時，操縱時空的某些方面。可以使用特定的孤光球將時空扭曲和編織到更高的維度。\n\n[font=heading-2][color=#ffe6c0]用法[/color][/font]\n弧光球是遊戲中最獨特的製作挑戰。它們被用作配方中的工具，但從未被破壞，它們只是被改變了。使用它們的主要挑戰是在你擁有的球體中循環，這樣你就不會用完特定類型的球體。有很多方法可以平衡生產，但一些組合器可以提供很大幫助。如果你遇到困難，請在 Discord 上尋求提示，或在太空探索維基上查找更多信息。\n\n[font=heading-2][color=#ffe6c0]收藏[/color][/font]\n弧光球被發現通過從小行星帶發射孤光球收集器。重複發布的收益遞減。從不同的小行星帶發射可能會獲得更好的回報。
page_arcospheres_text_deep=在星際空間深處發現的 弧光球：[color=cyan]__1__弧光球[/color]/__2__收集器發射。
page_arcospheres_text_zone=在__1__附近發現的 弧光球：[color=cyan]__2__弧光球[/color]/__3__收集器啟動。
menu_exploration_journal=[img=item/se-thruster-suit]導航日記
title_exploration_journal=導航日記
page_journal_title_backstory=在火球的錯誤一側醒來
page_journal_text_backstory=我發現自己墜毀在一個陌生的星球上，一艘小船的部分組件在我周圍燃燒。我的身體有瘀青、割傷和燒焦，但都沒有太嚴重。我的頭部受傷顯然更嚴重，頭痛欲裂，光線刺眼。更糟的是，我不記得自己是如何來到這裡的，甚至不記得自己是誰，除了名字和模糊的使命感……建造。即使那樣，我也不記得要建造什麼或如何建造它。起初我以為頭是暫時卡到陰受損，記憶會回來，但仍然沒有。我的資料日誌也為空白或重新格式化這一事實讓我想到了其他解釋。
page_journal_title_satellite_launch=天空之眼
page_journal_text_satellite_launch=我成功地將一顆衛星發射到軌道上。這是一個重要的里程碑，值得慶祝，但仍有許多工作要做。這只是個開始。
page_journal_text_weapons_cache=[img=item/satellite]衛星偵測到[color=cyan]武器快取[/color]。__1__
page_journal_title_cargo_launch=超越無限
page_journal_text_cargo_launch=我現在可以將自己發射到太空了。我不再受制於這塊我已成長為家的不毛之地。天空正在召喚。
page_journal_title_entered_vault=遺跡狩獵
page_journal_text_entered_vault=我進入__1__金字塔形突出物下方的一個洞穴，發現了一個黑暗而危險的密室。房間的地面上有一大一小兩個古老的漩渦飾框。它們的地表都有多個字形以及其他圓圈和線條。無論系統試圖傳達什麼訊息，大漩渦花飾中心的字形似乎都是最重要的。無論資訊是什麼，它的格式都與我見過的其他資訊不同。漩渦飾框後面是某種凸起的圓柱體，其中包含一個強大的設備，我可以將其用作模組。這種品質的模組非常有價值，值得嘗試找到更多這樣的結構。也許是時候進行一些考古研究了。
page_journal_title_found_gate=異常空間
page_journal_text_found_gate=在異常現像中發現了某種巨大的環形神器。即使從遠處看，有兩件事也是顯而易見的：1.它很古老。 2.技術和我的完全不一樣。無論它是什麼或曾經是什麼，它現在都被摧毀了。
page_journal_title_found_gate_ship=異常太空船
page_journal_text_found_gate_ship=在環形文物附近的異常區域中發現了一艘相當大的廢棄太空船的一部分。這艘船的技術和我的技術類似，但更……精緻一些。無論如何，它顯然是屬於不同的技術。碎片圖案使其看起來像是被切成兩半和/與環形結構碰撞。也許值得挽救。
page_journal_title_found_gate_ship_authenticated=異常船舶認證
page_journal_text_found_gate_ship_authenticated=異常中的廢棄太空船掃描了我並「驗證了我的生物特徵」。我不知道這是否意味著它以某種方式專門記錄了我的具體情況，或者也許只是與蟲蟲和種族滅絕機器人相比，任何隨機的控制人類都足夠好。該訊息稱船舶氣閘門訪問代碼為2236067964。船舶日誌可以訪問，但大部分內容遺失或損壞。
page_journal_title_found_gate_ship_log=異常船舶日誌
page_journal_text_found_gate_ship_log_intro=德莫達馬斯 82B：AAI 超網路前緣建造巡洋艦。船舶日誌內容：
page_journal_text_found_gate_ship_log=....冷涼卡好的名義上。\n訪問警告：AAI 泰瑞斯之門 17：星際原型 v0.1.93 是機密設施。需要L90或以上的AAI認證。立即進行身份驗證，否則將被銷毀。\n取存日誌：使用AAI 控制論超網路工程師 L97 憑證ID__1__驗證訪問AAI 泰瑞斯之門 17。\n訪問日誌：現在¶Ôàtá^...\n... `¿ris 門 17 投影機8 頻率鎖定。能源處於 216% 的安全水準。奇點穩定性：99.4%。\n導航日誌：AAI  泰瑞斯之門 17 撥入投影向量[SV__2__]。預測目標：Wube星系 > 福內斯特拉又去卡到陰（異常，未導航）。 真正的¶Ôàtá^...\n...'¿ 導航警告：星際超管道（被覆蓋）。\n導航警告：目的地沒有已知的超級通道門（被覆蓋）。\n保險警告：沒有保險合約.可用合約：0。\n訊息注意：沒有可用條件為「無門物化」的保險合約。你確定這安全嗎？[回覆.忽略.忽略_全部]\n行進日誌：進入泰瑞斯 異常> AAI 泰瑞斯之門 17 超級管道與[SV__2__]對齊。\n行進日誌：跳到超級管道[SV__2__]完成¶Ôàtá^...\n ... '¿vel 日誌：位置更新：泰瑞斯異常附近的超級管道，對準[SV__2__]，穩定性為98%，直徑¶Ôàtá^...\n...'¿avel 日誌：在未導航的福內斯特拉異常位置退出超級管道。\n警告：意外碰撞，與未知物體[4ae4c8d28f2]相交，開始掃描物體[4ae4c8d28f2]。\n損壞日誌：13.2% 損壞。來源：與未知相交物體碰撞造成的衝擊損壞[4ae4c8d28f2]。\n部分損壞日誌：報告損壞的部分：A5、A6、A9、B6、B7、B8、C7。無回應的部分：A7、A8。 （86% 置信度）\n控制論工程師記錄：生命跡象 99%。 （34% 置信度）\n行進日誌：嘗試規避機動RS100LT30。\n行進日誌：退出超管已完成，但有錯誤。\n行進日誌：位置更新：福內斯特拉未導航的異常。\n掃描日誌：對物體[4ae4c8d28f2]清晰度0.002m^ 的掃描已完成2 距離-48.76m（99.9% 置信度）。\n掃描詳細日誌：[4ae4c8d28f2]質量92.5¶Ôàtá^...\n...'¿ idence)。\n掃描詳細日誌：[4ae4c8d28f2]成分：人造。 34% 納奎提、29% 鈥、37% 未知複合材料（89% 置信度）。\n掃描詳細日誌：[4ae4c8d28f2]大小：近似圓柱體68¶Ôàtá^...\n...'¿ 尾日誌：[4ae4c8d28f2]能量特性：通量 54Gwb，輻射分佈 2.8kJ/1.7MJ/1.6MJ/0.62J，勒克斯分佈 5.86GJ[051e376392b8d3f8]。 （98% 置信度）。\n掃描詳細日誌：[4ae4c8d28f2]標識：人工構造，未知製造商，描述：帶有結節的近似環，八元。 （0.3% 置信度）。\n掃描詳細日誌：[4ae4c8d28f2]結構能力估計：Hypergate（47% 置信度）。其他：武器42%、能源35%、計算17%、掃描12%、工業9%、太空船7%、棲地2%。\n傷害日誌：68.2%%傷害。完整性失敗，部分脫落。來源：因與物體碰撞而產生的二次壓力波[4ae4c8d28f2]。\n部分損壞日誌：反應器危急。報告損壞的部分：D5、E4、E5、E6、F5。沒有回應的部分：A1、A2、A3、A¶Ôàtá^...\n...'¿文件日誌：勘探太空梭2 緊急脫離。軌跡預測：Calidus > Nauvis。\n損壞日誌：91.7%%損壞。誠信失敗，節節落敗…\n\n[color=red]以上看得懂請你吃雞排．[/color]
page_journal_title_distress_message=求救訊息已發送
page_journal_text_distress_message=我終於成功向家裡發送了求救訊息。我收到的回覆訊息證實了我的擔心，我獨自一人在銀河系的這一部分，我需要設計和建造一艘能夠帶我回家的太空船。
page_journal_title_spaceship_victory=太空船勝利
page_journal_spaceship_victory=我建造了一艘速度極快、強大的太空船，並啟動了空間扭曲驅動器。驅動器花了一段時間才穩定到實際的超光速狀態，但一旦穩定下來，我就能夠進入冷凍睡眠狀態，開始接下來的回家之旅，前往遙遠的星系。我留下了一個由我親手白手起家建立的星際殖民帝國。我在這個領域的遺產將繼續存在。
page_journal_title_gate_victory=遠古之門勝利
page_journal_gate_victory=巨大的戒指神器，古老的星際之門，最終還是盡我所能修復了。憑藉一些沉重的作業和獨創的見解後，我終於成功地讓它發揮作用。我將扭曲場泊定到本地恆星，解碼非數位字形座標系，並對撥號系統進行逆向工程。我的思維被這些陌生的概念扭曲了，但它有效，我終於建立了一個門戶之家。到遙遠星系的回家之旅只花了片刻時間。我留下了一個星際殖民帝國，是我親手從頭開始建立的。我在這個領域的遺產將繼續存在。
