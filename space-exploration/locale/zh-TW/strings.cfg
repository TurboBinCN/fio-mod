se-condenser-turbine=蒸汽渦輪機的能源效率為 75%，但所用蒸汽的 99% 都以水的形式返回。溫度範圍：100 至 999。
se-core-miner=允許從行星和衛星上無休止地提取資源，但如果在同一個物體上使用多個，回報就會遞減。
se-biogun=可以使用各種生化武器的槍。
se-cryogun=製作一面可以凍結敵人的冰牆。
se-cryonite-lubricant=冰晶石可以製成潤滑劑以節省石油。
se-deep-catalogue=空間扭曲、奇異物質和奈米工程數據已結構化，可供分析和電腦模擬。最先進技術所需。
se-deep-space-science-pack=需要最先進的技術
se-dimensional-anchor=利用恆星的引力作為空間異常的穩定點。
se-electric-boiler=利用電能從水中產生蒸氣。該過程的能源效率高達 90%，因此你不會獲得能量。高溫蒸汽可用於能量儲存。低溫蒸氣可用於製作。
se-energy-science-pack=允許研究與基本力和亞原子發現相關的技術。
se-fluid-burner-generator=需要具有能量值的液體燃料（如液體火箭燃料）來發電。簡單而緊湊，但缺乏大型蒸汽系統的能源效率。專為空間設計。實際液體消耗量取決於液體燃料值。
se-fuel-refining=提煉更先進的燃料。
se-heat-shielding=用於高溫應用和空間結構的複合板。
se-heat-shielding-iridium=銥的強度可用於使用更少的資源來創建熱屏蔽。
se-ion-engine=離子引擎使用少量的離子流和大量的動力作為推力來移動太空船。離子助推罐比其他助推罐小，只能從太空中已有的位置發射。
se-long-range-star-mapping=一些遙遠的星系可以透過不尋常恆星的特定模式來識別。結果記錄到[img=virtual-signal/informatron]Informatron[__CONTROL__informatron__]。
se-low-density-structure-beryllium=輕質鈹鷹架可以取代低密度結構的重型構件。
se-material-science-pack=允許研究與先進材料相關的技術，以滿足更先進的工程要求。
se-medpack=使用醫療包來治癒自己。
se-medpack-2=使用醫療包來治癒自己。
se-medpack-3=使用醫療包來治癒自己。
se-medpack-4=使用醫療包來治癒自己。
se-meteor-defence=在流星雨摧毀你的設備之前把它從天上射下來。巨炮流星防禦裝置可以保護整顆行星，但一次只能發射一顆彈藥擊毀流星。
se-meteor-point-defence=在流星雨摧毀你的設備之前把它從天上射下來。區域流星防禦一次最多可以保護一小塊區域免受 4 顆流星雨的侵害。
se-nanomaterial=不同材料在奈米尺度上的複雜排列，形成具有卓越性能的複合材料。
se-railgun=電磁加速飛鏢的推進速度如此之快，以至於它們在蒸發之前會留下等離子痕跡。傷害高，射速慢。
se-plague=這場大瘟疫消滅了整個星球上的所有生命。消滅咬蟲、樹木、魚類、維生質等。人類需要生命支持才能生存。
se-processing-beryllium=將綠柱石轉化為鈹，這是一種極輕、堅固、耐腐蝕、耐輻射的金屬。它也與 X 射線幾乎沒有相互作用。
se-processing-cryonite=將冷凍冰晶石晶體加工成冰晶石棒，用於冷凍、冷卻和潤滑。冰晶石主要存在於冰凍行星上。
se-processing-holmium=將钬原礦轉化為钬，一種磁導率在所有元素中最高的稀土金屬。
se-processing-iridium=將銥原礦轉化為銥，這是在高溫下最耐腐蝕的金屬和最緻密的元素。對於重型應用很重要。
se-processing-naquium=將神秘的深空納奎石晶體轉化為納奎提，一種具有不尋常時空相互作用的類金屬材料。
se-processing-vitamelange=將原始的維生質變成有價值的營養萃取物。
se-processing-vulcanite=將火山硫化物晶體轉化為精製粉末，用於先進冶煉、火箭燃料和其他高溫化學過程。硫化橡膠主要存在於火山行星上。
se-pyroflux-smelting=硫化橡膠可用於更有效地處理其他資源。
se-processing-water-ice=利用冰晶石的特性，水可以變成更緻密的固體，有助於運送它。
se-processing-methane-ice=利用冰晶石的特性，甲烷氣體可以變成密度更高的冰，有助於運送它。
se-pulveriser=粉碎和壓碎較硬的礦物和行星核心碎片。
se-processing-unit-holmium=改良的鈥電纜訊號屏蔽可用於製造微處理器，同時使用較少的子組件。
se-rocket-cargo-safety=將火箭運輸過程中的貨物損失量減少 10%（乘法）。
se-rocket-fuel-from-water=透過水電解產生氫氧火箭燃料。
se-vulcanite-rocket-fuel=熱通量中所含的能量足以製造火箭燃料。
cargo-landing-pad=允許你將火箭貨物貨艙運送到指定的著陸平台。透過進一步研究，它還可以回收火箭部件。
se-rocket-landing-pad=允許你將火箭貨運艙運送到指定的著陸平台。透過進一步研究後，它還可以回收火箭零件。
se-rocket-launch-pad=允許你將貨物發射到太空或其他行星。
se-rocket-reusability=成功降落時可回收的零件百分比增加 4%（基礎為 20%，最大為 100%）。
se-rocket-science-pack=允許開發受益於這些進步的先進火箭系統和技術。
se-computer-science-pack=允許研究與數據驅動科學和專業太空機器相關的技術。
se-rocket-survivability=將火箭因導航故障而導致錯過著陸平台的幾率降低 10%（乘數）。
se-rtg-equipment=放射性同位素熱電發電機。一種便攜式發電機，可將放射性衰變產生的熱量轉化為電能。可持續使用數十年，無需額外燃料。
se-rtg-equipment-2=放射性同位素熱電發電機。改良的便攜式發電機，可將放射性衰變產生的熱量轉化為電能。可持續使用數十年，無需額外燃料。
se-fusion-reactor-equipment=為設備模組提供電力。
se-antimatter-reactor-equipment=為設備模組提供電力。
antimatter-reactor-equipment=為設備模組提供電力。
se-space-accumulator=儲存大量多餘電能以供日後使用的建築物。
se-space-accumulator-2=建築物可以儲存大量多餘電能以供日後使用。
se-space-assembling=一種可以在太空中工作的改裝組裝機。
se-space-astrometrics-laboratory=結合、比較和量化不同來源的天文資訊。
se-space-biochemical-laboratory=專門從事生物化學的先進化學實驗室。還可以進行更基本的化學和石油加工。
se-space-catalogue-astronomic=天文資料結構化，可供分析和電腦模擬。進一步天文學研究所需。
se-space-catalogue-biological=生物資料結構化，可供分析和電腦模擬。需要進一步的生物學研究。
se-space-catalogue-universal=用於分析和電腦模擬的組合數據。需要進一步的深空研究。
se-space-catalogue-energy=能源資料結構化，可供分析和電腦模擬。需要進一步的能源研究。
se-space-catalogue-material=材料資料結構化，可供分析和電腦模擬。需要進一步的材料研究。
se-space-data-card=一種多用途資料儲存設備。需要更進階的數據驅動研究。
se-space-decontamination-facility=清潔用於無菌環境的物質，並用於低壓條件的液體。
se-space-electromagnetics-laboratory=適用於強磁場和極高電壓應用的設備。
se-space-elevator=可以在行星或衛星地表及其軌道之間傳輸電線和火車。請參閱[img=virtual-signal/informatron]Informatron 中的太空電梯以了解更多資訊[__CONTROL__informatron__]
se-space-elevator-cable-nano=使用奈米材料，可以更有效地建造太空電梯電纜。
se-space-genetics-laboratory=致力於基因定序、基因改造和培養物基因列印的實驗室。
se-space-gravimetrics-laboratory=分析和模擬引力擾動。
se-space-growth-facility=在一系列其他地方不可能的控制條件下培養生物標本。除了標準氣候控制之外，還提供從微型微重力桶到高重力離心機的所有設備。
se-space-hypercooling=對熱流體進行熱交換，使一種熱流體變熱，另一種變冷。
se-space-laser-laboratory=雷射實驗。必須配戴護目鏡。
se-lifesupport-facility=在更惡劣的環境下維持生命。
se-space-manufactory=太空大規模生產的關鍵技術。
se-space-material-fabricator=合成新材料。粒子對撞機和 3D 列印機的結合。
se-space-matter-fusion=透過融合製造材料。
se-space-mechanical-laboratory=提供一系列機械過程：破碎、撕裂、剪切、振動等。
se-space-particle-accelerator=將粒子加速到接近光速。
se-space-particle-collider=碰撞高速粒子並分析結果。
se-space-plasma-generator=產生各種等離子體。
se-space-platform-plating=堅固的太空鍍層平台。太空行走平穩快速。
se-space-platform-scaffold=基本空間鷹架平台。可以建立一些東西，但不適合太空行走。
se-space-radiation-laboratory=一個相對安全的玩放射性物質的地方。可用於鈾處理。
se-space-radiator=散發掉過熱熱流體中的多餘熱量。
se-space-radiator-2=散發掉過熱熱流體中的多餘熱量。
se-space-radiating-efficiency=過熱熱流體的冷卻速度較慢，但資源效率較高。
se-space-radiating-speed=過熱熱流體的冷卻速度較快，但資源效率更高。
se-space-rail=在太空中可以安全使用的鐵軌，因為它們可以防止火車飛出軌道並摧毀一切。出於美觀原因也可以在陸地上使用。
se-recycling-facility=報廢棄物品並將廢料重新加工成原料。
se-space-science-lab=允許處理火箭科學包和更先進的太空科學。
se-space-simulation-dual=透過結合兩個學科來實現更有效率的模擬。
se-space-simulation-triple=透過結合三個學科，實現更有效率的模擬。
se-space-simulation-quad=最有效的模擬，結合了各個學科。標準超級電腦無法做到這一點。 
se-space-solar-panel=你可以在上面行走的高效能太陽能板。
se-space-spectrometry-facility=分光光度法、氣相層析法、質譜法和其他光譜法。向牆壁發射東西，使其彎曲，看看它撞到哪裡。
se-space-supercomputer=允許更高級的數據操作和處理以及模擬。
se-space-telescope=對可見光譜周圍多個波長敏感的精密望遠鏡。
se-space-telescope-gammaray=伽瑪射線不折射。這台強大的望遠鏡使用鏡子和特殊探測器。
se-space-telescope-xray=X射線會被大多數大氣層阻擋。這款功能強大的望遠鏡專為大氣層不成問題的太空而設計。
se-space-telescope-microwave=探測微波和宇宙微波背景的巨大望遠鏡。
se-space-telescope-radio=一個巨大的望遠鏡，可以探測來自遙遠來源的非常微弱的無線電波。
se-space-thermodynamics-laboratory=進行涉及極端溫度的過程。還可以執行基本的熱加工，例如熔煉。
se-spaceship=你可以用地板和牆壁一塊一塊地建造一艘太空船，然後使用控制台將其飛到另一個星球，甚至更遠的地方。
se-spaceship-integrity=每公升一級，太空船結構完整性應力極限增加 100。
se-factory-spaceship=每公升一級，太空船結構完整性應力極限增加 500。
se-superconductive-cable=一種不需要主動冷卻的超導複合電纜。
se-teleportation=解鎖其他傳送技術。這項技術本身沒有任何作用，但卻是通往其他技術的門戶。
se-tesla-gun=快速的火鏈閃電。每發箭矢最多可擊中 30 名敵人。在目標之間進行長跳，如果沒有目標，則沿著地面進行短跳。
se-thruster-suit=附推進器和磁力靴的太空服。沒有它就不要進入太空。
se-thruster-suit-2=改進的太空服，具有更強的推進器、更多的庫存和更大的網格。
se-thruster-suit-3=改進的太空服，具有更強的推進器、更多的庫存和更大的網格。
se-thruster-suit-4=改進的太空服，具有更強的推進器、更多的庫存和更大的網格。
space-science-pack=允許研究與空間物流、外來資源加工和地面結構的空間變體製造相關的技術。
se-aeroframe-pole=一種堅固的輕質鈹桿，通常用作航空和太空探索的支撐梁。
se-aeroframe-scaffold=一種堅固的輕質鈹結構框架，通常用作航空和航太導航船的主要內部骨架。
se-aeroframe-bulkhead=一種堅固的輕質氣密鈹壁，用作航空和太空探索船的外蒙皮或次艙壁。
se-lattice-pressure-vessel=一種堅固的輕質鈹壓力容器，具有內部晶格，可以讓某些流體壓縮到超出其正常極限。如果破裂，加壓流體會安全排出。
se-heavy-girder=重型銥結構梁，主要用於重工業和重型軍艦。
se-heavy-bearing=大型重型銥軸承，可以在壓碎較小材料的力道下無限期地工作。
se-heavy-composite=幾乎無法穿透的厚艙壁，幾乎不受熱、腐蝕、輻射和機械力的影響，但非常重。
se-heavy-assembly=用於重工業的齒輪和可配置零件的重型機械組件。
se-bioscrubber=利用生物過程分解不需要的材料的材料處理室。
se-vitalic-epoxy=一種極其堅固的生物來源環氧樹脂，具有再生特性。
se-vitalic-reagent=一種高效的多用途試劑，適用於多種化學反應。
se-vitalic-acid=各種酸的強烈混合。
se-self-sealing-gel=在壓力下是黏稠的凝膠，但在真空中卻像鋼一樣堅硬。通常用作艙壁的內部薄膜，以被動密封穿孔。
se-holmium-cable=專門設計用於消除線路中乾擾敏感電子設備的不必要噪音的護套電纜。
se-holmium-solenoid=一個極其強大的電磁體。
se-quantum-processor=利用疊加和糾纏更有效地解決高度複雜的問題。
se-dynamic-emitter=一種快速可調的光或粒子發射器系統，可以改變許多屬性以獲得更大範圍的掃描模式或材料穿透屬性。
se-naquium-cube=利用鈉奎提與時空的不尋常相互作用，將大體積折疊成小立方體。
se-naquium-tessaract=一種奇特的物體，它會形成類似立方體的形狀，但如果轉動或加速，就會轉變為一系列其他幾何形狀。
se-naquium-processor=鈉奎提立方體內的計算，繞過了計算密度的一些常見限制。
effect-transmission=8 個模組插槽，傳輸效率為 50%，最大模組功率為 4。將模組的效果傳送到 3 格內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。低功耗。
se-compact-beacon=10個模組插槽，傳輸效率75%，最大模組功率7.5。將模組的效果傳送到 2 格內附近的友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-compact-beacon-2=10 個模組插槽，傳輸效率為 100%，最大模組功率為 10。將模組的效果傳送到 2 格內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-wide-beacon=15個模組插槽，傳輸效率50%，最大模組功率7.5。將模組的效果傳送到 14 格內附近的友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-wide-beacon-2=20 個模組插槽，傳輸效率為 50%，最大模組功率為 10。將模組的效果傳輸到 14 個區塊內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。
kr-singularity-beacon=10 個模組插槽，傳輸效率為 100%，最大模組功率為 10。將模組的效果傳送到 2 格內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-lifesupport-equipment-1=生命維持效率提高 +100%（累加）。如果安裝在非維生設備中，效率加成將減半，並且在太空中不起作用。
se-lifesupport-equipment-2=生命維持效率提高 +200%（累加）。如果安裝在非維生設備中，效率加成將減半，並且在太空中不起作用。
se-lifesupport-equipment-3=生命維持效率提高 +400%（累加）。如果安裝在非維生設備中，效率加成將減半，並且在太空中不起作用。
se-lifesupport-equipment-4=生命維持效率提高 +800%（累加）。如果安裝在非維生設備中，效率加成將減半，並且在太空中不起作用。
se-supercharger=一次最多可為 64 個機器人高速充電。結構最大功耗為1GW。
se-pylon=分配電能。 64瓦連接範圍。
se-pylon-substation=分配電能。 64瓦連接範圍，64x64供電區域。
se-pylon-construction=分配電能並擴大建築面積。 64塊瓷磚連接範圍，64x64建築面積。
se-pylon-construction-radar=分配電能、擴大建築面積並提供雷達視野。 64 個瓷磚連接範圍，256x256 結構和視野區域。 4x4 物流區。
se-shield-projector=創建一個保護力場。投影機充電或防護罩損壞時需要更多能量。如果安裝了「Combat Mechanics Overhaul」模組，可以阻擋敵人的彈體。
se-deep-space-transport-belt=可放置在太空中的快速長距離運輸帶。可以使用不同的顏色從遠處輕鬆識別線條。
se-big-turbine=大型1GW發電機，吸入5000℃蒸汽，另一端輸出500℃蒸汽，側面輸出水。節能99%，節水99%。
se-big-heat-exchanger=專為高溫和高容量而設計的大型熱交換器。
se-addon-power-pole=設計用於連接到建築物或用於精確控制電力覆蓋範圍的小型電線桿。
se-zone-discovery-random=使用望遠鏡搜尋行星、衛星和小行星帶。
se-zone-discovery-targeted=搜尋擁有特定資源的行星、衛星和小行星帶。在[img=virtual-signal/informatron]Informatron > 區域發現中選擇資源首選項。
se-zone-discovery-deep=搜尋深星際空間的有趣區域。小行星帶可能擁有許多獨特且寶貴的資源。
se-delivery-cannon=軌道炮能夠將資源射入軌道及軌道外，並有一個裝甲箱來捕獲它們。
se-delivery-cannon-capsule-iridium=儘管銥是一種重金屬，但耐用性的提高意味著與標準輸送膠囊相比可以使用更少的材料。總重量相同，但製造更簡單。
se-delivery-cannon-weapon=能夠向其他地表發射原子彈等特殊彈藥的大型軌道炮。
se-spaceship-clamps=允許你放置對接夾具，以便太空船可以透過匹配夾具位置泊定到特定位置。自動化需要將「泊定使用」和「泊定到」訊號饋送到控制台。
se-bio-upgrade-constitution=增加最大生命值。
se-bio-upgrade-strength=增加承載能力。
se-bio-upgrade-agility=增加移動速度。
se-bio-upgrade-dexterity=提高製作速度。
se-bio-upgrade-intelligence=增加從每個科學包中獲得的知識。
se-energy-beaming=強烈的能量束，可以用作來自天空的武器，或在需要的地方傳輸能量。
se-energy-beam-defence=保護行星及其軌道免受天基能量束和日冕物質拋射的影響。其工作原理是將磁性粒子懸浮到保護性氣泡中，然後根據需要重新排列和聚集粒子以擴散敵方能量束。
se-nexus=可以在星際空間移動的太空船上啟動以產生數據的裝置，並且透過附加技術可以啟動空間扭曲場（太空船勝利）。
se-spaceship-victory=允許樞紐啟動扭曲驅動器以逃離當地的星團。讓 Nexus 在__3__完整性太空船上以扭曲驅動模式運作，以__1__速度在星際空間中移動__2__秒，以贏得遊戲。
se-arcosphere=允許收集在星際空間中失去的石圈。
se-arcosphere-folding=允許使用孤光球作為超維度鉗子。
se-space-probe=用於發射太空探測器的天基火箭發射井。也可用於廉價發射衛星。
se-linked-container=透過超維度空間與其他容器相連的容器。容器的連結取決於它首先放置的地表。
se-unit-capsule=部署友方__1__單位的膠囊。
se-centrifuge=處理各種配方以豐富或精煉材料。
steam-turbine=利用高溫蒸汽發電，例如熱交換器（持續供電）或電力鍋爐（能源儲存）。
se-space-belt=快速黏性和磁性運輸帶旨在防止物品飛入太空。
se-space-pipe=加壓隔熱管道，可防止水等流體在寒冷的真空空間中凍結。地下輸送的能力有限，但長管道變體非常適合快速長距離輸送流體。
se-pyroflux-smelting-beryllium=由於額外的生產力步驟，使用鈹的熱熔冶金製程的效率提高了一倍，甚至更高。
se-pyroflux-smelting-holmium=由於額外的生產力步驟，使用鈥的熱熔冶金製程的效率提高了一倍，甚至更高。
se-space-capsule-navigation=解鎖使用太空艙進行個人交通工具的能力。火箭部分可以直接添加到太空艙中，以便在沒有貨運火箭發射台的情況下發射。對於移動角色很有用，但對於他們的貨物卻沒有用。
industrial-furnace=更大、更快並且具有更多模組插槽。可以使用先進的冶煉和冶金配方，但不能使用窯爐配方。
se-kr-rare-metal-substrate=隨著對資料儲存介質需求的了解不斷深入，人們產生了改進基礎基板的想法，這種基板在需要稀土金屬的同時，生產效率也更高。
se-kr-efficient-fabrication=隨著我們的生產鏈中對電子元件數量的要求越來越高，在其生產中添加鋰可以減少對主要材料的浪費。
se-kr-fuel-refining=進一步擴張將需要更好的燃料加工。
se-kr-nutrient-enrichment=營養豐富可以實現更有效率的生產鏈。
kr-intergalactic-transceiver=這台機器利用微黑洞，可以與宇宙中任何地方的任何其他收發器進行即時通訊。
se-kr-transceiver-trigger=啟動收發器可以讓你聯繫更廣闊的星系並在其中定位自己。現在用你自己的太空船，你可以拯救自己。
se-kr-catalysed-condensation=冷凍石用於將現有大氣快速冷卻為更緻密的液體形式。然而冷卻速度的提高意味著液體中也會存在來自大氣的有害雜質，因此必須在分離前進一步淨化。
se-kr-catalysed-electrolysis=研究發現，銥及其氧化物可以降低電解水所需的能量，從而可以採用更快、更節能的過程將水分解成其組成元素。
epic-quality=你也許可以在你的太陽系的某個地方掠奪它。
legendary-quality=你也許可以在深空的某個地方掠奪它。

