se-core-fragment-processor=從核心碎片中提煉資源。
se-core-miner=允許從行星或衛星上無止盡的提煉資源，但如果在同一個星球上使用多個，資源就會遞減。消耗25MW。
se-core-miner-drill=允許從行星或衛星上無止盡的提煉資源，但如果在同一個星球上使用多個，資源就會遞減。消耗25MW。
se-dimensional-anchor=[font=default-bold][color=#f5cb48]放置限制：接近恆星的軌道[/color][/font]\n使用恆星的引力作為空間的穩定點。
se-electric-boiler=利用電能產生蒸氣。過程中能源效率高達 90%，因此不會覺得能量是在消耗的。高溫蒸汽可用於能量保存。低溫蒸氣可用於製作產品。
se-fluid-burner-generator=採用液體燃料（如液體火箭燃料）等來發電。簡單實用，但缺乏大型蒸汽系統的能源效率。專為太空設計。實際液體消耗量取決於液體型態。
se-holmium-ore=鈥原礦
se-iridium-ore=銥原礦。\n[font=default-bold][color=#e4cead]可開採：[/color][/font][img=entity/area-mining-drill]__ENTITY__area-mining-drill__
se-naquium-ore=納奎提礦石。\n[font=default-bold][color=#e4cead]可開採：[/color][/font][img=entity/area-mining-drill]__ENTITY__area-mining-drill__
se-meteor-defence-container=可以保護整個星球及其軌道免受流星雨的攻擊，但一次只能發射 1 發擊毀流星。必須再裝填彈藥並充滿電才能開火。 80% 的準確率。發射後需充電，充電時消耗20MW。
se-meteor-defence-charger=可以保護整個星球及其軌道免受流星雨攻擊，但一次只能發射 1 發擊毀流星。必須再度裝填彈藥並充滿電才能開火。 80% 的準確率。發射後需充電。充電時消耗20MW。
se-meteor-point-defence-container=保衛單一區域免受流星雨襲擊。儲存足夠的電力來發射最多 4 顆流星。必須再度裝填彈藥並有足夠的電量才能開火。範圍為 64 和 50% 準確度。有兩種充電模式，可透過按__CONTROL__se-mode-toggle__進行切換。\n\n[font=default-bold][color=red]正常[/color][color=#FFE7BD]/[/color][color=orange]快速[/color][/font][font=default-semibold][color=#FFE7BD]充電模式[/color][/font]\n[font=default-semibold][color=#FFE7BD]最大限度。消耗：[/color][/font]__1__/__2__\n[font=default-semibold][color=#FFE7BD]最小。消耗:[/color][/font]__3__/__4__\n[font=default-semibold][color=#FFE7BD]能量容量:[/color][/font]__5__/__6__\n[font=default-semibold][color=#FFE7BD]能源效率：[/color][/font]__7__/__8__
se-meteor-point-defence-charger=保衛單一區域免受流星雨襲擊。儲存足夠的電力後開火，每次齊射最多可發射攻擊 4 顆流星。必須再度裝填彈藥並有足夠的電量才能開火。範圍為 64 和 50% 準確度。有兩種充電模式，可以透過按__CONTROL__se-mode-toggle__進行切換。
se-meteor-point-defence-charger-overcharged=保衛單一個區域免受流星雨襲擊。儲存足夠的電力後開火，每次齊射最多可發射攻擊 4 顆流星。必須再度裝填彈藥並有足夠的電量才能開火。範圍為 64 和 50% 準確度。有兩種充電模式，可以透過按__CONTROL__se-mode-toggle__進行切換。
se-rocket-launch-pad=將倉庫中物品發射到太空。可搭載乘客，使用前門附近的__CONTROL__toggle-driving__ 進入。請參閱[img=virtual-signal/informatron]Informatron 中的貨運火箭以了解更多資訊[__CONTROL__informatron__]
cargo-landing-pad=火箭發射艙和貨運艙的運送場。
se-rocket-landing-pad=貨運火箭發射平台。
se-space-assembling-machine=一種可以在太空中工作的組裝機。
se-space-astrometrics-laboratory=空間天體測量實驗室。
se-space-biochemical-laboratory=生物化學的先進化學實驗室，還可以進行更基本的化學和石油加工。
se-space-capsule=使用__CONTROL__toggle-driving__進入太空艙。\n可用於區域之間的個人運輸，作為緊急逃生艙，或用於建造貨運火箭。
se-space-capsule-_-vehicle=使用__CONTROL__toggle-driving__進入太空艙。\n可用於區域之間的個人運輸，作為緊急逃生艙，或用於建造貨運火箭。
se-space-capsule-scorched=損壞的太空艙，需要翻新。使用__CONTROL__toggle-driven__進入。
se-space-capsule-scorched-_-vehicle=損壞的太空艙，需要翻新。使用__CONTROL__toggle-driven__進入。
se-space-decontamination-facility=清潔物質以供在無菌環境中使用，並準備液體以供在低壓條件下使用。
se-space-elevator=可以在行星或衛星地表及其軌道之間，傳輸訊息和火車。請參閱[img=virtual-signal/informatron]Informatron 中的太空電梯以了解更多資訊[__CONTROL__informatron__]
se-space-electromagnetics-laboratory=強磁場和極高壓應用設備。
se-space-genetics-laboratory=基因定序、基因改造和文化基因複製的實驗室。
se-space-gravimetrics-laboratory=分析和模擬重力擾動。
se-space-growth-facility=在不可能實現的條件下培養生物樣本，除氣候溫度控制外，還能從微重力到高重力離心所有設備。
se-space-hypercooler=對流體進行熱交換，使熱流體變冷，冷流體更加冷。
se-space-laser-laboratory=雷射實驗室，做好眼球保護。
se-lifesupport-facility=更惡劣的環境下維持生命功能。
se-space-manufactory=一台巨大的組裝機，但可以製作更複雜的配方，僅適用於太空（或太空船）。
se-space-material-fabricator=合成新的材料。
se-space-mechanical-laboratory=提供系列機械過程：破碎、撕裂、剪切、振動等。
se-space-particle-accelerator=將粒子加速到接近光速。
se-space-particle-collider=碰撞高速粒子並分析結果。
se-space-pipe-long=可以從上面走過去，只是比較長一點。
se-space-pipe-long-straight=長度__1__。側面無法連接。適用於平行管道和快速長距離輸送流體。
se-space-pipe-long-junction=長度__1__。有一個側面連接處。適合你想怎麼接就怎麼接。
se-space-pipe-to-ground=隨便你怎麼接都可以。
se-space-plasma-generator=產生各種等離子體。
se-pulveriser=粉碎和壓碎較硬的礦物或是星球核心碎片。
centrifuge=處理各種配方或精煉材料。
se-space-radiation-laboratory=一個相對安全的放射性物質處理。可用於鈾處理。
se-space-radiator=散發過熱流體的多餘熱量。
se-space-radiator-2=散發過熱流體的多餘熱量。
se-recycling-facility=將廢料和其他副產品回收為資源。
se-space-solar-panel=可以在上面行走的高效能太陽能板。
se-space-solar-panel-2=先進的高效能太陽能電池板，可以在上面行走。
se-space-solar-panel-3=非常高效的太陽能電池板，可以在上面行走。
se-space-spectrometry-facility=分光分鏡法、氣相層析法、質譜法和其他光譜層析法。向牆壁發射東西，使其彎曲，看看它撞到哪裡。
se-space-supercomputer-1=數據操縱、處理和模擬。
se-space-supercomputer-2=量子計算。改進的數據操作、處理和模擬。
se-space-supercomputer-3=量子運算框架上的自適應神經網路。改進的數據操作、處理和模擬。
se-space-supercomputer-4=奈米工程半導體有機超級計算機，利用空間扭曲和更高的維度來提高處理密度和能量傳輸。
se-space-legacy-straight-rail=專為太空設計，也可以在地面上使用。
se-space-science-lab=可以使用的高級科學包。
se-space-telescope=對可見光譜多個波長的精密望遠鏡。
se-space-telescope-gammaray=伽馬射線不會折射，因此無法用透鏡聚焦它們。這台強大的望遠鏡使用鏡子和特殊探測器。
se-space-telescope-xray=X射線會被大多數大氣層阻擋。這款功能強大的望遠鏡專為非大氣層的太空而設計。
se-space-telescope-microwave=探測微波和宇宙微波背景的巨大望遠鏡。
se-space-telescope-radio=一個巨大的望遠鏡，可以探測來自遙遠非常微弱的無線電波。
se-space-thermodynamics-laboratory=進行涉及極端溫度的過程。還可以執行基本的熱工藝，例如熔煉配方。
se-space-transport-belt=防止你的物品飄走。
se-spaceship-antimatter-engine=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n可做為太空船艙壁。
se-spaceship-antimatter-booster-tank=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n太空船發射所需。
se-spaceship-ion-engine=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n使用離子流，推進力大。可做為太空船艙壁。
se-spaceship-ion-booster-tank=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n納離子流太空船發射所需，只能從太空發射。
se-spaceship-console=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n用於在行星、衛星、軌道和小行星帶之間移動太空船。必須包含太空船牆壁/門，沒有間隙或孔洞。採用完整性檢查突顯出問題。
se-spaceship-console-output=輸出與太空船當前狀態相關的訊號。有關詳細信息，請參閱[img=virtual-signal/informatron]Informatron 中的太空船[__CONTROL__informatron__]。
se-spaceship-console-alt=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n該太空船控制台已損壞，無法用於控制太空船。
se-spaceship-gate=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n當門打開時，力場會停止減壓。可做太空船艙壁。
se-spaceship-rocket-engine=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n燃燒液體火箭燃料。可做太空船艙壁。
se-spaceship-rocket-booster-tank=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n容納液體火箭燃料。太空船發射所需。
se-spaceship-wall=[font=default-bold][color=#f5cb48]放置限制：太空船地板[/color][/font]\n可做太空船艙壁，對角間隙容易被破壞。
se-spaceship-circuit-network-restore=如果在你的太空船上看到這個，那就說明出了問題。
beacon=（太空探險：8 個模組插槽，傳輸效率為 50%，最大模組功率為 4。將模組的效果傳送到 3 格內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。低功耗。）
se-compact-beacon=10個模組插槽，傳輸效率75%，最大模組功率7.5。將模組的效果傳送到 2 格內附近的友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-compact-beacon-2=10 個模組插槽，傳輸效率為 100%，最大模組功率為 10。將模組的效果傳送到 2 格內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-wide-beacon=15個模組插槽，傳輸效率50%，最大模組功率7.5。將模組的效果傳送到 14 格內附近的友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-wide-beacon-2=20 個模組插槽，傳輸效率為 50%，最大模組功率為 10。將模組的效果傳輸到 14 個區塊內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。
kr-singularity-beacon=10 個模組插槽，傳輸效率為 100%，最大模組功率為 10。將模組的效果傳送到 2 格內的附近友方實體。多個模塊分享塔將使其過載並阻止其運作。
se-supercharger=一次最多可為 64 個機器人高速充電。結構最大功耗為1GW。
se-addon-power-pole=設計用於連接到建築物，或用於精確控制電力覆蓋範圍內的小型電線桿。
se-pylon=分配電能64連接範圍。
se-pylon-substation=分配電能64連接範圍，64x64供電區域。
se-pylon-construction=分配電能並擴大建築面積。 64塊連接範圍，64x64建築面積。
se-pylon-construction-radar=分配電能、擴大建築面積並提供雷達視野。 64 個連接範圍，256x256 結構和視野區域。 4x4 物流區。
se-shield-projector=創建一個保護力場。投影機充電或防護罩，損壞時需要更多能量。如果安裝了「Combat Mechanics Overhaul」模組，可以阻擋敵人的彈體。
se-big-turbine=一個大型發電機，吸入5000℃的蒸汽，另一端輸出500℃的蒸汽，側面輸出水。 2% 的輸入能量未被使用並包含在輸出蒸氣中。
se-big-heat-exchanger=專為高溫和高容量而設計的大型熱交換器。
se-delivery-cannon=能夠將資源射入軌道及軌道外的軌道炮。若未安全使用會造成損壞，請謹慎使用。 1GJ容量，充電時50MW。
se-delivery-cannon-chest=一個裝甲箱，在安全地捕獲高速下落的資源。需要庫存空間才能安全地接貨。
se-delivery-cannon-weapon=能夠將彈藥射入軌道及軌道外的大型軌道炮。謹慎使用。
se-spaceship-clamp=太空船上的夾子可以泊定，到面向相反方向的夾子上。可做太空船艙壁。
se-spaceship-clamp-place=太空船上的夾子可以泊定，到面向相反方向的夾子上。可做太空船艙壁。
se-spaceship-clamp-power-pole-external-east=夾子上的電線連接點。泊定時將電路訊號和電源傳遞至連接的夾具。
se-spaceship-clamp-power-pole-external-west=夾子上的電線連接點。泊定時將電路訊號和電源傳遞至連接的夾具。
se-space-accumulator=高密度能量儲存器。
se-space-accumulator-2=高密度能量儲存器２。
se-energy-transmitter-emitter=產生能量束的地表建築物。可用作為武器或將能量傳輸至能量束接收器。需要附加能量束室和連接能量束注入器。光束強度取決於噴射器的數量。
se-energy-transmitter-chamber=必須連接到能量束發射器。其他可以連接到任一側末端或中間。能量束注入器只能連接到側面。
se-energy-transmitter-injector=必須連接到能量束室並連接到發射器。噴射器具有固定的功率消耗，每個噴射器都會增加發送的能量，為接收器提供更多的熱量，或增加光束武器的速度和傷害。
se-energy-transmitter-injector-reactor=必須連接到能量束室並連接到發射器。噴射器具有固定的消耗功率，每個噴射器都會增加發送的能量，為接收器提供更多的熱量，或增加光束武器的速度和傷害。
se-energy-receiver=捕捉能量束作為熱量。發射器必須處於通電模式，且目標須位於接收器上。
se-energy-beam-defence=能量束防禦設施。防禦天基能量束和日冕物質拋射。發揮作用的唯一要求是能量，基本功率為 10MW，但會根據攻擊光束的強度而增加。每個行星和軌道只需要 1 個防日冕物質拋射、防能量束武器 1 個就可以防禦高達 500GW 的攻擊力。有關詳細信息，請參閱[img=virtual-signal/informatron]Informatron 中的能量束[__CONTROL__informatron__]
spidertron=如果火箭未設置在著陸平台上，則可以從貨運火箭部署。
se-nexus=僅在移動的太空船上起作用，能量消耗與速度成正比。可從星際中取得數據，數據產生是基於船舶動能。 Nexus 的設計目的是充當扭曲驅動器，透過正確的技術可以逃離本地恆星團。\n施加 2000 容器完整性壓力。
se-nexus-charger=僅在移動中的太空船上起作用，能量消耗與速度成正比。可以從星際中取得數據，數據產生是基於船舶動能。 Nexus 的設計目的是充當扭曲驅動器，透過正確的技術可以逃離本地恆星團。
se-space-probe-rocket-silo=用於發射太空探測器的發射井。
se-linked-container=透過超空間與其他容器相連的容器。容器的連結取決於它首先放置的地表。
se-core-seam=可以使用[img=entity/se-core-miner-drill]核心採礦鑽頭進行開採以獲得__1____2__。裂縫可以用[img=item/cliff-explosives]懸崖炸藥或[img=item/grenade]手榴彈密封，以便在其上建造。
se-core-seam-sealed=該接縫已經密封。可以使用[img=entity/se-core-miner-drill]核心採礦鑽頭開採以獲得__1____2__。
se-core-seam-fissure=此裂縫可以用[img=item/cliff-explosives]懸崖炸藥或[img=item/grenade]手榴彈封閉，以便在其上建造。
kr-fusion-reactor=融合[item=dt-fuel]DT 燃料電池中的原子以產生大量能量。一座聚變反應器可支援16台先進渦輪機。
se-kr-advanced-condenser-turbine=先進的冷凝器渦輪機的能源效率為 75%，但所用蒸汽的 99% 以水的形式返回。溫度範圍：950至1625。

