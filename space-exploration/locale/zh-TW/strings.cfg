title_archeology=考古學
page_archeology_text_1=我開始嘗試尋找更多大型幾何結構。這些衛星與以下行星上的[color=cyan]__1__[/color]形狀相符：
page_archeology_text_2=按一下條目可透過衛星查看。
menu_starmapping=[img=technology/se-zone-discovery-random]星圖
title_starmapping=星圖
page_starmapping_text_1=星圖繪製是透過反覆研究技術來實現的：[img=technology/se-long-range-star-mapping][color=cyan]Long Range Star Mapping[/color]。這項研究尋找其他星系中恆星的有趣模式。這有什麼實際用途嗎？可能不是。\n\n座標以標準向量(SV) 格式給出，根據宇宙背景輻射對齊。\n\n到目前為止，你已經映射了[color=cyan]__1__[/color]值得注意的圖案。
