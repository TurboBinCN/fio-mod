[mod-setting-description]
se-meteor-interval=流星雨撞擊之間的基本間隔（以分鐘為單位）。每次攻擊後，下一次攻擊被設定為發生 1 到該值之間的隨機分鐘數。
se-plague-max-runtime-2=生物武器的最大運作時間（以分鐘為單位）。瘟疫持續一段時間後，所有生物實體都會被摧毀。這可能最終會在敵人的報復攻擊完成之前將其消除。這個設定的目的是為了節省處理時間，而不是為了讓遊戲變得更容易。
se-planets=不要在遊戲中途進行更改，最好是更改設定後重開新遊戲，否則後果自負。
se-planet-size=不要在遊戲中途進行更改，最好是更改設定後重開新遊戲，否則後果自負。
se-seed=不要在遊戲中途進行更改，最好是更改設定後重開新遊戲，否則後果自負。
se-skip-experimental-warning=開始新遊戲的警告不會出現，如果訊息發生變化，你也不會收到更新的警告。
se-print-meteor-info=何時顯示流星雨警報。流星雨警報既顯示在聊天控制台中的報告，也顯示為地圖警報。
se-print-satellite-discovered-nothing=當探測衛星發射時，你會收到警報，告訴你發現了什麼。如果沒有發現任何內容，此設定可以停用警報，以免太吵。
se-never-show-train-gui=解鎖太空電梯或太空船後，每當你查看火車時刻表，添加不同區域的火車站時，都會打開一個車站選擇器界面。此設定會阻止該界面出現。
se-space-pipe-capacity=太空管道的流體容量。
se-electric-boiler=在遊戲開局中添加電力鍋爐。
se-deep-space-belt-speed-2=深空帶應該是最快的帶。如果你有其他模組添加了更快的輸送帶，你可以增加深空輸送帶的速度以匹配或超過。
se-deep-space-belt-black=可以停用黑色輸送帶、分離器和地下配方，以減少 UI 混亂。
se-deep-space-belt-white=可以停用白色輸送帶、分離器和地下配方，以減少 UI 混亂。
se-deep-space-belt-red=可以停用紅色輸送帶、分離器和地下配方，以減少 UI 混亂。
se-deep-space-belt-yellow=可以停用黃色輸送帶、分離器和地下配方，以減少 UI 混亂。
se-deep-space-belt-green=可以停用綠色輸送帶、分離器和地下配方，以減少 UI 混亂。
se-deep-space-belt-cyan=可以停用青色輸送帶、分離器和地下配方，以減少 UI 混亂。
se-deep-space-belt-blue=可以停用藍色輸送帶、分離器和地下配方，以減少 UI 混亂。
se-deep-space-belt-magenta=可以停用洋紅輸送帶、分離器和地下配方，以減少 UI 混亂。
se-show-zone-preview=取消勾選以停用 宇宙探索 中的區域預覽視窗。如果你啟用了異星工廠的某些調試疊加層，則預覽視窗可能會降低 FPS。
se-pylon-charge-points=取消勾選可刪除施工塔充電點。這有助於控制機器人充電行為，但你可能需要在長途路線上添加其他充電選項。
se-cmes-max-frequency=重複日冕物質拋射 (CME) 的最大間隔。該值以小時為單位，0=禁用。第一個 CME 是在第一分鐘開始，基本上是無害。第二次延遲約 48 小時。重複之間的延遲介於最大間隔設定的 50% 到 100% 之間。非零設定僅適用於新事件；一旦設定了預計到達時間，就不會受到影響。零設定將清除所有計劃的 CME，但更改可能需要一分鐘後才能生效。
se-spawn-small-resources=在開始時增加一些額外的資源。
se-show-overhead-button-satellite-mode=在螢幕左上角顯示一個圖示來切換導航衛星。
se-show-overhead-button-interstellar-map=在螢幕左上角顯示一個圖示來切換星際地圖。
se-show-overhead-button-universe-explorer=在螢幕左上角顯示一個圖示來切換宇宙導航器。
se-show-pin-help-tooltip=在螢幕左上角顯示訊息功能的工具圖示，提供如何使用它們的說明。
se-scan-search-budget=衛星掃描：一秒內可以檢查和跳過的已顯示區塊的數量。高值可以讓它加速通過已經掃描的區塊，到達未知的邊緣。
se-scan-chart-budget=衛星掃描：一秒鐘內可以繪製圖表的未揭示塊的數量。如果仍在生成先前的區塊，則不會發出新的圖表請求。
se-scan-alert-interval=地表掃描更新警報的時間間隔（以秒為單位）。揭露地表會增加遊戲儲存檔案的大小，最好要適度的修剪不必要的地圖，否則會有超大的存檔，導致每次儲存要很久時間。
se-scan-max-range=衛星掃描：停止前允許掃描從地表原點開始的最大範圍（以圖塊為單位）。行星永遠不會被掃描到超出其半徑的範圍，最大行星半徑為 10000 格。大於 10000 個圖塊的值僅適用於太空區域。
se-core-seam-map-tags=啟用後，每當核心裂縫被發現時，它都會自動標記在地圖上。
se-lifesupport-hud-visibility=選擇何時顯示生命維持設備的圖形。
se-supercharger-individual-charge-rate=設定增壓器中每個充電埠的充電速率，以 MW 為單位（不影響最大充電速率）。最小（預設）值為 90 MW，足以一次為普通機器人充電，最高可達 1000 MW，或 1 GW，即增壓器的最大充電速率。
se-dropdowns-hide-low-priority-zones=隱藏下拉式選單中的低優先區域以供目的地選擇。啟用後僅顯示優先順序大於或等於「優先臨界值」設定中設定的值的區域。可以在 宇宙探索 中修改區域優先權。
se-dropdowns-priority-threshold=臨界值，低於該值的區域將不會顯示在目的地選擇的下拉式選單中。如果「隱藏下拉式功能表中的低優先區域」關閉，則不執行任何操作。
robot-attrition-factor=機器人崩潰幾率的乘數。\n注意：在太空探索中，此乘數影響你母星 100% 的機器人，以及其他區域的 50% 。
se-add-icon-labels=一些配方和物品圖示可能很難區分。此設定會在圖示上添加數字或字母，使它們更加獨特。例如，觀察框架和目錄層。
se-delivery-cannon-artillery-timeout=如果未滿足，武器投遞巨炮會在這麼多秒後超時。
se-use-underground-collision-masks=開啟後[entity=se-space-underground-belt]和[entity=se-space-pipe-to-ground]無法穿越空白空間。
se-use-new-space-rail-graphics=暫時設置，僅在使用高架軌道時停用。
kr-stack-size=增加許多原始版本和 K2 物品的堆疊大小。 （預設：無更改）

