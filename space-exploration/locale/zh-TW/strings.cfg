[string-mod-setting-description]
se-lifesupport-hud-visibility-option-1=始終顯示圖形。
se-lifesupport-hud-visibility-option-2=僅在攜帶維生設備或需要生命維持時顯示圖形。
se-lifesupport-hud-visibility-option-3=僅在需要生命維持時才顯示圖形。
se-lifesupport-hud-visibility-option-4=切勿顯示圖形。
se-print-meteor-info-always=全部顯示流星雨警報。
se-print-meteor-info-current-zone-only=僅顯示落在你目前查看區域流星雨的警報。如果該區域是行星或衛星，則會顯示主地表和軌道地表的警報。
se-print-meteor-info-breakthrough-only=僅顯示在你的防禦範圍內，未能擊落的流星雨警報。這可能是沒有射擊，或者是防禦缺乏彈藥或能量。
se-print-meteor-info-breakthrough-and-current-zone-only=顯示在你的防禦和查看的範圍，未能擊落的流星雨警報。
se-print-meteor-info-never=不顯示流星雨警報，再大顆來也不怕，呼四。

