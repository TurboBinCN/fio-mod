interburbulator_introduction=Interburbul 是由 Brontion Burbulator 33027756 製作的遊戲。目標是猜測投射到 Brontion 選擇的突出顯示單元中的 3D 向量。給出了網格 3 個角的 3D 向量，這些點描述了一個 3D 平面，並且你的猜測從原點 {0,0,0} 投影到該平面上。共有 10 輪，難度逐漸增加，完成每一輪都會獲得獎勵。完成 5 個挑戰即可解鎖自由遊戲模式並設定自己的挑戰。
