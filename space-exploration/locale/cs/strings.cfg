interburbulator_introduction=Interburbul je hra vytvořená Brontionem Burbulatorem 33027756. Cílem je odhadnout 3D vektor který se promítá na vyznačenoé políčko vybrané Brontionem. 3D vektory tří rohů jsou zadány, tyto body popisují rovinu a váš tip je promítán na rovinu z počátku {0,0,0}. Je zde 10 kol postupně se zvyšující obtížnosti a ceny za každou jednu splněnou. Dokončete 5 výzev a odemkne se vám režim volné hry ve kterém můžete navrhovat vlastní výzvy.
