discovered-anomaly-additional=Neznámý objekt byl detekován v [img=virtual-signal/se-anomaly] anomálii. Váš [img=virtual-signal/informatron] Deník Průzkumu [__CONTROL__informatron__] byl aktualizován.
satellite-discovered-nothing=Nový satalit byl vyslán ale nenalezl nic nového. Může tu být k více k odhalení okolo ostatních hvězd. (I tak jste obdržel [item=se-satellite-telemetry])
tech-discovered-nothing=Teleskopy nenalezli nic nového okolo hvězdy. Stále může být více k nalezení v hlubokém vesmíru.
