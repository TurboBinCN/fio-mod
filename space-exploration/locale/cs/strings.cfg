page_spaceships_text_1=Vesmírné lodě jsou velká a mocná vozidla které mohou vznést mnoho obsažených konstrukcí, předmětů a hráčů do vesmíru a poté létat kolem hvězdné soustavy pro přistání na jiných površích.
page_spaceships_text_2=Váš aktuální limit namáhání integrity je [color=cyan]__1__[/color].\nMomentálně máte [color=cyan]__2__[/color] vesmírných lodí.\nMaximální rychlost dosažená vesmírnou lodí je [color=cyan]__3__[/color] (pouze právě existující lodě jsou započítány).
page_spaceships_construction_text_1=[font=heading-2][color=#ffe6c0]Přehled[/color][/font]\nVesmírné Lodě jsou tvořeny dlaždicemi a menšími komponenty které do sebe zapadají pro vytvoření vesmírných lodí vlastních návrhů. Vesmírnou loď navrhujete skoro jako malou pohyblivou základnu.\n\nZačněte návrhem paluby vesmírné lodě. Nestavte moc abiciózně, neboť vašich prvních pár vesmírných lodí bude striktně omezeno na velikosti, postupně rozšířitelné výzkumem. Postavte stěny po obvodu pro vytvoření přepážky a ujistěte se že v ní nejsou žádné mezery (včetně diagonál). Postavte řídící konzoli vesmírné lodi, jádro vaší vesmírné lodě pomocí které ji budete ovládat. Jakmile je řídící konzole položena, bude paluba kolem pulzovat jak konzole zjišťuje které části jsou připojené, které části jsou patřičně uzavřené a které odpadnou pokud se pokusíte vzletět. Pokud část paluby svítí červeně, je zde problém s vaším designem který můžete diagnostikovat pomocí řídící konzole vesmírné lodě. Dále budete potřebovat posilovací nádrž vesmírné lodě a motory vesmírné lodě. Posilovací nádrž drží palivo které potřebujete pro vzlet do vesmíru. Raketové motory jsou pro pomalejší let prostorem, kdežto iontové jsem pro rychlý let vesmírmem. Forma obrany na přídi (vždy severně) se také hodí, neboť místní mlhovina je plná sutě.\n\n[font=heading-2][color=#ffe6c0]Integrita Lodi[/color][/font]\nZe začátku budete velmi limitovaný na velikosti vesmírné lodě Limitem Integrity, záviejcí na vaší technologické úrovni; Dodatečné technologie vám umožní stavět větší lodě. Test integrity je počítán ve 2 částech:\n\nČást A: Namáhání trupu je založeno na velikosti a tvaru lodi.\nČást B: Namáhání nákladem je založeno kapacitou předmětů a tekutin lodi.\n\nCelkové namáhání integrity je kterýkoliv z faktorů, který je větší, hodnoty nejsou dávány dohromady. Pokud je vaše namáhání trupu je 250 a namáhání nákladem je 280, konečné namáhání integrity bude 280.\n\nUkazatel namáhání trupu ukazuje tři hodnoty; první je zlevněná hodnota založená na prázdných dlaždicích lodi. Až 10%  z celkové velikosti lodi bude zanedbáno z namáhání trupu pokud se bude jednat o prázdné dlaždice. Tento uvolněný prostor je odečten z výpočtů namáhání integrity a je užitečné pro vytváření chodeb. Druhá hodnota je namáhání trupu bez žádných slev a je užitečné pro odhadování namáhání integrity lodi pokud by jste zaplnil všechen interiér strukturami. Třetí hodnota je maximální integrita lodi dosažená aktuálním technologickým pokrokem.\n\nVelmi dlouhé lodě nebo lodě s velmi tenkými částmi uprostřed jsou méně robustní nežli více zakulacené lodě. Široké lodě jsou více odolné ale naopak musí čistit více asteroidů.\n\nNěkteré stavby mají speciální efekt na rychlost nebo integritu lodi, jako například Nexus.\n\n[font=heading-2][color=#ffe6c0]Zaoblení lodí[/color][/font]\nTento kout vesmíru je zaneřáděná mlhovina. Když zeštíhlíte vaší vesmírnou loď můžete vylepšit maximální rychlost lodi až o 30%. Vytvořením ploché přídi by mělo být omezeno, ačkoliv nemusíte vytvářet klín. Až 1/3 přídě může být placatá bez penalizace. Kruhové tvary by měli být také v pořádku. Můžete manuálně zapnout kontrolu integrity jak je na tom zakulacení.\n\n[font=heading-2][color=#ffe6c0]Rychlost[/color][/font]\nRychlost lodi je založena na výkonu motorů oproti váze lodi (odhadované od namáhání integrity). Motory mohou být stavěny na/do lodi, ale motory na zádi s volným prostorem za nimi budou více efektivní. Plně uzavřené motory mají 60% efektivitu. Motory na okraji lodi také mají malou výhodu.\n\nMůžete nastavit cílenou rychlost lodi kterou se bude snažit dosáhnout. Pokud loď překročí tuto hodnotu, začne vypínat motory pro přiblížení se cílené hodnotě pro ušrtření paliva. Jsou zde 3 možnosti omezení rychlosti, tudíž můžete nadále snižovat vaši rychlost v oblastech s vysokou hustotou asteroidů, které by jinak mohli přemoci vaší obranu.\n\n[font=heading-2][color=#ffe6c0]Daleké cestování[/color][/font]\nPokud uvažujete o dlouhých letech, je důležité poznamenat že spoustu věcí můžete dělat v satalitním režimu zatímco je vaše tělo na cestách. Také můžete dávat rozkazy vesmírné lodi na dálku pomocí satalitního přenosu.\n\n[font=heading-2][color=#ffe6c0]Továrny[/color][/font]\n[color=#ffaaaa]Upozornění: Továrny navržené pro vesmírné užití budou schopné používat recepty sdílené dalšími pozemními stavbami i když je loď na zemi. Pokud je nastaven pro vesmír navržený recept zatímco je loď na zemi, ingredience budou ztraceny. Některé pozemní stavby mohou fungovat i ve vesmíru, ale ztratí svoji schopnost používat moduly produktivity zatímco budou ve vesmíru. Pokud loď vzletí z povrchu s moduly produktivity v těchto stavbách, tyto moduly budou zničeny.[/color]\n\n[font=heading-2][color=#ffe6c0]Signály Vesmírných Lodí[/color][/font]\nPravá horní část řídící konzole lodi může být propojena kabely nezávisle na zbytku konzole, zatímco vysílá vlastní signály:\n[img=item/se-spaceship-console] Číslo konzole udává ID vesmírné lodi.\n[img=virtual-signal/signal-speed] Signál rychlosti říká, jak rychle se loď pohybuje: -1 pokud je zastavena, -2 pokud je zakotvena\n[img=virtual-signal/signal-distance] Signál vzdálenosti říká jak daleko to je do cílové destinace: -1 pokud tam již dorazila, -2 pokud je zakotvena, -3 pokud není zadána žádná destinace.\n[img=virtual-signal/se-planet-orbit] Čtvrtý signál udává jaká je cílová destinace, pokud nějaká je.\n[img=virtual-signal/signal-D] Signál D udává v jaké hustotě jsou asteroidy v prostoru kterým prolétá, vzhledem k tomu jak jsou různé části vesmíru různě zahuštěny asteroidy.\n[img=virtual-signal/signal-A] Pokud je loď zakotvená, signál A udá ID zóny ve které.\n\n[font=heading-2][color=#ffe6c0]Prospustnost Signálů[/color][/font]\nSvorky vesmírné lodě mají body pro připojení elektrické a obvodové sítě v jejich vrchních rozích. Když jsou svorky spojeny během automatického přistání, elektřina a obvodová síť jsou připojeny umožňující prostupnost elektřiny a signálů mezi zakotvenou lodí a lokací.
page_spaceships_automation_text_1=Existují dva způsoby jak automatizovat vesmírnou loď. Může být ovládaná podobně jako vlaky pomocí letového řádu, nebo může být ovládána pomocí logických obvodů.
page_spaceships_automation_scheduler_text_1=[font=heading-2][color=#ffe6c0]Létání pomocí letového řádu[/color][/font]\nLetový řád vesmírné lodi vám umožní automatizovat vesmírnou loď velmi podobně jako vlaky. Letový řád se může skládat z několika svorek ke kterým loď poletí a za kterých podmínek se může vznést k dalším svorkám. Svorkám můžou být přiděleny priority a limity vesmírných lodí. Přerušení můžete nastavit tak aby se mohly cíle lodi měnit dynamicky za letu. Letový řád lodi je uložen v její skupině s tím že vícero lodí může sdílet tu samou skupinu.\n\n[font=heading-3][color=#ffe6c0]Svorky[/color][/font]\nSvorky mohou být analogem pro vlakové stanice. Svorka má dvě charakterizující vlastnosti: její směr (směřující napravo nebo nalevo) a její jméno (podobné jménům železničních zastávek). Letový řád  ignoruje ID svorek. Pozice svorky v letovém řádu musí mít správné nasměřování a jméno aby se stala platnou destinaci.\n\nPokud je zde více svorek s odpovídajícím jménem ke kterým může loď přistát, vydá se k té s nejvyšší prioritou. Pokud má více svorek nejvyšší prioritu, loď se vydá k té, ke které je vyžadovaná nejmenší letová vzdálenost.\nTaké můžete nastavit limit na jednotlivých svorkách. Stejně jako vlaky a vlakové limity, vesmírné lodě si zarezervují svorku když se vydají na jejich cestu. Pokud má svorka již dost lodí na cestě (nebo zakotvené) aby dosáhli limitu, další lodě nebudou schopné si vybrat tuto svorku a poletí k další platné destinaci nebo počkají.\nLimit může být nastaven ovládací sítí, pomocí signálu [img=virtual-signal/signal-L], stejně jako priorita která se řídí signálem [img=virtual-signal/signal-P].\n\n[font=heading-3][color=#ffe6c0]Přerušení[/color][/font]\nPřerušení může vytvořit dočasnou zastávku (nebo více) v letovém řádu pokud jsou určité podmínky splněny. Veškeré přerušení jsou zkontrolovány jakmile jsou všechny čekací podmínky aktuální destinace splněny. Není (v současné chvíli) možné přerušit přerušení.\n\n[font=heading-3][color=#ffe6c0]Přesměrování (aka Repathing)[/color][/font]\nVesmírná loď se nikdy nepřesměruje uprostřed letu kvůli riziku vypotřebování veškerého paliva, s pár vyjímkami: Pokud je destinační svorka zničena, loď se přesměruje, třeba i do jiné zóny. Při dosažení zóny s cílovou destinací a pokusení se přistát, loď bude postupně měnit svoji rezervaci na jiné svorky stejné identifikace a stejné nebo vyšší priority pro rychlejší přistání.\n\n[font=heading-3][color=#ffe6c0]Přískoky[/color][/font]\nDestinace může být definovaná jako přískoková, což znamená že vesmírná loď poletí poblíž oné zóny a poté bude pokračovat k další destinaci v letovém řádu. Vesmírná loď nebude přistávat, tudíž nepotřebujete jedinou svorku v přískokové zóně.
page_spaceships_automation_circuits_text_1=[font=heading-2][color=#ffe6c0]Létání pomocí ovládací sítě[/color][/font]\nHlavní stuktura řídící konzole může přijímat vstupní signály na levé straně:\n[img=virtual-signal/signal-speed] Signál rychlosti nastavuje cílenou rychlost načež manipuluje s motorem. Negativní signál namísto toho zastaví motory.\n[img=virtual-signal/se-spaceship-launch] Pozitivní signál Vesmírné Lodi ji vznese.\n[img=virtual-signal/se-planet-orbit] Signál destinace nastaví cílovou destinaci (signály jednotlivých zón můžete vidět v postraní liště Vesmírného Atlasu poté co postavíte vesmírnou loď).\n\nPoznámka: Jak typ signálu (např. [img=virtual-signal/se-planet-orbit] or [img=virtual-signal/se-asteroid-belt]) a hodnota/id musí odpovídat zóně aby mohla být destinace nastavena.\n\nPoznámka: Řídící konzole vesmírné lodi nebude přijímat [img=virtual-signal/se-spaceship-launch] Vzletový ani [img=virtual-signal/signal-speed] Rychlostní signál dokuď hráč manuálně nevzletí s lodí alespoň jednou. To je aby se zabránilo kopírovaným lodím vzlétnout uprostřed stavby.\n\nPoznámka: Řídící konzole sleduje změny vstupních signálů každou sekundu; udržovaný signál je potřeba pro loď na zareagování, rychlé pulzy signálů nebudou fungovat.\n\n[font=heading-2][color=#ffe6c0]Automatické přistávání[/color][/font]\nAby vesmírná loď přistála, konzole musí dostat dva kotevní signály, buďto:\n"ukotvit pomocí levé svorky vesmírné lodi" ([img=virtual-signal/se-anchor-using-left-clamp]) s "ukotvit k pravé svorce" ([img=virtual-signal/se-anchor-to-right-clamp]) nebo\n"ukotvit pomocí pravé svorky vesmírné lodi" ([img=virtual-signal/se-anchor-using-right-clamp]) s "ukotvit k levé svorce" ([img=virtual-signal/se-anchor-to-left-clamp])\n\nHodnota signálu "ukotvit pomocí ..." musí odpovídat hodnotě svorky na lodi.\nHodnota signálu "ukotvit k..." musí odpovídat hodnotě svorky v destinaci.\nMůžete si prohlédnout a měnit hodnotu ID svorky otevřením jejího UI. Pokud je nalezena shoda jak pro signály  "ukotvit pomocí ..." a "ukotvit k..." dodané řídící konzoli, pokusí se loď zakotvit pomocí propojení oněch dvou svorek. Používejte opatrně.\n\nLoď bude vždy preferovat svorku s nejvyšší prioritou, kteréžto mohou být nastaveny pomocí signálu [img=virtual-signal/signal-P]. Limity vesmírných lodí na svorkách jsou ignorovány.\n\n[font=heading-2][color=#ffe6c0]Svorky[/color][/font]\nPro nastavení ID svorky, otevřte její GUI a změnte číselnou hodnotu signálu svorky na ID které chcete. Nikdy ovšem nemusíte měnit typ signálu svorky.\n\nMůžete  zakázat zakotvenou svorku tím, že jí pošlete červený signál.\n\n[font=heading-2][color=#ffe6c0]Příklad Přistání[/color][/font]\nVesmírná loď má levou svorkou s ID 315. V GUI svorky je signál [img=virtual-signal/se-anchor-using-left-clamp] s hodnotou 315.\nPřistávací povrch má pravou svorku s ID 147. V GUI svorky je signál [img=virtual-signal/se-anchor-using-right-clamp] s hodnotou 147.\nAby loď přistála pomocí těchto dvou svorek, levé části řídící kozole lodi musí být předány tyto signály:\n[img=virtual-signal/se-anchor-using-left-clamp] 315\n[img=virtual-signal/se-anchor-to-right-clamp] 147
menu_arcospheres=[img=item/se-arcosphere-a] Arkosféry
title_arcospheres=Arkosféry
page_arcospheres_text_1=Arkosféry jsou dokonalosti blížící se sféry nanoinženýrsky poskládaných krystalů naquia. Jejich původ je neznámý, ale nejběžněji na ně lze narazit poletující hluboko v mezihvězdném prostoru./n/nKaždá z nich v sobě zahrnuje vícedimenzionální uzel v časoprostoru který umožňuje komunikovat s malou čtyř prostorovou dimenzí. Sféry mohou být polarizovány, tudíž můžete manipulovat s určitými aspekty časoprostoru pokud jsou postveny relativně jeden k druhému. Soustava specifických arkosfér může být použit k zvlnění a prohnutí časoprostoru do vyšších dimenzí./n/n[font=heading-2][color=#ffe6c0]Použití[/color][/font]/nArkosféry jsou nejunikátnější produkčním řetězcem v celé hře. Jsou používany jako nástroje v receptech, nikdy však nejsou zničeny, vždy pouze pozměněny. Hlavní výzvou v jejich používání je cyklení sfér aby vám nedošel specifický typ sféry. Je zde mnoho cest pro dosažení rovnováhy v produkci, ale pár kombinátorů může dosti pomoci. Pokud se zasekneš, zeptej se na nápovědu na Discordu, nebo viz Space Exploration wiki.\n\n[font=heading-2][color=#ffe6c0]Kolekce[/color][/font]\nArkosféry jsou nalezeny vysíláním Arkosférních sběračem z asteroidových polích. Opakované vysílání má sníženou návratnost. Lepší výsledky můžete získat vysíláním z jiných asteroidových polí.
page_arcospheres_text_deep=Arkosféry nalezené v hlubokém mezihvězdném vesmíru: [color=cyan]__1__ arkosfér[/color] / __2__ zběračů vysláno.
page_arcospheres_text_zone=Arkosféry nalezené poblíž __1__: [color=cyan]__2__ arkosfér[/color] / __3__ zběračů vysláno.
menu_exploration_journal=[img=item/se-thruster-suit] Deník Průzkumu
title_exploration_journal=Deník Průzkumu
page_journal_title_backstory=Probuzení na špatné straně ohnivé koule
page_journal_text_backstory=Probral jsem se ztrokotaný na neznámé planetě s troskami lodě hořícími kolem mě. Moje tělo bylo pohmožděné, odřené a ohořelé, ale nic vážného. Poranění mojí hlavy bylo očividně vážnější, hlava se mi mohla rozskočit a světlo bylo olepující. Ještě hůře, nemohl jsem si vzpomenout jak jsem se sem dostal, ani kdo vlastně jsem kromě jména a vágního smyslu účelu... stavět. Ani potom jsem se nemohl rozvzpomenout co stavět nebo jak stavět. Nejdříve jsem si myslel že moje hlava byla poraněna při pádu a že se mi vzpomínky vrátí, ale oni se stále nevracejí. Fakt, že datové záznamy jsou také prázdné či přeformátované mě nutí přemýšlet i nad dalšími vysvětleními.
page_journal_title_satellite_launch=Oko v oblacích
page_journal_text_satellite_launch=Podařilo se mi vyslat satalit na orbitu. Je to důležitý milník a je hodný oslav, ale je tady ještě spousta práce. Toto je pouze začátek.
page_journal_text_weapons_cache=[img=item/satellite] Satalit detekoval [color=cyan]vojenskou skrýš[/color]. __1__
page_journal_title_cargo_launch=Do nekonečna a ještě dál
page_journal_text_cargo_launch=Dokážu se nyní vyslat do vesmíru. Již nejsem dále vázan na tento šutr jenž jsem začal nazývat domovem. Nebesa volají.
page_journal_title_entered_vault=Honba za relikviemi
page_journal_text_entered_vault=Vkročil jsem do jeskyně pod výčnělkem pyramidového tvaru na __1__, a našel jsem temnou, očividně nebezpečnou komnatu. V komnatě jsem nalezl dvě kartuše, jednu velkou a jednu malou. Obě měly na svém povrchu několik glyfů, společně s kruhy a čárami. Glyf přímo uprostřed velké kartuše se zdál být nejvýznamnější, ať už se jeho stvořitelé snažili předat jakoukoli informaci. A ať jde o jakoukoli informaci, nikdy jsem neviděl takové formátování. Za kartušemi jsem našel jakýsi válec, ve kterém bylo velmi výkonné zařízení, které mohu použít jako modul. Moduly takové kvality jsou tak cenné, že by nejspíš stálo zato najít více takových struktur. Možná nastal čas na trochu archeologie.
page_journal_title_found_gate=Anomálie
page_journal_text_found_gate=Nějaký velký prstencovitý artefakt byl nalezen v anomálii. I z dáli jsou na první pohled patrné dvě věci: Za 1.; je to starodávné. Za 2.; technologie toho je naprosto rozdílná od té mé. Cokoliv to je nebo bylo, nyní je to rozbité.
page_journal_title_found_gate_ship=Anomální Loď
page_journal_text_found_gate_ship=Část poměrně velké, opuštěné vesmírné lodi byla nalezena v anomálii, v blízkosti prstencovitého artefaktu. Technologie lodi je podobná té mé, ale je trochu více... uhlazená. Zřejmě jde o jinou technologii než v případě toho prstence. Tvar trosek vypadá jako by byla loď rozřezána v půlce, a nebo se srazila s prstencem. Možná by stála za záchranu.
page_journal_title_found_gate_ship_authenticated=Autorizace Anomální Lodi
page_journal_text_found_gate_ship_authenticated=Opuštěná loď uvnitř anomálie mě oskenovala a "autentifikovala mou biosignaturu". Nevím, jestli to znamená, že o mě má specifický záznam, nebo že mě to bere jako lepší volbu, než kousače nebo genocidní roboty. Zpráva uvádí, že kód k vzduchovému uzávěru je 2236067964. Lodní záznamy jsou dostupné, ale velké části chybí nebo jsou poškozeny.
page_journal_title_found_gate_ship_log=Záznamy Anomální Lodi
page_journal_text_found_gate_ship_log_intro=Demodamas 82B: AAI Hypernetový Konstrukční Křižník. Obsah Lodních Záznamů:
page_journal_text_found_gate_ship_log=...'¿s nominální.\nUpozornění: AAI brána Thyris 17: Mezigalaktický prototyp v0.1.93 je utajované zařízení. Je vyžadováno AAI ověření úrovně L90 nebo vyšší. Okamžitě se autentifikujte nebo budete zničeni.\nPřístupový záznam: Přístup k AAI bráně Thyris 17 povolen AAI inženýrovi L97 ID__1__.\nPřístupový záznam: Zahaj¶Ôàtá^...\n...'¿ris brána 17, frekvence 8 projektoru je uzamčená. Energie je na 216% bezpečné úrovně. Stabilita singularity: 99,4%.\nNavigační záznam: AAI brána Thyris 17 se připojila na projekční vektor [SV __2__]. Předpokládaný cíl: Galaxie Wube > Foenestra (anomálie, neprozkoumaná). Autentif¶Ôàtá^...\n...'¿vigační varování: Mezigalaktická hypertrubice (anulována).\nNavigační varování: Žádná hyperbrána v cílové destinaci (anulováno).\nUpozornění: Žádný kontrakt. Dostupné kontrakty: 0.\nPoznámka informatrona: Neexistují dostupné kontrakty se specifikací: "materializace s absencí brány". Jste si jisti, že je to bezpečné? [response.ignore.ignore_always]\nZáznam cesty: Vstup do anomálie Thyris > AAI brána Thyris 17 hypertrubice přiřazena k [SV __2__].\nZáznam cesty: Skok do hypertrubice [SV __2__] dokonč¶Ôàtá^...\n...'¿nam cesty: Aktualizace lokace: Hypertrubice v blízkosti anomálie Thyris, přiřazeno [SV __2__], stabilita 98%, prům¶Ôàtá^...\n...'¿nam cesty: Opouštění hypertrubice v neprozkoumané lokaci anomálie Foenestra.\nVarování: Neočekávaná kolize, srážka s neznámým objektem [4ae4c8d28f2], zahajuji skenování objektu [4ae4c8d28f2].\nZáznam poškození: 13.2% poškozeno. Zdroj: Poškození nárazem v důsledku srážky s neznámým objektem [4ae4c8d28f2].\nZáznam poškození sekcí: Poškozené sekce: A5, A6, A9, B6, B7, B8, C7. Nereagující sekce: A7, A8. (přesnost 86%)\nZáznam inženýrů: Známky života 99%. (přesnost 34%)\nZáznam cesty: Pokus o úhybný manévr RS100LT30.\nZáznam cesty: Opouštění hypertrubice dokončeno s chybami.\nZáznam cesty: Aktualizace lokace: Neprozkoumaná anomálie Foenestra.\nZáznam skenování: Skenování objektu [4ae4c8d28f2] dokončeno, rozlišení 0.002m^2 ve vzdálenosti -48.76m (přesnost 99.9%).\nZáznam detailů skenování: Hmotnost [4ae4c8d28f2] 92.5¶Ôàtá^...\n...'¿%).\nZáznam detailů skenování: [4ae4c8d28f2] Složení: Umělé. 34% Naquia, 29% Holmia, 37% neznámé složky (přesnost 89%).\nZáznam detailů skenování: Velikost [4ae4c8d28f2] : Přibližný průměr 68¶Ôàtá^...\n...'¿ilů skenování: Energetická signatura [4ae4c8d28f2] : Tok 54Gwb, radiační profil 2.8kJ/1.7MJ/1.6MJ/0.62J, profil toku 5.86GJ [051e376392b8d3f8]. (přesnost 98%).\nZáznam detailů skenování: Identifikace [4ae4c8d28f2] : Umělá konstrukce, neznámý výrobce, popis: Přibližně prstencovitý tvar s uzlíky, oktet. (přesnost 0.3%).\nZáznam detailů skenování: Přibližné schopnosti struktury [4ae4c8d28f2] : Hyperbrána (přesnost 47%). Jiné: Zbraň 42%, energetika 35%, výpočetní účely 17%, skenování 12%, průmysl 9%, vesmírná loď 7%, útočiště 2%.\nZáznam poškození: 68.2% poškozeno. Selhání integrity, sekce se oddělují. Zdroj: Sekundární tlakové vlny v důsledku srážky s objektem [4ae4c8d28f2].\nZáznam poškození sekcí: Kritický stav reaktoru. Poškozené sekce: D5, E4, E5, E6, F5. Nereagující sekce: A1, A2, A3, A¶Ôàtá^...\n...'¿lů: Nouzové vypuštění průzkumného letounu 2. Predikce trajektorie: Calidus > Nauvis.\nZáznam poškození: 91.7% poškozeno. Selhání integrity, sekce se odÄïmïŸ...
page_journal_title_distress_message=Nouzová Zpráva Odeslána
page_journal_text_distress_message=Konečně se mi podařilo poslat nouzovou zprávu domů. Zpráva která mi přišla v odpověď potvrdila to, čeho jsem se bál, tedy že jsem sám v tomhle koutu galaxie a že budu muset navrhnout a postavit vesmírnou loď která mě bude schopná odvézt domů.
page_journal_title_spaceship_victory=Vítěství Vesmírnou Lodí
page_journal_spaceship_victory=Postavil jsem extrémně rychlou a silnou vesmírnou loď a dosáhl jsem pohonu zakřivením. Chvíli trvalo, než se pohon stabilizoval do prakticky FTL stádia, ale jakmile se stabilizoval, mohl jsem podstoupit kriospánek pro následující cestu domů, do jedné předaleké galaxie. Zanechal jsem za sebou autonomní mezihvězdné impérium které jsem postovil od základů vlastníma rukama. Můj odkaz v tomto koutu vesmíru bude žít dál. 
page_journal_title_gate_victory=Vítěství Starodávnou Branou
page_journal_gate_victory=Velký prstencový artefakt, prastará intergalaktická brána, byla konečně opravena jak nejlíp jsem zvládl. S notnou dávkou intuice a hrubé síly se mi podařilo to rozchodit. Zakotvil jsem prostor zakřivující pole místní hvězdokupy, dešifroval nečíselny glifový souřadnicový systém a reverzním inženýrstvím i číslicový systém. Moje mysl je zdeformovaná natakolik mimozemskými koncepty, že je až s podivem že to už funguje a že jsem stořil portál domů. Cesta domů, do jedné předaleké galaxie trvala pouhý okamžik. Nechávám za sebou autonomní mezigalaktické impérium, postavené od základů mýma vlastníma rukama. Můj odkaz zde bude žít nadále.
menu_archeology=[img=entity/se-pyramid-a] Archeologie
title_archeology=Archeologie
page_archeology_text_1=Začal jsem se pokoušet najít více těchto velkých geometrických staveb. Satalit našel schodu v [color=cyan]__1__[/color] tvarech na těchto planetách:
page_archeology_text_2=Kliknutím do seznamu zobrazíte pomocí satalitu.
menu_starmapping=[img=technology/se-zone-discovery-random] Mapování hvězd
title_starmapping=Mapování hvězd
page_starmapping_text_1=Hvězdné mapování je dosáhnuto opakovaným výzkumem technologie: [img=technology/se-long-range-star-mapping] [color=cyan]Dalekosáhlé Hvězdné Mapování[/color]. Tento výzkum hledá zajímavé vzorce hvězd v jiných galaxiích, Má to nějaké praktické využítí? Asi ne.\n\nSouřadnice jsou dány ve formátu Standarních Vektorů (SV), srovnané na základě kosmického mikrovlného pozadí.\n\ndoposud jste našel [color=cyan]__1__[/color] váznamných vzorců.
technology-unlocked=Nová technologie byla odemčena a je nyní v technologickém stromu. __1__ __2__
