[mod-name]
space-exploration=Space Exploration

[mod-description]
space-exploration=Buduj nákladní rakety pro vyslání materiálů do vesmíru. Odleť s raketou do vesmíru sám a začni se procházet vesmírem. Postav orbitální platformu a vyviň složitou daty řízenou vesmírnou vědu. Postav vesmírnou loď plát po plátu, leť jím z povrchu planety na jinou planetu, měsíc, či na pole asteroidů. Postav mezihvězdný smrtící paprsek a hlubokovesmírné těžební kolonie. Prozkoumej starodávné ruiny na cizích planetách a relikvie ztracené v hlubinách kosmu. Nedoporučeno hrát s NEzávislými módy během experimentální fáze. 

