spidertron=Může být vypuštěn z nákladní rakety pokud není raketa nemíří k přistávací ploše.
se-core-seam-sealed=Tato průrva byla zasypána a může přes ní být stavěno. Může být znovu otevřena pomocí [img=entity/se-core-miner-drill] Jádrového dolu pro získání __1__ __2__.
