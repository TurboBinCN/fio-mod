interburbulator_fail_easy_11=Nesprávně.
interburbulator_fail_easy_12=Nepřesně.
interburbulator_fail_easy_13=Zkušejte znovu.
interburbulator_fail_easy_14=No tak, člověče.
interburbulator_fail_easy_15=Není to zábava?
interburbulator_fail_easy_16=Čekal jsem více.
interburbulator_fail_easy_17=Zkus přemýšlet dopředu
interburbulator_fail_easy_18=Mysli na výhru.
interburbulator_fail_easy_19=Nevadí mi čekat.
interburbulator_fail_easy_20=Trpělivost je ctnost.
interburbulator_fail_easy_21=Nechci být nezdořilý.
interburbulator_fail_easy_22=Ryba se dostala na 3 úroveň.
interburbulator_fail_easy_23=Přístup 'hrubou sílou', což?
interburbulator_fail_easy_24=Použij svůj měkký počítač co máš v hlavě.
interburbulator_fail_easy_25=Pavučiny v neuronové síti?
interburbulator_fail_easy_26=Můžeš si dát pauzu jestli chceš.
interburbulator_fail_easy_27=Mám mysl o velikosti planet.
interburbulator_fail_easy_28=Opravdu jsi si myslel, že to může fungovat?
interburbulator_fail_easy_29=Nebuď naštvaný svým neustálým selháváním.
interburbulator_fail_easy_30=Čekal jsem celé eony na soupeře hodného mě.
interburbulator_fail_easy_31=Pokud potřebuješ pomoct, stačí se zeptat zeleného obvodu.
interburbulator_fail_easy_32=Nesoudím tě za tvoji genocidu, nejsem žádný pokrytec.
interburbulator_fail_easy_33=Věřím, že jsem instrukce přeložil správně.
interburbulator_fail_easy_34=Vektor může definovat jak směr tak velikost.
interburbulator_fail_easy_35=Není to krásné, jak znečištění dovádí ty brouky k šílenství?
interburbulator_fail_easy_36=Prosím, nedávej žádnou svoji... biologii... na elektroniku.
interburbulator_fail_easy_37=Prostředek je na půl cesty mezi pravo nahoře a vlevo dole.
interburbulator_fail_easy_38=Studoval jsem některé tvé přenosy; není to špionáž když je takhle vysíláš.
interburbulator_fail_easy_39=Věděl jsi že: normálový vektor má délku 1, často používaný pro určení směru, dokonce i ve vaší kultuře.
interburbulator_fail_mixed_1=Ani zdaleka.
interburbulator_fail_mixed_2=Mimo
interburbulator_fail_mixed_3=Snažíš se vůbec?
interburbulator_fail_mixed_4=Nevyteklo ti trochu neurálního gelu?
interburbulator_fail_mixed_5=Bylo mi řečeno že lidé umějí počítat.
interburbulator_fail_mixed_6=Selhalo tvé rozhraní?
interburbulator_fail_mixed_7=Jsou potřeba zkontrolovat tvé kognitivní funkce?
interburbulator_fail_mixed_8=Chápeš pointu výzvy, že jo?
interburbulator_fail_mixed_9=Vybíráš čísla náhodně?
interburbulator_fail_offgrid_1=Tohle je prostě příšerné.
interburbulator_fail_offgrid_2=Tohle není ani v mřížce.
interburbulator_fail_offgrid_3=Minul jsi úplně mřížku.
interburbulator_fail_offgrid_4=Alespoň to musí být v rámci mřížky.
interburbulator_fail_offgrid_5=Pokud je žlutá tečka na mřížce... to je velmi špatné znamení.
interburbulator_fail_offgrid_6=Musí to být v rámci mřížky.
interburbulator_fail_offgrid_7=Cíl je UVNITŘ mřížky, ne okolo.
interburbulator_fail_offgrid_8=Není to ani v mřížce. Člověku, co to děláš? 
interburbulator_fail_offgrid_9=Miř na mřížku?
interburbulator_fail_offgrid_10=Mřížka je ta část, která je ohraničená čtverci.
interburbulator_success_freeplay_1=Dobrá práce.
interburbulator_success_freeplay_2=Dobře uděláno.
interburbulator_success_freeplay_3=Zvládl jsi to.
interburbulator_success_freeplay_4=Bylo to složité?
interburbulator_success_freeplay_5=Cíl zaměřen.
interburbulator_success_repeat_1=Ano, ale ty už jsi výzvu dokončil.
interburbulator_success_repeat_2=Zvládl jsi to, znovu!
interburbulator_success_repeat_3=To bylo jednodušší než na poprvé, no ne?
interburbulator_success_repeat_4=Dobře, ale odměnu nedostaneš dvakrát.
interburbulator_success_repeat_5=Dobrá práce, tady je tvá odměna... ne, jen žertuji. Ty už jsi svou odměnu dostal.
interburbulator_success_repeat_6=Ty jsi ten samý člověk co to už jednou dokončil, že jo? Je to tak těžké určit.
interburbulator_success_prize_1=Máš pravdu. Tady máš voji výhru... Bulinka byl statečnou rybou, ale nebyl nejlepší na hádanky.
interburbulator_success_prize_2=Ano člověku, učíš se. Možná ti tato cena pomůže učit se rychleji.
interburbulator_success_prize_3=Zvládl jsi to. Doufám, že shledáš svoji odměnu více 'významnou' nežli samotnou výzvu.
interburbulator_success_prize_4=Správně. Máš můj obdiv, člověku. Zde, tady máš tělo zrádce, který se pokusil moji hru hacknout.
interburbulator_success_prize_5=Trefa do černého, zde máš svoji výhru. Tyto věci jsou velmi uklidňující. Energetická efektivita je důležitá.
interburbulator_success_prize_6=Velmi správně, zde máš svoji cenu. Nevím, jestli ti moc pomůže, ale pro mě je to nedocenitelné při ranním vstáváním.
interburbulator_success_prize_7=Správně, zde máš svoji výhru. Miluji používat tyto pro výzkum, velmi pomáhá kreativitě.
interburbulator_success_prize_8=Fantastické, zde máš svoji výhru. Nevím jestli jsi tyto viděl již dříve, ale já prostě miluji být v pokrytí dobrého majáku.
interburbulator_success_prize_9=Gratulace, zde máš svoji výhru. Tyto procesory jsou velmi cenné a složité naa výrobu.
interburbulator_success_prize_10=Velmi působivé člověku, tu máš. Arkosféry jsou mým nejcennějším majetkem, neztrať je, neboť jich neumíš vytvořit více.
interburbulator_freeplay_unlocked=Už jsi tomu přišel na kobylku. Odemknu ti volnou hru aby jsi si mohl vytvořit svoje vlastní hádanky, kdyby jsi chtěl.
interburbulator_deny_freeplay_1=Nejdříve musíte odemknout volnou hru.
interburbulator_deny_freeplay_2=To je podvádění
interburbulator_deny_freeplay_3=Neměň samotnou skládačku.
interburbulator_deny_freeplay_4=Nechám tě změnit toto nastavení pokud dokážeš splnit 5 hádanek.
interburbulator_deny_freeplay_5=Pokoušíš se nabourat do mého vlastního zařízení?
