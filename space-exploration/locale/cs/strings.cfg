se-void-probe=Sbírá data z hlubokého vesmíru načež vrátí [img=item/se-void-probe-data] Data mezihvězdné sondy. Musí být vyslána z vesmírného sondového sila které je v poli asteroidů.
se-interstellar-data=Vytvořené v Nexuse v pohybujcí se vesmírné lodi. Pohybování v mezihvězdném prostoru ve větší a nebo rychlejší lodi vytváří data mnohem rychleji.
