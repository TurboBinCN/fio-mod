space-exploration=Základní nastavení pro Space Exploration. Toto sníží evoluci tak, aby křivka obtížnosti byla více vyvážená a aby Nauvis byl více 'jako Země', aby se ve srovnání další planety jevily více mimozemsky. Ciťte se volně pro jakoukoliv změnu nastavení jak chcete od tohoto, jakožto vašeho začátečního bodu. 

