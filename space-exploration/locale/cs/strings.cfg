[entity-description]
se-linked-container=Kontejner propojen extradimenzionálním prostorem k jinému kontejnru. Propojení kontejneru závisí na povrchu na který byl poprvé položen.
rocket-silo=Vyšlete satalit do vesmíru pro odemčení "Navigačního Satalitního Přenosu". Více satalitů může být vysláno pro objevení nových planet, měsíců a pásů asteroidů v solárním systému, ze kterého byl satalit vyslán. Po plném prozkoumání systému může objevit nové hvězdy.
se-antimatter-reactor=Anihiluje antihmotu hmotou za vývinu extrémního množství tepla.
se-beryllium-ore=Ruda Berylia
se-casting-machine=Grafika je pouze zástupná
se-condenser-turbine=75% energitická účinost parní turbíny ale 99% spotřebované páry je navráceno v podobě vody. Přijímá páru teploty od 100 do 999 stupňů.
se-core-fragment-processor=Extrahuje suroviny z fragmentů jádra.
se-core-miner=Umožňuje nekonečnou extrakci surovin z planet a měsíců, ale má zmenšujcí se výsledky pokud jich je několik použito na stejném tělese. Konzumuje 25MW.
se-core-miner-drill=Umožňuje nekonečnou extrakci surovin z planet a měsíců, ale má zmenšujcí se výsledky pokud jich je několik použito na stejném tělese. Konzumuje 25MW.
se-dimensional-anchor=Používá gravitační studnu hvězdy jako stabilizační bod pro prostorovou anomálii.
se-electric-boiler=Produkuje páru z vody pomocí elektrické energie. Má 90% účinnost, tudíž jím nezíkáváte elektřinu. Vysokoteplotní pára může být použita pro skladování elektřiny, pára nižších teplot naopak pro výrobu.
se-fluid-burner-generator=Vyžaduje kapalné palivo s výhřevní hodnotou (jako například kapalné raketové palivo) pro generování elektřiny. Jednoduchý a kompaktní, ale postrádajcí efektivitu větších systémů na parní bázi. Navrženo pro použití v kosmu. Skutečná spotřeba tekutin závisí na výhřevnosti paliva.
se-fuel-refinery=Automatizovaná struktura pro zpracování paliv.
se-holmium-ore=Ruda Holmia
se-iridium-ore=Ruda iridia.\n[font=default-bold][color=#e4cead]Těžitelné pomocí:[/color][/font] [img=entity/area-mining-drill] __ENTITY__area-mining-drill__
se-meteor-defence-container=Může bránit celou planetu před meteory, ale střílet jen na jeden najednou. Vyžaduje proti-meteorovou munici a plné nabití. 80% přesnost. Potřebuje nabití po každém výstřelu. Při nabíjení spotřebovává 20MW.
se-meteor-defence-charger=Může bránit celou planetu před meteory, ale střílet jen na jeden najednou. Vyžaduje proti-meteorovou munici a plné nabití. 80% přesnost. Potřebuje nabití po každém výstřelu. Při nabíjení spotřebovává 20MW.
se-meteor-point-defence-container=Brání oblast před meteority. Dokáže nastřádat dostatek energie na sestřelení až 4 meteorů během jedné salvy. Musí být naleženo municí lokální obrany proti meteorům a být dostatečně nabyté pro střelbu. Má dosah 64 a 50% přesnost. Má dva nabíjecí módy které můžou být změněny pomocí tlačítka __CONTROL__se-mode-toggle__.\n\n[font=default-bold][color=red]Normální[/color][color=#FFE7BD]/[/color][color=orange]Rychlý[/color][/font] [font=default-semibold][color=#FFE7BD]nabíjecí režimy[/color][/font]\n[font=default-semibold][color=#FFE7BD]Max. spotřeba:[/color][/font] __1__ / __2__\n[font=default-semibold][color=#FFE7BD]Min. spotřeba:[/color][/font] __3__ / __4__\n[font=default-semibold][color=#FFE7BD]Kapacita elektřiny:[/color][/font] __5__ / __6__\n[font=default-semibold][color=#FFE7BD]Energetická účinost:[/color][/font] __7__ / __8__
se-meteor-point-defence-charger=Brání oblast před meteority. Dokáže nastřádat dostatek energie na sestřelení až 4 meteorů během jedné salvy. Musí být naleženo municí lokální obrany proti meteorům a být dostatečně nabyté pro střelbu. Má dosah 64 a 50% přesnost. Má dva nabíjecí módy které můžou být změněny pomocí tlačítka __CONTROL__se-mode-toggle__.
se-meteor-point-defence-charger-overcharged=Brání oblast před meteority. Dokáže nastřádat dostatek energie na sestřelení až 4 meteorů během jedné salvy. Musí být naleženo municí lokální obrany proti meteorům a být dostatečně nabyté pro střelbu. Má dosah 64 a 50% přesnost. Má dva nabíjecí módy které můžou být změněny pomocí tlačítka __CONTROL__se-mode-toggle__.
se-naquium-ore=Ruda naquia.\n[font=default-bold][color=#e4cead]Těžitelné pomocí:[/color][/font] [img=entity/area-mining-drill] __ENTITY__area-mining-drill__
se-pulveriser=Rozdrtí a rozemele tvrdé minerály a fragmenty jádra planety.
se-rocket-launch-pad=Vysílá svůj inventář do vesmíru. Může brát pasažéry, vstupte pomocí __CONTROL__toggle-driving__poblíž předních dveří. Viz Nákladní Rakety v [img=virtual-signal/informatron] Informatronu pro více detailů [__CONTROL__informatron__]
se-rocket-landing-pad=Zavážkové místo pro kapsle nákladní rakety.
se-space-accumulator=Vysokokapacitní energetický zásobník.
se-space-accumulator-2=Vysokokapacitní energetický zásobník.
se-space-astrometrics-laboratory=Kombinuje, porovnává a kvatifikuje rozdílné zdroje astronomických informacích.
se-space-biochemical-laboratory=Pokročilá chemická laboratoř se zaměřením na biochemii. Může také vykonávat ropné a jednodušší chemické zpracování.
se-space-assembling-machine=Modifikovaná montovna která může fungovat ve vesmíru.
se-space-capsule=Vstupte do kapsle pomocí __CONTROL__toggle-driving__.\nMůže být použita pro osobní přepravu mezi zónami, jako záchraný modul nebo při stavbě Nákladní rakety.
se-space-capsule-_-vehicle=Vstupte do kapsle pomocí __CONTROL__toggle-driving__.\nMůže být použita pro osobní přepravu mezi zónami, jako záchraný modul nebo při stavbě Nákladní rakety.
se-space-capsule-scorched=Poškozená verze vesmírné kapsle. Požaduje rekonstrukci. Vstupte do kapsle pomocí __CONTROL__toggle-driving__.
se-space-capsule-scorched-_-vehicle=Poškozená verze vesmírné kapsle. Požaduje rekonstrukci. Vstupte do kapsle pomocí __CONTROL__toggle-driving__.
se-space-decontamination-facility=Čistí substance pro použití ve sterilním prostředí, a připravuje kapaliny pro použití v prostředí s nízkým tlakem.
se-space-electromagnetics-laboratory=Zařízení pro aplikaci intenzivních magnetických polí a extrémně vysokých napětích.
se-space-elevator=Může přesouvat vlaky a elektřinu mezi planetou či měsícem a její orbitou. Viz Vesmírné Výtahy v [img=virtual-signal/informatron] Informatronu pro více informací[__CONTROL__informatron__].
se-space-genetics-laboratory=Laboratoř vyhrazená pro sekvencování DNA, genetické modifikace a pěstění genetických monokultur.
se-space-growth-facility=Pěstuje biologické vzorky pod širokou škálou kontrolovaných podmínek, které jsou kdekoli jinde nemožné, k doplnění standartních klimatických podmínek například vliv mikrogravitace, či naopak centrifug.
se-space-gravimetrics-laboratory=Analyzuje a simuluje gravitační odchylky.
se-space-hypercooler=Provádí tepelnou výměnu na termotekutinách, přičemž jedna ztratí teplo zatímco druhá se oteplí.
se-space-laser-laboratory=Experimety s lasery. Ochrana očí je nutná.
se-lifesupport-facility=Udržování života ve více nehostiných prostředích.
se-space-manufactory=Obří verze montovny která umí vyrábět složitější produkty. Funguje pouze ve vesmíru (nebo na vesmírné lodi)
se-space-material-fabricator=Syntéza nových materiálů. Průnik mezi částicovým srážečem a 3D tiskárnou.
se-space-mechanical-laboratory=Umožňuje škálu mechanických procesů: Drcení, trhání, odlamování, vibrování, atd.
se-space-particle-accelerator=Urychlování částic k rychlosti světla.
se-space-particle-collider=Sráží vysokorychlostní částice a zkoumá výsledky.
se-space-plasma-generator=Vytváří různé typy plasmy.
se-space-radiation-laboratory=Poměrně bezpečné místo na hraní si s radioaktivními materiály. Může být použito pro zpracování uranu.
se-space-radiator=Vyzařuje přebytečné teplo z ohřáté termotekutiny.
se-space-radiator-2=Vyzařuje přebytečné teplo z ohřáté termotekutiny.
se-recycling-facility=Recykluje šrot a další vedlejší produkty na suroviny.
se-space-pipe-long=Jednoduchá levná cesta pro pohyb tekutin na dlouhé vzdálenosti.
se-space-pipe-long-straight=__1__ dlouhá. Nepropojuje se po stranách. Dobrá pro paralelní vedení potrubí a rychlý přesun kapalin na dlouhé vzdálenosti.
se-space-pipe-long-junction=__1__ dlouhá. Má centrální "křižovatku" s postranními přípojkami. Dobrá pro rychlý přesun kapalin ve výrobních linkách.
se-space-pipe-to-ground=Drahá a s omezeným dosahem, používejte jen v případě potřeby. Můžete chodit přes vesmírné trubky.
se-space-science-lab=Může být použita pro pokročilé vědecké balíčky.
se-space-solar-panel=Vysokoefektivní solární panel po kterém můžete chodit.
se-space-solar-panel-2=Pokročilý vysokoefektivní solární panel po kterém můžete chodit.
se-space-solar-panel-3=Extrémně efektivní solární panel po kterém můžete chodit.
se-space-spectrometry-facility=Spektrofotometrie, plynová chromatografie, hmotnostní spektrometrie a další spektrografie. Házej věci na stěnu, nech je zakřivit a čekej kde se ti vrátí.
se-space-legacy-straight-rail=Navržena pro použití ve vesmíru, ale použitelná i na zemi.
se-space-supercomputer-1=Manipulace, zpracování a simulace dat.
se-space-supercomputer-2=Kvantové počítání. Pokročilá manipulace, zpracování a simulace dat.
se-space-supercomputer-3=Adaptivní neuronová síť založená na kvantovém počítání. Vylepšená manipulace, zpracování a simulace dat.
se-space-supercomputer-4=Nanoinženýrský semiorganický superpočítač který využívá deformaci prostoru a vyšších dimenzí pro vyšší hustotu výpočtů a distribuci energie.
se-space-telescope-radio=Obrovský teleskop který detekuje velmi slabé radiové vlnění ze vzdálených zdrojů.
se-space-telescope-microwave=Obrovský teleskop detekující mikrovlné záření a kosmícké mikrovlné pozadí.
se-space-telescope=Pokoročilý teleskop citlivý na více vlnových délek okolo viditelného spektra.
se-space-telescope-xray=Rentgenové záření je odchýleno většinou atmosfér. Tento pokročilý teleskop je navržen pro vesmírné použití, kde atmosféra není problém.
se-space-telescope-gammaray=Gamma paprsky se nelámou, takže je nemůžete zaměřit pomocí čoček. Tento výkonný teleskop místo toho využívá zrcadla a speciální detektory.
se-space-thermodynamics-laboratory=Provádí procesy, které zahrnují extrémní teploty. Dokáže také provádět základní termální procesy, jako například tavení rud.
se-space-transport-belt=Zabrání tvým předmětům aby začali plout vesmírem.
se-spaceship-antimatter-engine=Anihiluje antihmotu k pohonu. Počítá se jako přepážka pro uzavření lodi.
se-spaceship-antimatter-booster-tank=Udržuje pouze antihmotu. Vyžadována pro start vesmírné lodi.
se-spaceship-console=Použití pro řízení letu vesmírné lodi mezi planetami, měsíci, orbitami a poli asteroidů. Musí být uzavřena mezi stěny/brány vesmírné lodi bez žádných mezer nebo děr. Test integrity vyznačí problémy.
se-spaceship-console-output=Výstupní signály odpovídají aktuálnímu stavu lodi. Pro více informacích o Vesmírných lodí viz [img=virtual-signal/informatron] Informatron [__CONTROL__informatron__].
se-spaceship-console-alt=Tato řídící konzole je poškozená a proto nemůže být použitá k řízení letu lodi.
se-spaceship-gate=Silové pole zabraňuje dekompresi při otevření. Počítá se jako přepážka pro uzavření lodi. 
se-spaceship-ion-engine=Používají malé množství proudu iontů ale velké množství energie k pohonu. Počítá se jako přepážka pro uzavření lodi.
se-spaceship-ion-booster-tank=Udržuje pouze iontový proud. Vyžadována pro start vesmírné lodi, ačkoliv s ní lze vzletět pouze v kosmu. 
se-spaceship-rocket-engine=Pálí kapalné raketové palivo. Počítá se jako přepážka pro uzavření lodi.
se-spaceship-rocket-booster-tank=Udržuje pouze kapalné raketové palivo. Vyžadována pro start vesmírné lodi.
se-spaceship-wall=Počítá se jako přepážka pro uzavření lodi, ačkoliv diagonální mezery ruší uzavření lodi. 
se-spaceship-circuit-network-restore=Pokud toto vidíte na své lodi, něco se pokazilo.
se-gate-platform-scaffold=Ať už je ten prstenec cokoli, nebude fungovat. Toto je staveniště pro trochu oprav, přidání pár motorů, senzorů a dalších serepatiček.
se-gate-lock-switch=Stiskněte __CONTROL__rotate__ k manuálnímu pohybu.
se-gate-lock-combinator=Zatím neimplementováno.
se-gate-platform-combinator=Zatím neimplementováno.
se-gate-energy-interface=Poskytuje artefaktu energii.
se-gate-platform-button-switch=Stiskněte __CONTROL__rotate__ k posunu.
beacon=8 slotů pro moduly s 50% přenosovou efektivitou pro maximální sílu 4 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 3 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování. Malý elektrický odběr.
se-compact-beacon=10 slotů pro moduly se 75% přenosovou efektivitou pro maximální sílu 7,5 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 2 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-compact-beacon-2=10 slotů pro moduly se 100% přenosovou efektivitou pro maximální sílu 10 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 2 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-wide-beacon=15 slotů pro moduly s 50% přenosovou efektivitou pro maximální sílu 7,5 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 14 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-wide-beacon-2=20 slotů pro moduly s 50% přenosovou efektivitou pro maximální sílu 10 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 14 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-supercharger=Může nabíjet až 64 robotů vysokou rychlostí. Maximální elektrický odběr je 1GW.
se-addon-power-pole=Malý elektrický sloup, který byl navržen k připojení na budovy a nebo pro precizní kontrolu elektrického pokrytí.
se-pylon=Rozvádí elektrickou energii. Vzdálenost připojení je 64 dlaždic.
se-pylon-substation=Rozvádí elektrickou energii. Vzdálenost připojení je 64 dlaždic, poskytovací oblast je 64x64 dlaždic.
se-pylon-construction=Rozvádí elektrickou energii a rozšiřuje konstrukční oblast. Vzdálenost připojení je 64 dlaždic, konstrukční oblast je 64x64 dlaždic.
se-pylon-construction-radar=Rozvádí elektrickou energii, rozšiřuje konstrukční oblast a dodává vizi radarem. Vzdálenost připojení je 64 dlaždic, konstrukční a radarová oblast je 256x256 dlaždic. Logistická oblast je 4x4.
se-shield-projector=Vytváří ochranné silové pole. Spotřebovává více energie pokud se nabijí, nebo pokud je štít pod náporem. Pokud máte nainstalovanou modifikaci "Combat Mechanics Overhaul'' dokáže blokovat projektily plivačů.
se-core-seam=Může být těžen pomocí [img=entity/se-core-miner-drill] Jádrového dolu k získání __1__ __2__. Může být dočasně uzavřena pomocí [img=item/cliff-explosives] Skalní trhaviny nebo [img=item/grenade] Granátu pro umožnění stavění na ní.
se-big-turbine=Velký generátor, který akceptuje páru o 5000°C, produkuje páru o 500°C na druhém konci, a vodu po stranách. 2 % vstupní energie jsou nevyužita a vrácena v podobě páry.
se-big-heat-exchanger=Velký výměník tepla navržen pro vysoké teploty a velké kapacity.
se-delivery-cannon=Elektromagnetické dělo schopné střílet na orbitu a dál. Způsobuje poškození při neopatrném zacházení, používejte opatrně. Kapacita 1GJ, spotřeba 50MW při nabíjení.
se-delivery-cannon-chest=Obrněná truhla navržená pro bezpečné zachycení rychle padajících surovin. Vyžaduje volné místo v inventáři pro bezpečné zachycení.
se-delivery-cannon-weapon=Velké kolejnicové dělo schopné střílet munici na orbitu a dál. Používejte opatrně.
se-spaceship-clamp=Svorka na vesmírné lodi se může ukotvit ke svorce v opačném směru. Počítá se jako přepážka pro uzavření lodi. 
se-spaceship-clamp-place=Svorka na vesmírné lodi se může ukotvit ke svorce v opačném směru. Počítá se jako přepážka pro uzavření lodi. 
se-spaceship-clamp-power-pole-external-east=Místo pro připojení drátů na svorce. Předává signály a energii přes propojenou svorku při ukotvení.
se-spaceship-clamp-power-pole-external-west=Místo pro připojení drátů na svorce. Předává signály a energii přes propojenou svorku při ukotvení.
se-energy-transmitter-emitter=Centrální budova, která vytváří mezi-povrchový energetický paprsek. Může být použit jako zbraň, nebo k vysílání energie k paprskovému přijímači. Vyžaduje připojenou paprskovou komoru a připojené paprskové injektory. Síla paprsku závisí na počtu injektorů.
se-energy-transmitter-chamber=Musí být připojena k zářiči energetických paprsků. Jiné komory mohou být připojeny konci, a nebo prostředkem dlouhé strany. Injektory mohou být připojeny pouze po stranách.
se-energy-transmitter-injector=Musí být připojen k paprskové komoře a zářiči. Injektory mají konstantní energetickou spotřebu, každý zvyšuje vyslanou energii, což buď zvyšuje teplo produkované přijímačem, nebo poškození a rychlost paprsku.
se-energy-transmitter-injector-reactor=Musí být připojen k paprskové komoře a zářiči. Injektory mají konstantní energetickou spotřebu, každý zvyšuje vyslanou energii, což buď zvyšuje teplo produkované přijímačem, nebo poškození a rychlost paprsku.
se-energy-receiver=Zachycuje energetický paprsek a konvertuje ho na teplo. Zářič musí být v módu Energizace a musí být zaměřen na daný přijímač.
se-energy-beam-defence=Zařízení na obranu před energetickými paprsky. Chrání pouze proti paprsky vesmírného původu a výronům koronální hmoty. Jediný požadavek na fungování je elektřina, přičemž základní odběr je 10MW ale je zvyšován v závislosti na síle útoku. Pouze jeden je potřeba na planetu a její orbitu proti Výronu koronální hmoty, proti zbraním na bázi energetických paprsků dokáže 1 Deštník ubránit až 500GW útočící síly. Pro více informacích o Energických paprscích viz [img=virtual-signal/informatron] Informatron [__CONTROL__informatron__]
se-nexus=Funguje pouze na pohybující se vesmírné lodi, spotřebovaná energie je přímo úměrná rychlosti. Může získávat data z mezihvězdného letu, přičmž generování dat odpovídá kinetické energii lodě. Nexus je navržen aby fungoval jako zakřivující pohon a se správnou technologií může umožnit opuštění místní hvězdokupy.\nAplikuje 2000 namáhání nákladem.
se-nexus-charger=Funguje pouze na pohybující se vesmírné lodi, spotřebovaná energie je přímo úměrná rychlosti. Může získávat data z mezihvězdného letu, přičmž generování dat odpovídá kinetické energii lodě. Nexus je navržen aby fungoval jako zakřivující pohon a se správnou technologií může umožnit opuštění místní hvězdokupy.
se-space-probe-rocket-silo=Raketové silo pro vysílání vesmírných sond.
se-core-seam-fissure=Tato průrva může být dočasně zapečetěna pomocí [img=item/cliff-explosives] Skalní trhaviny nebo [img=item/grenade] Granátu, načež se přes ní dá stavět.
kr-singularity-beacon=10 slotů pro moduly se 100% přenosovou efektivitou pro maximální sílu 10 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 2 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
kr-antimatter-reactor=Obsahuje striktně omezenou singularitu. Motory Vesmírné lodi mají problém pohybovat singularitou.
se-kr-advanced-condenser-turbine=75% energitická účinost parní turbíny ale 99% spotřebované páry je navráceno v podobě vody. Přijímá páru teploty od 950 do 1625 stupňů.
