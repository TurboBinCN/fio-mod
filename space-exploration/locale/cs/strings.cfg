se-space-capsule=Kontrolní kapsle vyžadována pro nákladní rakety. Může být využita k návratu pasažérů zpět na nejbližší planetární povrch. Nasedněte do kapsle pomocí __CONTROL__toggle-driving__.
se-space-capsule-scorched=Poničená Vesmírné kapsle. Vyžaduje rekonstrukci či sešrotování.
se-space-platform-plating=Pokročilé plátování umožňující rychlejší pohyb po vesmírné platformě.
se-space-platform-scaffold=Základní vesmírná platforma která ti umožní stavět některé stavby ve vesmíru.
se-space-rail=Koleje, které jsou bezpečné pro použití ve vesmíru, protože zabraňují vlakům v odplutí a zničení všeho, co budujete. Mohou být také využity na zemi z estetických důvodů.
se-spaceship-floor=Paluba musí být pod všemi částmi vesmírné lodi včetně pod stěnami vesmírné lodi na jejím vnějším okraji. Jakákoliv mezera v palubě poruší uzavření lodi a tyto části mohou být odpojeny.
se-superconductive-cable=Supravodivý kompozitní kabel který nepotřebuje aktivní chlazení.
se-tesla-gun=Rychlepálící řetězící se blesky
