[string-mod-setting-description]
se-lifesupport-hud-visibility-option-1=Vždy zviditelnit rozhraní.
se-lifesupport-hud-visibility-option-2=Zviditelnit rozhraní pouze při nošení podpory života a nebo když je podpora života potřeba.
se-lifesupport-hud-visibility-option-3=Zviditelnit rozhraní pouze při potřebě podpory života.
se-lifesupport-hud-visibility-option-4=Nikdy neukazovat rozhraní.
se-print-meteor-info-always=Vždy zobrazuje upozornění na meteory
se-print-meteor-info-current-zone-only=Ukazuje pouze upozornění na meteory které padají na zónu, na kterou se díváte. Pokud je to planeta nebo měsíc, upozornění se zobrazí jak na hlavní povrch tak na oblast orbity.
se-print-meteor-info-breakthrough-only=Zobrazuje pouze upozornění na meteory které byly v doahu vaší obrany ale nebyly plně sestřeleny. Toto zahrnuje minuté střely, nebo obranu které dochází elektřina nebo náboje.
se-print-meteor-info-breakthrough-and-current-zone-only=Zobrazuje pouze upozornění na meteory které byly v doahu vaší obrany ale nebyly plně sestřeleny a pouze v zóně, na kterou se díváte.
se-print-meteor-info-never=Nikdy nezobrazí upozornění na meteory

