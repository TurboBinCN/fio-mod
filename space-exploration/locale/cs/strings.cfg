page_space_exploration_text_1=Vítejte ve Space Exploration. Tato modifikace již obsahuje mnoho věcí, ale stále je v [font=default-bold]experimentální[/font] fázi vývoje. Stále se zde mohou nacházet chyby.\n\n[font=heading-2][color=#ffe6c0]Experimentální fáze vývoje?[/color][/font]\nSpace Exploration se stále rychle mění a já vkládám všechen svůj čas do vývoje hlavních funkcí za cenu kompatibility s jinými módy. [color=red]Nedoporučujeme hrát v kombinaci s jinými modifikacemi než s těmi doporučenými a vyžadovanými[/color]\n\nBěhem experimentální fáze: Pokud modifikace způsobuje problémy jako korupce hry/uložené hry, pády hry, znehodnocuje výzkumný strom nebo hlavní herní mechaniky, bude rychle označen jako nekompatibilní pro ochranu nových hráčů. To znamená že pokud používáte více modifikací, je možné že jedna z nich bude označena jako nekompatibilní později kvůli problému na který jste ještě nenarazil. Máte samozřejmě plnou moc upravit váš info.json soubor pro vyzkoušení hraní s nekompatibilními modifikacemi, ale děláte tak na vlastní nebezpečí: pokud se vaše hra stane nehratelnou kvůli tomu, nebudu vám schopen pomoci.\n\nDodatečné informace ke kompabilitě modifikací naleznete na Space Exploration wiki.\n\n[font=heading-2][color=#ffe6c0]Doporučené modifikace[/color][/font]\n • Grappling Gun. Umožňuje vám přskočit budovy, jezera a mimo souboj, jste-li zpomalen. Ve vesmíru se můžete dostat zpátky na vesmírnou platformu, spadnete-li. Umožňuje také nalodit se na vesmírnou loď (zvláště užitečné, pokud se pohybují).\n • Inserter Fuel Leech. Toto je pouze pro začáteční AAI uhelnou fázi hry; umožňuje to uhelným překladačům doplňovat si palivo z entity, ze které překládají věci dál.\n • Text Plates. Umožňuje vám psát přímo na zem, což je užitečné pro psaní názvů planet, vesmírných stanic, loděnic, atd.\n • Combat Mechanics Overhaul. Může vám pomoci s obranou když jste mimo planetu se svojí "Spitter spit blockable"(Zdi Blokují Plivače) možností. Přeci jenom je levnější opravovat zdi než věže.\n • Bullet Trails. Nepatrné linky doprovázejí vaše střely, abyste mohli sledovat kam míříte, nebo na co střílejí vaše věže. (Taky to vypadá líp.)\n • Milníky. Mějte na paměti vaše úspěchy a jak rychle jste jich dosáhl.\n\n[font=heading-2][color=#ffe6c0]Velké modifikace[/color][/font]\nSpace Exploration samotná zabere lidem mezi 70 a 700 hodinami, s průměrem okolo 400 hodin. NEDOPORUČUJEME hrát s dalšími velkými modifikacemi, neboť mají tendenci ničit vyvážení planetárních surovin, meziplanetární logistiky, vzorce stavění a celkově herního vývoje. Pokud je to vaše první hraní Space Exploration, měl by jste se takovým modifikacím vyvarovat, jinak nebudete vědet co je zamýšlené a co je chyba.\n\n Většina velkých modifikací je označena za nekompatibilní pokud je vývojový strom význačně porušen. Dlouhodobým cílem je přidat kompatibilitu s pár takovými vybranými modifikacemi přičemž bude kladen důraz, aby byly zachovány hlavní prvky a mechaniky obou modifikací pro uspokojení vývojářů obou modifikací.\n Krastorio 2 je příkladem kdy už to tak funguje nyní.\n\n\n\n[font=heading-2][color=#ffe6c0]Doporučená nastavení[/color][/font]\nMUSÍTE mít povolené všechny terény v modifikaci 'alien biomes', jinak hra začne v pozdějších fázích padat.\n\nJak je hra delší než obvykle, je dobrým nápadem začít hru s menším evolučním faktorem.\n\nNeměl by jste nastavovat vysoké zdroje surovin na vaší počátešní planetě pokud nehrajete s vyššími náklady receptů, jako například maraton. Pokud jsou suroviny nastaveny příliš vysoko, sníží to vaší potřebu cestovat na další planety.\n\n[font=heading-2][color=#ffe6c0]Užitečné odkazy[/color][/font]\nPodívejte se na Space Exploration Wiki zde: [color=blue]https://spaceexploration.miraheze.org[/color]\nZískejte pomoc nebo sledujte vývoj na Discordu: [color=blue]https://discord.gg/ymjUVMv[/color]\n\nDo vytváření této modifikace jsem vložil přes 4000 hodin. Pokud vás baví, prosím zvažte moji podporu přes Patreon: [color=blue]https://www.patreon.com/earendel[/color]
menu_meteor_defence=[img=virtual-signal/se-meteor] Obrana proti Meteorům
title_meteor_defence=Meteoritní obrana
page_meteor_defence_text_1=Meteory padají z nebes a poničí vše, na co přistanou. Většina meteorů je tvořena minerály, ale některé planety mohou mít speciální typy meteorů. Meteory padají v náhodných intervalech do většiny zón. Maximální interval mezi údery meteoritů můžete změnit v nastavení modifikace.\n\nČetnost meteorů je rovněž náhodná, 50% pro 1, 25% pro 2, 12,5% pro 3, 6,25% pro 4 a tak dále...\n\nStruktury obrany proti meteorům mohou meteory sestřelovat. Střílejí postupně, takže novější obranné struktury ani nevystřelí, pokud byly již všechny meteory zničeny. Obranné struktury vyžadují munici, a také přívod elektrické energie při nabíjení. Spotřeba těchto struktur není zanedbatelná, proto je doporučeno balancovat riziko s energetickou náročností.\n\n[img=item/se-meteor-defence] [color=#ffe6c0][font=heading-2]Obrané zařízení[/font][/color]\nNa rozdíl od [img=item/se-meteor-point-defence] Lokálnímu dělu proti meteorům, které může chránit pouze malou oblast jedné zóny, [img=item/se-meteor-defence] Zařízení obrany proti meteorům jsou schopné bránit dvě zóny najednou. Konkrétně jakékoliv Zařízení obrany proti meteorům dokáže chránit zónu na kterou byla postavena a její orbitu  a naopak.\n\n[img=item/se-delivery-cannon-weapon-capsule] [color=#ffe6c0][font=heading-2]Nepřátelské zásilky[/font][/color]Obrana proti meteorům zároveň sestřelí jakékoliv zásilky Dodávkových kanónů poslané nepřátelskými silami (podstatné pouze v PvP hře více hráčů).
menu_coremining=[img=item/se-core-miner-drill] Těžba jádra
title_coremining=Těžba jádra
page_coremining_text_1=Těžba jádra je zdrojem k nekonečně zásobě zdrojů, na druhou stranu spotřebuje hodně energie a čim více těžíte, tím méně efektivní to je.\n\nTěžba jádra může být provedena pouze u Průrvy k Jádru, nacházejícího se pouze na planetách a měsících. Každá planeta a měsíc mají vlastní typ jádra určující typ průrev k jádru, které určují jaký typ fragmentu jádra nabízejí. Například; planeta s měděným jádrem bude mít měděné průrvy k jádru které nabízejí měděné fragmenty jádra. Počáteční planeta dává základní suroviny ve vyváženném poměr surovin, ale další místa převážně mívají jednu konkrétní surovinu.\n\nPrvní jádrový důl položený na planetě těží se 100% efektivitou, ale každý další důl snižuje efektivitu všech dolů na této planetě. Položením dalšího dolu se vždy zvýší celkovou produkci fragmentů jádra. Pro dvojnásobnou produkci potřebujete 2x2=4 doly, pro trojnásobnou 3x3=9 dolů a pro destinásobnou produkci potřebujete 10x10=100 dolů. Na planetě je omezené množství průrev k jádru s menšími planetami majíc méně možných težících míst. Těžba jádra na menších planetách je obecně pomalejší, ačkoliv díky menší gravitační studně je jednodušší suroviny dostat z povrchu.\n\nV rané fázi hry může mýt užitečné mít 1 jádrový důl pro případy přebytku elektřiny. Pokud začínáte na malé planetě nebo ostrovu, potom solární elektřina s těžbou jádra mohou být jedinou cestou pro získání dostatku surovin pro dostání se z planety.\n\nJádrové doly v pozdní hře silně benefitují z bonusů produktivity těžby. Je lepší mířit pro pár těžeb jádra na více planetách než hodně jádrových dolů na pár planetách.
menu_beacons=[img=item/se-wide-beacon-2] Majáky
title_beacons=Majáky
page_beacons_text_1=[color=#ffe6c0][font=heading-2]Přetížení Majáky[/font][/color] [img=virtual-signal/se-beacon-overload]\nPřetížení majáky je podstatonou změnou mechaniky Majáků ve Factoriu. Výrobní budovy mohou být ovliněny pouze 1 majákem, pokud jsou ovlivňovány více majáky budou přetíženy a zastaví se produkce.\n\nTato změna také umožňuje více modulů v jednom majáku stejně jako umožňuje použítí silnějších modulů jak v majácích, tak v montovnách pro maximální bonusy. Tato změna také nabízí a podporuje širší škálů designů továrny.\n\nZákladní maják je sám o sobě mnohem silnější než maják ze základní hry, ale nemůže sčítat efekty na samotné výrobně, tudíž maximální výkon je menší oproti základní hře. Silnější majáky jsou schopné dalece přesáhnout maximální výkon výrobny dosažitelný v základní hře.\n\nZačínaje u Širokodosahového Majáku hráč může zažít podstatný posun v poměru ušetřených modulů stejně jako větší svobodu v stavění komplexních designů pracujících kolem velkých budov a nebo pracujících s velkým počtem kapalných či materiálových vstupů.\n\nVýrobny ovlivněné více jak jedním majákem se označí jakožto Majákové Přetížení a zastaví produkci. U toho budou stále vyžadovat jejich minimální spotřebu.\n\nRůzné typy majáků jsou užitečné v různých situacích. Základní maják má velmi malou spotřebu elektřiny a tak jsou užitečné v energeticky efektivních stavbách. Širokodosahový maják má obrovský dosah a proto se jedná o nejefektivnější možnost při efektivitě modulů při působení na více výroben. Kompaktní majáky mají malý dosah ale vysokou efekivitu přenosu, proto jsou více modulově efektivní pokud by větší stavba byla plýtváním.
menu_launching_satellites=[img=item/satellite] Vysílání Satalitů
title_launching_satellites=Vysílání Satalitů
page_launching_satellites_text_1=Vyslal jste [color=cyan]__1__[/color] [img=item/satellite] satalitů.\n\n[img=item/rocket-silo] [font=heading-2][color=#ffe6c0]Průběh Letu[/color][/font]\nSatality jsou vysílány z [img=item/rocket-silo] Raketového sila. Satalitní raketové silo staví raketu uvnitř. Jakmile je raketa postavena, položte satalit do raketového sila. Pro vyslání musíte položit alespoň jednu [img=item/cargo-landing-pad] Přistávací plochu na onom povrchu. Vysláním satalitu obdržíte data v podobě [img=item/se-satellite-telemetry] satalitní telemetrie, nezbytné součásti v [img=item/se-rocket-science-pack] Raketové vědě.\n\n[img=virtual-signal/se-remote-view] [font=heading-2][color=#ffe6c0]Navigační Satalitní Pohled[/color] [__CONTROL__se-remote-view__][/font]\nKdyž vyšlete první Navigační Satalit do vesmíru ze Sila pro Navigační Satality, dostanete přístup k [img=virtual-signal/se-remote-view] Navigačnímu Satalitnímu Pohledu. Tento vylepšený režim mapy zapnete pomocí tlačítka [__CONTROL__toggle-map__]. Zatímco jste v Satalitním pohledu, vaše kamera se pohybuje nezávisle na postavě a lze se s ní rychle pohybovat kolem a dokonce objevovat nové oblasti. Narozdíl od normálního pohledu mapou, vylepšený satalitní pohled má radarovou funkci (ze satalitu nahoře) díky němuž objevuje jakýkoliv terén na který se chcete podívat.Jsou tu některé věci co nemůžete dělat v tomto pohledu, jako přímo pokládat či bourat entity. Zato můžete kupříkladu používat plány, plány dekonstrukce, stavět duchy entit, upravovat spojení drátů, měnit recepty továren, nastavení kombinátorů, atd.\n\n[img=se-map-gui-universe-explorer] [font=heading-2][color=#ffe6c0]Vesmírný Atlas[/color] __CONTROL__se-universe-explorer__][/font]\nSíť Navigačních Satalitů také umožňuje pohled na další povrchy, jako cizí planety, měsíce, pásy asteroidů a orbity. Stiskněte [__CONTROL__se-universe-explorer__] pro otevření listu známých zón. Můžete kliknout na Ukázat Povrch abyste viděli, co tam je. Může to být praktické pro prozkoumání planet, než se na ně pokusíte doletět.\n\nVysílání satalitů může také pomoc s průzkumem zón v systému, odkud jsou vysílány (zobrazte Objevené Zóny pro více detailů).Z rozhraní Vesmírného Atlasu také můžete zadat satalitu aby postupně skenoval povrch.\n\n[img=item/se-space-probe-rocket] [font=heading-2][color=#ffe6c0]Vesmírné sondy[/color][/font]\n[img=item/se-space-probe-rocket-silo] Vesmírné sondové silo je konstruováno pro použití ve vesmíru. Namísto stavění raket vysílá předpřipravené [img=item/se-space-probe-rocket] Rakety vesmírných sond. Vesmírná sonda je mnohem levnější než normální satalitní rakety, a lze ji představět v srdci továrny namísto dovážení surovin k samotnému silu. Silo rakety vesmírné sondy může vysílat sondy levně, zároveň však může vysílat více specializované sondy a zběrače z více specifických míst ve vesmíru.
menu_pinned_locations=[img=se-pin-list-white] Připnuté Lokace
title_pinned_locations=Připnuté lokace
page_pinned_locations_text_1=Po odemčnení [img=virtual-signal/se-remote-view] Navigačního Satalitního pohledu, dostanete přístup k Připnutým Lokacím, nástrojem pro rychlé přepínání do jiných částí vaší továrny napříč všemi povrchy jenž jste prozkoumal.\n\nLokace může být připnuta pomocí plusového tlačítka v okně Navigačního Satalitu. Můžete nastavit klávesovou zkratku pro Připnuté Lokace při jejich přidávání nebo upravování. Toto vám umožňuje rychle přeskakovat mezi důležitými lokacemi pouhou klávesou namísto potřeby proklikat se skrze Vesmírný Atlas.\n\n[font=heading-2][color=#ffe6c0]Dočasná Připnutí[/color][/font]\nPřipnuté Lokace nemusí být vytvářeny přes vyskakovací menu vytváření připnutí - mohou totiž být také vytvořené pomocí klávesové zkratky "Nastavit Připnutí". Toto vytvoří Připnutou Lokaci beze jména nebo ikony, ale lze na ní okamžitě přeskočit danou "Jdi na Připnutí" klávesovou zkratkou.\n\n[font=heading-2][color=#ffe6c0]Všechna Připnutí [/color] [__CONTROL__se-remote-view-pins__][/font]\nPřipnutí se zobrazují u lišty aktuální zóny na kterou koukáte. Nicméně klávesové zkratky lze použít pro přeskok k připnutí na jiném povrchu, nehledě na jeho viditelnost v liště. Pokud potřebujete přehled všech připnutých lokacích, stiskněte [__CONTROL__se-remote-view-pins__] pro otevření listu všech připnutí. Připnutí v tomto pohledu jsou zarovnány v řadách založených na površích, ke kterým náleží. Pokud má povrch pouze jedno připnutí, jeho řádka bude sloučena s tou jeho mateřské hvězdy.\n\n[font=heading-2][color=#ffe6c0]AAI Programovatelná Vozidla[/color][/font]\nZákladní klávesová zkratka pro nastavování a přepínání Připnutých lokací má stejnou klávesovou zkratku jako vytváření a vybírání kontrolních skupin v modifikaci "AAI Programmable Vehicles". Pokud používáte obě modifikace, musíte upravit vaše klávesové zkratky aby nebyly v konfliktu a vy jste dostal očekávané chování.
menu_zone_discovery=[img=virtual-signal/se-planet-orbit] Objevené Zóny
title_zone_discovery=Objevené Zóny
page_zone_discovery_text_1=Existuje mnoho hvězd, planet, měsíců, pásů asteroidů a polí asteroidů v téhle části vesmíru, a všechna tato tělesa jen čekají na objevení.\n\n[font=heading-2][color=#ffe6c0]Navigační satelit[/color][/font]\nMůžete vypustit navigační satelit a objevit díky němu nové planety, měsíce, nebo pásy asteroidů v solární soustavě, ve které byl satelit vypuštěn. Pokud již v daném sektoru není nic nového k objevení, satelit objeví novou hvězdu, ale nedokáže objevit nic obíhajícího kolem dané hvězdy nebo něco v hlubokém vesmíru. \n\n[font=heading-2][color=#ffe6c0]Výzkum Objevení zóny[/color][/font]\nMůžete použít vesmírné teleskopy k hledání nových zón. Toho lze dosáhnout pomocí výzkumu "Objevu zóny". Základní výzkum objevení zóny může najít náhodnou hvězdu, planetu, měsíc nebo pás asteroidů.\n\n[font=heading-2][color=#ffe6c0]Výzkum "Cílený objev zóny"[/color][/font]\nCílený objev zóny klade důraz na objev preferované suroviny (níže), tudíž existuje mnohem větší šance na nalezení takového místa. Nezapomeňte na to, že planeta může být objevena pouze po objevení její hvězdy, a měsíc nemůže být objeven před objevem planety, kterou obíhá. Nečekejte, že pokaždé najdete to, co hledáte.\n\n[font=heading-2][color=#ffe6c0]Výzkum Objevení zóny v hlubokém vesmíru[/color][/font]\nObjevení zóny v hlubokém vesmíru je jediným způsobem, kterým lze najít pole asteroidů. Pole asteroidů jsou jediným místem, kde lze najít Naquitit. Objevování zón v hlubokém vesmíru nelze specifikovat pro určitou surovinu.\n\n[font=heading-2][color=#ffe6c0]Objevování zóny s preferovanou surovinou:[/color][/font]
menu_space_capsule=[img=item/se-space-capsule] Vesmírná Kapsle
title_space_capsule=Vesmírná Kapsle
page_space_capsule_text_1=Vesmírná kapsle je malá osobní raketa a raketový navigační systém. Může být položena na zemi, čímž může posloužit jako malá osobní přepravní raketa, nebo může být použita při stavbě Nákladní rakety, při čemž slouží jako naváděcí systém rakety a únikový modul.\n\nVesmírná kapsle má vlastní systém podpory života, tudíž pokud se ve vesmíru dusíte, můžete použít Vesmírnou Kapsli jako útočiště.\n\nPokud ji použijete při stavbě Nákladní rakety, tato Vesmírná kapsle nemůže být ztracena. Buďto přežije cestu přistáním na povrchu nebo přistáním do Raketové přistávací plochy.\n\n[font=heading-2][color=#ffe6c0]Osobní přeprava[/color][/font]\n[color=#f5cb48]Schopnost použít vesmírnou kapsli jako samotnou je uzamčená za technologií "Navigace Vesmírné Kapsle".[/color] Jakmile vyzkoumáte tuto technologii, můžete skoro všude použít Vesmírnou kapsli bez sila nákladních raket.\n\nSamostatná vesmírná kapsle může být použita pro osobní přepravu hráče, ale není vhodná pro přepravu nákladu. Ačkoliv si sebou můžete vzít pár nezbytností, jako například kanystry podpory života, kapacita je extrémně limitovaná a jakýkoliv náklad jenž se pokusíte nabrat může dramaticky zvýšit spotřebu paliva. Pokud hodláte použít vesmírnou kapsli, měl by jste být připraven vysypat veškerý obsah vašeho inventáře do truhel a vzít si sebou pouze to, co vskutku potřebujete. Pokud potřebujete více efektivnější přesun nákladu, využijte raději Nákladní rakety.\n\nVzlet z Planety: Vesmírná kapsle může vzletět z planety, ale potřebuje s tím píchnout. Potřebuje proto pár částí nákladní rakety pro postavení jednorázového prvního stupně rakety aby se dostala skrze atmosféru. Části nákladní rakety musí být umístěny v nákladním prostoru kapsle společně s vyžadovaným raketovým palivem. Tyto části nákladní rakety nemohou být nikterak navráceny.\n\nCestování vesmírem: Můžete se pohybovat v rámci sousedících vesmírných zón, například z orbity planety na orbitu měsíce, mezi orbitami měsíců, nebo mezi vnějšími měsíčními orbitami a asteroidovými pásy. Ačkoliv se můžete pohybovat v mezihvězdném prostoru, destinace nemusejí být spolehlivě dostupné. Cestování z orbity na planetu či měsíc pod ní je jednodušší a nepřichází s limitem kapacity.\n\nOpětovný nástup: Vesmírná kapsle může přistát na planetě či měsíci za malé náklady raketového paliva. Dbejte na to, že přistávací lokace je nepředvídatelná a že budete potřebovat více paliva a částí nákladní rakety k vzletuu zpět nahoru.\n\nNouzové přistání: Nouzové přistání vás zavede domů za použití nouzových palivových rezerv, tudíž nepotřebuje žádné další palivo. Bude to tvrdé přistání ze kterého vzejde [img=item/se-space-capsule-scorched] Poškozená vesmírná kapsle, která bude potřebovat rekonstrukci aby mohla znovu fuungovat. Můžete ztratit až 50% předmětů ve vašem inventáři které jste sebou měli (zaokrouhleno nahoru).
menu_cargo_rockets=[img=virtual-signal/se-cargo-rocket] Nákladní Rakety
title_cargo_rockets=Nákladní Rakety
page_cargo_rockets_text_1=Nákladní rakety startují z Nákladního raketového sila, aka ze vzletové rampy.\nZatím jste vypustili [color=cyan]__1__[/color] nákladních raket.\n\nŠance na ztracení vašeho nákladu je založná na vaší technologii: Maximální ztrátovost snížena o [color=cyan]__2__%[/color].\n\nŠance na přežití je založena na vaší technologii: Šance na ztátu nákladu je snížena o [color=cyan]__3__%[/color].\n\nZnovupoužitelnost rakety je založena na technologii: [color=cyan]__4__[/color] +/- 10 (maximálně 100) částí rakety jsou navráceny.\n\n[font=heading-2][color=#ffe6c0]Začínáme[/color][/font]\nNež budete schopen vyslat nákladní raketu, musíte vyslat satalit v satalitní raketě (normální Factorio, aka 'vanila' silo).\n\nJakmile postavíte nákladní raketové silo, musíte sestavit a natankovat vaší raketu:\n\n  • 100 částí rakety v inventáře sila. 10-30 z nich bude navráceno v cílové destinaci (pokud přistanete na přistávací plochu), více s odpovídajícím výzkumem. \n  • 1 vesmírná kapsle v inventáři sila. Ta bude vždy navrácena v cílové destinaci a může vás poslat poslat domů.\n  • Mnoho tekutého raketového paliva, zapojeného potrubím do jednoho z 8 připojení poblíž rohů sila. Množství potřebného paliva závisí na poloměru planety ze které vzlétáte a vzdálenosti cílové destinace. Pokud používáte možnost "Jakákoliv přistávací plocha se jménem", naloží se dostatek paliva na let na kteroukoliv platnou destinaci\n\nPokud raketa vzletí s prázdnými sloty inventáře, některé části rakety a část palivových rezerv nebude použita. Prázdná raketa vás bude stále stát 50% naplněné rakety, proto se vyplácí využívat rakety co nejplnější.\n\nDo nákladního sila rakety můžete nastoupit předními dveřmi (stisknutím __CONTROL__toggle-driving__). Toto vám umožní vzletět s raketou. Měli by jste mít raketový oblek a kanystry podpory života aby jste nezemřeli pokud letíte do vesmíru.\n\nVaše první raketa nebude mít kam přistát, tudíž se rozpadne zatímco vypustí náklad. Občas zaměřování rakety selže, mine přistávací plochu a raketa se zřítí. Dokonce i v případě zřícení bude náklad vypuštěn v nákladních modulech, takže nikdy neztratíte všechen náklad.\n\nMěl by jste si sebou vzít Přistávací Plochu Rakety aby jste ji mohl nekdě postavit a vaše další rakety měli kam přistát. Dobrým nápadem jak využít prázdné místo v raketě je naplnit jej surovinami jako jsou kovy, kámen, ropa, uhlí, odlehčené struktury, tepelné stínění a pevné raketové palivo.\n\nPostavením Přistávací Plochy Rakety ve vaší základně před vzletem umožní jednoduchý návrat přímo do základny namísto přistání v náhodné lokaci při vašem návratu.\n\n[font=heading-2][color=#ffe6c0]Destinace[/color][/font]\nJakmile postavíte přistávací plochu, ujistěte se že obnovíte destinaci v raketovém silu a zaměřte jej aby jste neskončili v náhodném bodě v oné zóně. To můžete udělat osobně nebo pomocí Vzdáleného Satalitního Pohledu (klávesa 'n'). Nicméně, rakety nepoletí na přistávací plochu která obsahuje předměty, tudíž se ujistěte že ji nejprve vyprázdníte.\n\nNěkteré vzdálenější destinace mají méně spolehlivou dodávku. Některé destinace, jako například pole asteroidů mají bezpečnostní hrozby, ale ty mohou být vyváženým dalším výzkumem.\n\n[font=heading-2][color=#ffe6c0]Základní Automatizace[/color][/font]\nRaketové silo vysílá signály kolik částí rakety už obsahuje. Můžete nastavit podmínku na překladač [Nákladní části rakety < 100] abyste se ujistil, že raketa nebude naložena přebytečnými částmi.\n\nPokud máte nastavenou vzletovou podmínku v raketovém silu, bude vysílat automaticky rakety, bude-li přistávací plocha prázdná (jina by se přilétající náklad nemusel vejít).\n\nPokud vyberete destinaci jako "Jakákoliv přistávací plocha se jménem", silo vyhledá přistávací plochy s odpovídajícím jménem na jakémkoliv povrchu. Pozorně pojmenované přistávací plochy skombinované s nemožností zaměřit přistávací plochu která ještě není prázdná umožňuje na zapojení lehký logistický systém.\n\n[font=heading-3][color=#ffe6c0]Vstupní Signály[/color][/font]\n[img=virtual-signal/signal-green] Zelený signál: Může spustit vzlet pokud je silo nastaveno na používání zeleného signálu.\n\n[font=heading-3][color=#ffe6c0]Výstupní Signály[/color][/font]\n[img=virtual-signal/signal-E] Signál E: Prázdné sloty\n[img=virtual-signal/signal-F] Signál F: Plné sloty\n[img=virtual-signal/signal-L] Signál L: Kapalné raketové palivo požadované pro všechny potencionální destinace specifikované nastavením destinací.\n[img=virtual-signal/se-cargo-rocket] Signál Nákladní Rakety: Pokud je raketa hotova (to jest 1 kapsle a 100 částí rakety) navrátí hodnotu 1 tohoto signálu.\n[img=item/se-space-capsule] Signál Vesmírné Kapsle: Jakákoliv kapsle použitá při stavbě rakety je přidána do počtu kapslí v inventáři rakety.\n[img=item/se-cargo-rocket-section] Signál Nákladních Částí Rakety: Jakákoliv část použitá při stavbě rakety je přidána do počtu částí v inventáři rakety.\n[img=fluid/se-liquid-rocket-fuel] Signál Raketového Kaplného Palivo: Množství kapalného paliva v silu.
menu_delivery_cannons=[img=item/se-delivery-cannon] Dodávkové Kanóny
title_delivery_cannons=Dodávkové Kanóny
page_delivery_cannons_text_1=Dodávkové kanóny jsou kolejnicová detonací vypomáhaná elektromagnetická děla s meziplanetárním dosahem. Navržena jsou pro odolné homogení suroviny které jsou schopné přežít náhlou akceleraci. Nemohou vysílat složitě vyprodukované meziprodukty nebo struktury.\n\nDodávkovému kanónu můžete nastavit pouze jeho cíl, dodávkový kanón nepozná co se v cílí nachází a tak bude střílet na tento bod dokavad bude mít dostatek elektřiny a plnou dodávkovou kapsli. Pokud chcete přidat podmínku na schopnost kanónu střílet, musíte omezit nakládnání kapslí nebo surovin do kanónu.\n\nPokud dodávková kapsle přistane na holé zemi, poškodí oblast kolem sebe a zničí většinu surovin. Truhla dodávkového kanónu může bezpečně zachycovat kapsle dokavad se nezaplní. Několik kanónů s různými náklady může střílet na tu samou truhlu.\n\nDoporučujeme ponechávat zaměřené truhly prázdné nebo omezit vstupy kanónu pomocí aai přenosu signálů.\n\nDodávkové kanóny mají kapacitu 1GJ a odběr 50MW při nabíjení. Dosah dodávkového kanónu je omezen množstvím energie kterou může mít v zásobě; Střílení na vzdálenější lokace vyžaduje více energie. Některé lokace můžou vyžadovat více energie než dodávkový kanón může udržet, takže nikdy nevystřelí. Můžete připravit předávkovou stanici dodávkových kanónů na půli cesty a poslat ten samý náklad nadvakrát.\n\n[img=item/se-delivery-cannon-weapon] [font=heading-2][color=#ffe6c0]Zbraňové dodávky[/color][/font]\nZbraňové dodávkové kanóny se chovají podobně jako jejich pacifistické protějšky, akorát že střílí zbraně namísto surovin v jejich nákladu. K normálnímu režimu střelby stejnému jako u dodávkového kanónu má zbraňový dodávkový kanón __1__ režim a režim __2__. \n\n__1__ režim: Zbraňový dodávkový kanón automaticky vybere nový cíl po každém výstřelu. Automaticky se vypne když žádní nepřátelé nezbývají v zaměřené zóně. Červové a hnízda jsou upřednostňovány před pohybujícími se nepřáteli při vybírání nových cílů. Automatický režim zaměřování není tak přesný jako manuální výběr - přibližně [color=cyan]1%[/color] mine a zasáhne náhodnou lokaci v dané zóně.\n\nRežim __2__: Zbraňový dodávkový kanón je v pohotovosti dokud hráč nezadá cíl pro něj s pomocí [img=item/se-delivery-cannon-artillery-targeter-se-iridium-piledriver] zaměřovacího zařízení. Jakmile je jakýkoliv cíl vybrán. jeden ze zbraňových dodávkových kanónů s odpovídajícím druhem munice a dostatkem energie na výstřel na odpovídající zónu vystřelí na vybrané místo a poté se zase přesune do stavu pohotovosti. Pokud je vícero cílů vybráno za pomocí zaměřovacího zařízení, budou zamluveny - jak se zbraňové dodávkové kanóny v režimu __2__ stávají dostupnými, budou střílet na zamluvené cíle. Pokud na cíl zaměřený se [img=item/se-delivery-cannon-artillery-targeter-se-iridium-piledriver] zaměřovacím zařízením není vystřeleno po několika minutách, vyprší - pokud se tak stane, doporučujeme postavit více dodávkových kanónů nebo namísto toho použít __1__ režim.
menu_steam_power=[img=item/se-big-turbine] Parní Energie
title_steam_power=Parní Energie
page_steam_power_text_1=Parní elektřina je ve Space Exploration je široce rozšířen. Jsou zde nové cesty pro produkci tepla a páry stejně jako pro její spotřebu pro generování elektřiny.\n\n[img=item/se-electric-boiler] [font=heading-2][color=#ffe6c0]Electrické Bojlery[/color][/font]\nZatímco Bojler může produkovat páru pomocí chemických paliv, Elektrický bojler produkuje páru pomocí elektřiny. Pára vyprodukována Elektrickým bojlerem obsahuje méně energie než bylo použito elektřiny pro přeměnu vody na páru, tudíž není ku pomoci při normální produkci elektřiny a nemůže být použit pro nekonečnou smyčku. Namísto toho může být pára uložena v nádržích, která může být použitá pro pozdější produkci elektřiny. Tato možnost nabízí ukládání energie vyšší kapacity než akumulátory za stejnou cenu, ačkoliv je tedy méně energeticky efektivní než akumulátory. Pára vyšších teplot je ještě více prostorově efektivní.\n\nElektrický bojler může vytvářet páru nižších teplot užitečnou pro použití v receptech které vyžadují páru nehledě na její teplotu, nebo odpařovat vodu jen za účelem se jí zbavit.\n\n[img=item/se-condenser-turbine] [font=heading-2][color=#ffe6c0]Kondezační Turbíny[/color][/font]\nNěkteré místa ve Space Exploration postrádají jakýkoliv přírodní zdroj vody (např. orbity nebo planety bez vody). V těchto lokacích se používání parních elektráren s parními turbínami vypadá bezútěšně, neboť stále zásobování vodou vyžadované Parními turbínami by nemohlo být zásobeno mimoplanetárními zdroji. V těchto případech přijdou Kondezační turbíny neuvěřitelně vhod. Kondenzační turbíny se chovají jako normální Parní turbíny s jednou podstatnou změnou: spíše než vypouštění příchozí páry do atmosféry je pára znovu zkondenzována zpátky na vodu a poté vypoštěna z turbíny. Toto umožňuje Kondezačním turbínám být použity ve (více méně) uzavřených smyčkách do kterých je potřeba dodávat pouze trochu vody k zásobení systému. Povšimněte si že Kondenzační turbíny jsou o trochu méně energeticky efektivní než Parní turbíny, což znamená že dostanete o trochu méně energie na výstupu ze stejného tepla pokud použijete Kondenzační turbíny namísto Parních turbín; to je výměnou za zpětné zíkání vody.\n\n[img=item/se-big-turbine] [font=heading-2][color=#ffe6c0]Vyokoteplotní Pára[/color][/font]\nV určitém bodě se používání páry na výrobu přílišného množství energie se stane těžkopádným kvůli potřebě velkého počtu Parních turbín. Pro obejití tohoto problému se škálováním, můžete použít vysokoteplotní páru jako náhradu. Produkovaná Vysokoteplotním tepelným výměníkem, spotřebovaná Vysokoteplotním turbínovým generátorem je vysokoteplotní pára neuvěřitelně energeticky hustá. Jejím použitím můžete dramaticky zmenšit velikost vaších parních elektráren. Pro použití Vysokoteplotních tepelných výměníků je potřeba zdroj tepla - tím nemůžou být nukleární reaktory, neboť se nemohou dostatečně zahřát - tím může být buďto Přijímač energie paprsku nebo Antihmotový reaktor. Standartní Tepelné potrubí nemůže přenášet tak vysoké teplo; pouze Naqiuové tepelné potrubí může přepravovat takto vysoké teplo. To znamená že dokuď nebudete mít dostupné Naqiuové tepelné potrubí, Vysokoteplotní tepelné výměníky musí být postaveny hned vedle zdroje oné vysoké teploty.
menu_lifesupport=[img=item/se-lifesupport-equipment-1] Podpora Života
title_lifesupport=Podpora Života
page_lifesupport_text_1=Podpora života je zajištěna pomocí vybavení a nádob podpory života. Potřebujete jak vybavení, tak nádoby podpory život k přežití v nehostinném prostředí.\n\nVybavení a použitelné nádoby mohou být produkovány v Zařízení podpory života.\n\nNádoby podpory života poskytují systému zdroje, které potřebuje k plnění všech svých rolí v podpoře života, a jsou postupně spotřebovávány. Nádoby se spotřebovávají přímo z vašeho inventáře. \n\nVybavení podpory života lze vložit do mřížky brnění, ale pokud používáte skafandr, již máte toto vybavení vestavěné. Přídavné vybavení podpory života vloženo do mřížky brnění či skafandru zvyšuje účinnost systémů podpory života. Pokud používáte vybavení podpory života v jiném typu brnění než ve skafandru, budete chráněni proti nehostinnému prostředí, ale ne proti vakuu vesmíru.\n\n[font=heading-2][color=#ffe6c0]Nehostinná prostředí[/color][/font]\nNehostinná prostředí jsou oblasti, ve kterých utrpíte poškození jen kvůli vašemu pobytu. Vybavení podpory života je navrženo tak, aby vás ochránilo před těmito hrozbami tím, že vám zajistí správný tlak, kyslík, vodu, výživu, regulaci teploty a ochranu proti radiaci. Dva hlavní typy nehostinného prostředí jsou:\n\nVesmír: Skafandr je pro pobyt ve vakuu nezbytný. Nestačí vám systémy podpory života, protože se ve vakuu bez skafandru stejně udusíte.\n\nPozemní prostředí: Některé planety a měsíce představují nebezpečí v podobě radiace, extrémního chladu či horka, nebo také kyselé atmosféry, a vyžadují vybavení podpory života. (Již brzy). Vybavení podpory života je také nutné na planetách, kde byly použity biologické zbraně (Morové světy). Podpora života může být v takových oblastech zajištěna skafandrem, či vybavením podpory života, vloženým do jakéhokoli brnění.
menu_space_sciences=[img=item/se-space-science-lab] Vesmírné Vědy
title_space_sciences=Vesmírné Vědy
page_space_sciences_text_1=Většina vědeckých balíčků může být zpracována pouze ve [img=item/se-space-science-lab] Vesmírné Vědecké Laboratoři, která lze používat pouze ve vesmíru. Pro další pokrok ve výzkumu budete muset všechny své balíčky nějak dostat do vesmíru (nejčastěji pomocí nákladní rakety). Mezi vhodná místa pro začátek patří: pás asteroidů díky surovinám které skýtá; blízká orbita hvězdy pro nejlepší solární energii; orbita planety či měsíce pro jednoduchou dostupnost ze základny.\n\n[img=item/space-science-pack] Prvním vědeckým balíčkem vyrobeným ve vesmíru je Vesmírný vědecký balíček, díky kterému se nauččíte základy vesmírné logistiky.\n\nNásledně dostanete volbu mezi [img=item/production-science-pack] Výrobním vědeckým balíčkem a [img=item/utility-science-pack] Užitkovým vědeckým balíčkem. Oba jsou vytvořeny ve vesmíru a oba jsou začátkem daty řízené vědy. Vytvořte datové karty, prožeňte karty super počítači a (skoro) vždy dostanete karty na konci. Pro udržení superpočítačů chladných, budete potřebovat [img=fluid/se-space-coolant-hot] termotekutinu a [img=item/se-space-radiator] ratiátory.\n\n[img=item/production-science-pack] Výrobní vědecký balíček vyžaduje základnu na Vulkanitovém světě. Umožňuje pak přístu k majákům, produktivitě těžby, modulům produktivity, Kovarexově obohacujcímu procesu a další technologiím zvyšující vaší produkci. Výrobní vědecký balíček vede k [img=item/se-material-science-pack-1] Materiální a [img=item/se-biological-science-pack-1] Biologické vědě.\n\n[img=item/utility-science-pack]Užitkový vědecký balíček vyžaduje základnu na Kryonitovém světě. Umožňuje přístup k některým hru měnícím technologiím, jako například logistický systém, artilerie, vylepšený osobní roboport a vylepšenou energetickou zbroj. Užitkový vědecký balíček vede k [img=item/se-astronomic-science-pack-1] Astronomické a  [img=item/se-energy-science-pack-1] Energetické vědě.\n\n[font=heading-2][color=#ffe6c0]Specializované Vědy[/color][/font]\n4 specializované vědy jsou Astronomická, Biologická, Energetická a Materiální. Všechny jsou datově řízená a následují posloupnost kdy vykonáváním experimentů sbíráte data pro super počítače které tak budují postupně přesnější model života, vesmíru a vůbec. Všechny jsou přibližně na stejné technologické úrovni, tudíž si můžete vybrat váš postup pokroku, nicméně každá z věd vyžaduje jednu specifickou surovinu v jistém měřítku, proto se nejprve rozhlédněte po vašem solárním systému, než si začnete některou vědu zkoumat.\n\n[img=item/se-astronomic-science-pack-4] Astronomická věda se především zaměřuje na vesmírnou logistiku.\n\n[img=item/se-energy-science-pack-4] Energetická věda se zabývá hlavně produkcí elektřiny, jejího přenosu a pár vysoce technologickýma udělátkama.\n\n[img=item/se-material-science-pack-4] Materiální věda se zaměřuje na těžký průmysl a přímá vvylepšení.\n\n[img=item/se-biological-science-pack-4] Biologická věda umožňuje vylepšení samotného hráče, medicínou, podporou života, biologickými zbraněmi a produktivitou.\n\n[font=heading-2][color=#ffe6c0]Hlubokovesmírná věda[/color][/font]\n[img=item/se-deep-space-science-pack-1]Hlubokovesmírná věda se zaměřuje na průzkum mezihvězdné prázdnoty, antihmotu a zakřivování časoprostoru.\n\n[font=heading-2][color=#ffe6c0]Tipy & triky[/color][/font]\nVýrobní rychlost a efektivita je významně vylepšena odemykáním lepších receptů. Dávejte pozor na obměnu receptů které odemknete, především na recepty simulace a vědeckých náhledů.\n\nVysoké bonusy produktivity ve vesmírných laboratořích jsou důležité, je proto vhodné prozkoumání možností jak se k takových bonusů dosáhnout.\n\nPravděpodobněji budete držen rychlostí s jakou můžete navrhnout nový systém než nároky na suroviny. Nepokoušejte se stavět moc ve velkém. Sestavte nejdřív něco jednoduchého. Pokud jste vyzkoumal všechny technologie které můžete, pravděpodobně by jste měl začít pracovat na dalším vědeckém balíčku namísto zvyšování vaší produkce.\n\nMůžete také odkládat vylepšení vaší infrastruktury dokud nedosáhnete Úrovně 4 veesmírných věd.\n\nLepší moduly a lepší majáky mohou udělat velký rozdíl v rychlosti produkce.
menu_space_elevators=[img=item/se-space-elevator] Vesmírné Výtahy
title_space_elevators=Vesmírné Výtahy
page_space_elevators_text_1=Vesmírné výtahy propojují povrch planety či měsíce s její orbitou. Struktura poskytuje přímé spojení sinálů a elektřiny. Vlaky mohou vstoupit do výtahu aby byly vyneseny na druhou stranu. Vesmírné výtahy jsou dobře stavěny na vytížené trasy kde je potřeba konstantní tok přemětů, ačkoliv nejsou výhoné pokud je potřeba předměty přesouvat pouze občasně. Rakety a dodávkové kanóny mají relativně vysokou cenu přepravy jednotlivých stohů, kdeežto vesmírné výtahy mají malé náklay na přepravený stoh, ale vyžadují stálou údržbu.\n\n[font=heading-2][color=#ffe6c0]Umístění[/color][/font]\nStruktura vesmírného výtahu musí být položena přichycna na železniční mřížku 2x2. Jakmile je vesmírný výtah postaven, objeví se staveniště na stejných souřadnicích na obou površích; na orbitě a na povrchu tělesa. Pokud není volný prostor na jednom z povrchů, tak je konstrukce zrušena. Pokud se toto stane, můžete kliknout na GPS souřadnice které se zobrazí ve zprávě o zrušené konstrukci abyste viděli čím je prostor na druhém povrchu zabrán.\n\n[font=heading-2][color=#ffe6c0]Konstrukce[/color][/font]\nVýtah začíná jako dvě kotevní struktury, zatímco spojení mezi nimi, vlákno, chybí a bude potřebovat další konstrukční materiály. Kotevní struktury slouží jako staveniště které vyžadují elektřinu a [img=item/se-space-elevator-cable] Lano vesmírného výtahu pro postavení celého vesmírného výtahu. Konečná cena vlákna záleží na průměru planety či měsíce. Jak probíhá stavba si můžete prohlédnout otevřením entity vesmírného výtahu. Oba konce mohou přispívat ke konstrukci, stejně jako může být konstrukce dokončena zásobením pouze jednoho konce.\n\n[font=heading-2][color=#ffe6c0]Údržba[/color][/font]\nVesmírný výtah vyžaduje údržbu ve formě dalších [img=item/se-space-elevator-cable] Lan vesmírného výtahu. Největší dopad na údržbu má plynutí času, ačkoliv každý přepravený stoh nahoru nebo dolu mírně zvýší náklady na úržbu. Náklady na údržbu jsou také ovlivněny velikostí planety; čím větší graviační stuna tím vyšší celkové náklady. Náklady na údržbu a přepravu jednotlivých vagónů si můžete prohlédnout v rozhraní výtahu přejetím přes lištu pokroku.[font=heading-2][color=#ffe6c0]Propojení kabelů[/color][/font]\nVýtah slouží jako mezipovrchový stožár. Elektrická a obvodová síť se připojuje prostřední částí struktury výtahu a tím se přímo připojují na druhou stranu výtahu. Propojení vyžaduje aby vlákno bylo již postaveno pro přesun elektřiny a signálů.\n\n[font=heading-2][color=#ffe6c0]Vlakové Propojení[/color][/font]\nVesmírný výtah může být přejmenován, čímž se změní názvy vnitřních stanic obou konců výtahu, která každá z nich má nakonci šipku ukazující nahorů nebo dolů. Vlaky mohou používat automaticky výtah pokud je vnitřní stanice výtahu nastavena jako zastávka. Není doporučeno manuálně řídit dlouhý vlak skrze výtah (protože hráčovi signály se oddělí od vlaku po změně povrchu, tudíž musíte stále mačkat klávesu dopředu abyste se nezasekli). Pokud se vlak zasekne, v nastavení výtahu je možné vynutit posun vlaku, jen je potřeba aby zde bylo dostatek místa na trati pro zbytek vlaku. S touto možností zapnutou se musíte vždy ujistit že je výjezd vždy volný pro další vlaky neboť jinak vlak tlačený dopředu bude mířit přes další vlaky a železniční bloky.\n\n[font=heading-2][color=#ffe6c0]Energie[/color][/font]\nVesmírný výtah má zásobník energie, rozdělený mezi dvě kotviště. Při posílání vlaků na orbitu je energie spotřebovávaná z tohoto zásobníku a naopak při posílání vlaků  dolů z orbity se tento zásobník nabíjí. Konstrukce nevyšle nový vlak pokud není v zásobníků minimální energie. Kolik energie je spotřebováno při vyslání jednoho železničního vozu si můžete prohlédnout v rozhraní výtahu přejetím přes lištu pokroku.
menu_energy_beams=[img=item/se-energy-transmitter-emitter] Energetické Paprsky
title_energy_beams=Energetické Paprsky
page_energy_beams_text_1=[font=heading-2][color=#ffe6c0]Výron koronální hmoty[/color][/font]\nBlízké hvězdy často vyvrhávají nebezpečné proudy částic. Není neobvyklé, že planeta či měsíc se těmto proudům ocitne v cestě. Pokud se vaše základna nachází na ovlivněném povrchu, měli byste se evakuovat, rozdělit a rozprostřít vaše stavby, nebo postavit Deštník s velkou zásobou energie v akumulátorech. Pokud bude nějaký povrch v nebezpečí, budete o výronu vědět minimálně 4 hodiny dopředu. Známé hrozby budou vypsány níže.
page_energy_beam_warning_text=[img=virtual-signal/se-star] Upozornění: Výron koronální hmoty míří k __1__. \nOdhadované nároky na obranu: __3__GW elektřiny ve špičce, __4__GJ za 120 sekund. Předpokládaný čas konání: __2__s.
page_energy_beams_text_2=[img=item/se-energy-beam-defence] [font=heading-2][color=#ffe6c0]Deštník: Obrana před energetickými paprsky[/color][/font]\nZařízení obrany před energetickými paprsky, "Deštník", vás dokáže ochránit před výronem koronální hmoty (tzv. slunečním deštěm), ale také před energetickými útoky z vesmíru. Zařízení tohoto efektu dosahuje uspořádáním magnetických částic do ochranné bubliny, a poté shlukem částic k rozptýlení nebezpečných energetických paprsků. Jediným požadavkem k fungování je energie, základní spotřeba je 10MW, ale ta se zvyšuje podle síly dopadajících proudů částic. Proti obyčejnému výronu koronální hmoty postačí jeden Deštník pro jeden povrch, proti zbraním na bázi energetických paprsků dokáže jeden Deštník odstínit až 500GJ energie. Pro výron koronální hmoty je základní energetická potřeba u planety s poloměrem 5000 a výkonností solárních panelů 100% zhruba 160GJ energie, přičemž doba trvání bude 2 minuty a nejvyšší odběr ze sítě bude činit asi 2GW (tento energetický vrchol nastane po první minutě působení proudu částic). Tyto hodnoty se mění s výkonem solárních panelů na vybraném povrchu, a u pevných těles (planety, měsíce, ...) také záleží na poloměru (výsledné hodnoty lze vypočítat pomocí rovnice přímé úměry). U zářiče energetických paprsků se potřebná obranná energie odhaduje na 1/10 síly paprsku u cíle (po ztrátě účinnosti).\n\n"Deštník" může bránit jak planetu/měsíc a její orbitu před výronem koronální hmoty a energetických paprsků. Pokládáním "Deštníku" jak na planetě tak na planetě/měsíci ochrání obě zóny.\n\n[img=item/se-energy-transmitter-emitter] [font=heading-2][color=#ffe6c0]Vysílání energie[/color][/font]\nZářič energetických paprsků dokáže vysílat energii na různé povrchy. Je schopen dvou způsobů vysílání energie, buď může poskytovat energii vzdáleným povrchům, "Energizovat", nebo může být použit jako řezák na bázi paprsků, "Kosa". V módu "Kosy" konstantně způsobuje poškození na určitém místě, ale toto místo může být pozměněno, čímž se "vypálí cesta". Poškození, oblast působnosti a rychlost paprsku se zvyšuje v závislosti na vložené energii. Mód "Auto-Kosa" je autonomní selektor cílů.\n\nZářič energetických paprsků má 4 konektory, ke kterým se mohou připojit paprskové komory. Paprskové komory se mohou propojit krátkou stranou, nebo může být jedna připojena krátkou stranou na dlouhou stranu jiné, ale nemohou být propojeny "vedle sebe". Paprskové injektory se připojují po stranách ke komorám. Každý připojený injektor zvyšuje výkon připojeného zářiče. K přijetí energie ze zářiče budete potřebovat paprskový přijímač na cílovém povrchu, a budete tento přijímač muset zvolit v zaměřovači zářiče. Jakmile paprsek dorazí k přijímači, přijímač se začne zahřívat. Toto teplo může být poté vedeno do výměníků tepla a lze tak pohánět turbíny.
