energy-shield-mk6-equipment=Ochranná bublina která se rychle nabíjí ale spotřebovává hodně elektřiny.
sand-processing=Drcení, mletí, a filtrace surových materiálů na čistý písek.
glass-processing=Roztavení písku na sklo.
rocket-silo=Umožňuje vám vyslat satelit na orbitu a odhalit tak nové planety.
se-adaptive-armour=Brnění, které využívá energie k samoopravě. Plní podobnou úlohu jako energetické štíty s nižšími energetickými nároky, ale s mnohem pomalejší regenerací.
se-antimatter-engine=Anihilace antihmoty k produkci neuvěřitelnému tahu.
se-antimatter-reactor=Anihiluje antihmotu hmotou za vývinu extrémního množství tepla.
se-antimatter-production=Produkce antihmoty, nejhustší formy energie.
se-astronomic-science-pack=Umožňuje výzkum technologií souvisejcích s pohybem vesmírem a mezihvězdnou logistikou
se-biological-science-pack=Umožňuje výzkum technologií souvisejcích s vylepšováním vlastních fyzických možností, biozbraní a neurálních sítích.
se-cargo-rocket-section-beryllium=Lehkost berylia může být využita při montáži částí rakety za použití méně surovin.
se-condenser-turbine=75% energitická účinost parní turbíny ale 99% spotřebované páry je navráceno v podobě vody. Přijímá páru teploty od 100 do 999 stupňů.
se-core-miner=Umožňuje nekonečnou těžbu surovin z planety nebo měsíce, ačkoliv má zmenšující se výsledky při vícenásobném použití na stejném tělesu.
se-biogun=Puška, která využívá různé druhy biologické munice.
se-cryogun=Vytváří ledovou stěnu která dokáže zmrazit nepřátele.
se-cryonite-lubricant=Mazivo může být vytvořeno z kryonitu pro uštření ropy.
se-deep-space-science-pack=Vyžadované pro nejvíce pokročilé technologie
se-deep-catalogue=Distorce prostoru, exotická hmota a data nanoinženýrství strukturovaná pro analýtu a počítačovou simulaci. Vyžadováno pro nejpokročilejší technologie.
se-dimensional-anchor=Používá gravitační studnu hvězdy jako stabilizační bod pro prostorovou anomálii.
se-electric-boiler=Produkuje páru z vody pomocí elektrické energie. Má 90% účinnost, tudíž jím nezíkáváte elektřinu. Vysokoteplotní pára může být použita pro skladování elektřiny, pára nižších teplot naopak pro výrobu.
se-energy-science-pack=Umožňuje výzkum technologií souvisejcích se základními sílami a subatomárních objevů.
se-fluid-burner-generator=Vyžaduje kapalné palivo s výhřevní hodnotou (jako například kapalné raketové palivo) pro generování elektřiny. Jednoduchý a kompaktní, ale postrádajcí efektivitu větších systémů na parní bázi. Navrženo pro použití v kosmu. Skutečná spotřeba tekutin závisí na výhřevnosti paliva.
se-fuel-refining=Rafinace pokročilejších paliv.
se-heat-shielding=Kombinovaný panel používaný pro vysokoteplotní aplikace a vesmírné struktury.
se-heat-shielding-iridium=Odolnost iridia může být použita pro výrobu tepelného stínění za použití mnohem méně surovin.
se-ion-engine=Iontové motory využívají malé množství proudu iontů pro velkou sílu tahu k pohybu vesmírné lodi. Iontové posilovací nádrže jsou menší než ostatní posilovací nádrže ačkoliv pomocí nich lze vzletět pouze ve vakuu. 
se-long-range-star-mapping=Některé daleké galaxie mohou být identifikovány specifickým vzorcem neobvyklých hvězd. Výsledky jsou zapsány v [img=virtual-signal/informatron] Informatronu [__CONTROL__informatron__].
se-low-density-structure-beryllium=Lehké beryliové lešení může nahradit těžké části odlehčených struktur.
se-material-science-pack=Umožňuje výzkum technologií souvisejcích s pokročilými materiály pro náklady pokročilejšího inženýrství.
se-medpack=Použijte lékárničku pro uzdravení se.
se-medpack-2=Použijte lékárničku pro uzdravení se.
se-medpack-3=Použijte lékárničku pro uzdravení se.
se-medpack-4=Použijte lékárničku pro uzdravení se.
se-meteor-defence=Sestřelte meteory z nebes než vám zničí vaše věci. Zařízení pro obranu před meteory dokáže ubránit celou planetu, ale střílet jen na jeden meteor najednou.
se-meteor-point-defence=Sestřelte meteory z nebes než vám zničí vaše věci. Meteor point defence can protect a small area from up to 4 meteors at a time.
se-nanomaterial=Složité uspořádání různých materiálů organizované v nano měřítku, tvořící kompozit s neuvěřitelnými vlastnostmi.
se-plague=Velký Mor ničící všech život z planety. Ničí kousače, stromy, ryby, vitamelánž a další. Lidi potřebují podporu života pro přežití.
se-processing-beryllium=Zpracování berylu na beryllium, extrémně lehkého, silného, korozi a radiaci odolného kovu. Také skoro nereaguje s rengenovým zářením.
se-processing-cryonite=Zpracování zmraženého kryonitových krystalů do kryonitových tyčí pro aplikaci v mražení, chlazení a lubrikaci. Kryonit je nalezitelný především na zamrzlých planetách.
se-processing-holmium=Zpracování holminitu do holmia, kovu vzácných zemins nejvyšší magnetickou permiabilitou ze všech prvků.
se-processing-iridium=Zpracování iriditu na iridium, nejvíce korozi odolný kov a nejhustší prvek za vyšších teplot. Důležité pro náročné aplikace.
se-processing-naquium=Přeměna záhadného neqititového krystalu z hlubokého vesmíru na naquim, kovu podobný materiál s nezvyklými časoprostorovými interakcemi.
se-processing-vitamelange=Přeměna primitivního vitamelanžové kamenité houby na hodnotný nutriční extrakt.
se-processing-vulcanite=Zpracování vulkanických vulkanitových krystalů do rafinováného prášku použitého v pokročilém hutnictví, raketovém palivu a dalších vysokoteplotních chemických procesech. Vulkanit je především nalezitelný na vulkanických planetách.
se-pyroflux-smelting=Vulkanit může být použit pro efektivnější zpracování dalších surovin.
se-processing-water-ice=Používáním vlastností kryonitu může být voda přeměněna do hustší pevné podoby; užitečné pro transport.
se-processing-methane-ice=Používáním vlastností kryonitu může být metan přeměněn do hustší pevné podoby; užitečné pro transport.
se-pulveriser=Rozdrtí a rozemele tvrdé minerály a fragmenty jádra planety.
se-processing-unit-holmium=Pokročilé datové krytí holmiových kabelů může být použito pro vytváření mikroprocesorů za použití méně komponentů.
se-railgun=Elektromagneticky akcelerované šipky letí takovou rychlostí, že než se vypaří, zanechají za sebou plasmu. Vysoké poškození, nízká rychlost palby.
se-rocket-cargo-safety=Snižuje šanci na poškození nákladních kontejnerů o 10% (multiplikativní).
se-rocket-fuel-from-water=Generuje vodíkovo kyslíkové raketové palivo pomocí elektrolýzy vody.
se-vulcanite-rocket-fuel=Energie obsažená v pyroflaxu je dostatečně silná k vytvoření raketového paliva.
se-rocket-launch-pad=Umožňuje vám zasílat náklad do vesmíru či na jiné planety.
se-rocket-landing-pad=Umožní vám doručovat náklad na pojmenovanou přistávací plochu. S postupným výzkumem může také umožnit opětovné navrácení částí rakety.
se-rocket-reusability=Zvyšuje počet částí rakety, které jsou navráceny z úspěšného přistání na přistávací ploše o 4% (Základ je 20%, maximální hodnota je 100%).
se-rocket-survivability=Snižuje pravděpodobnost poškození rakety při cestě a taktéž snižuje pravděpodobnost navigačního selhání, které by mohlo vyústit v minutí přistávací plochy, o 10% (multiplikativní).
se-rtg-equipment=Radioizotopový termoelektrický generátor. Poskytuje energii pro vybavené vybavení.
se-rtg-equipment-2=Radioizotopový termoelektrický generátor MK2. Poskytuje energii pro vybavené vybavení.
se-fusion-reactor-equipment=Poskytuje energii pro vybavené vybavení.
se-antimatter-reactor-equipment=Poskytuje energii pro vybavené vybavení.
antimatter-reactor-equipment=Poskytuje energii pro vybavené vybavení.
se-space-assembling=Modifikovaná montovna která může fungovat ve vesmíru.
se-space-accumulator=Budovy jenž skladují velké množství nevyužité elektrické energie pro pozdějíší použití.
se-space-accumulator-2=Budovy jenž skladují neuvěřitelné množství nevyužité elektrické energie pro pozdějíší použití.
se-space-astrometrics-laboratory=Kombinuje, porovnává a kvatifikuje rozdílné zdroje astronomických informacích.
se-space-biochemical-laboratory=Pokročilá chemická laboratoř se zaměřením na biochemii. Může také vykonávat ropné a jednodušší chemické zpracování.
se-space-catalogue-astronomic=Astronomická datová struktura připravená pro analýzu a počítačové simulace. Vyžadovaná pro další astronomický výzkum.
se-space-catalogue-biological=Biologická datová struktura připravená pro analýzu a počítačové simulace. Vyžadovaná pro další biologický výzkum.
se-space-catalogue-universal=Kombinovaná data připravená pro analýzu a počítačové simulace. Vyžadovaná pro další hlubokovesmírný výzkum.
se-space-catalogue-energy=Energetická datová struktura připravená pro analýzu a počítačové simulace. Vyžadovaná pro další energetický výzkum.
se-space-catalogue-material=Materiálová datová struktura připravená pro analýzu a počítačové simulace. Vyžadovaná pro další materiální výzkum.
se-space-data-card=Víceúčelové zařízení ukládání dat. Vyžadovaní pro pokročilé daty řízené výzkumy.
se-space-decontamination-facility=Čistí substance pro použití ve sterilním prostředí, a připravuje kapaliny pro použití v prostředí s nízkým tlakem.
se-space-electromagnetics-laboratory=Zařízení pro aplikaci intenzivních magnetických polí a extrémně vysokých napětích.
se-space-elevator=Může přesouvat vlaky a elektřinu mezi planetou či měsícem a její orbitou. Viz Vesmírné Výtahy v [img=virtual-signal/informatron] Informatronu pro více informací[__CONTROL__informatron__].
se-space-elevator-cable-nano=Využívaje nanomateriály, více materiálně efektivní konstrukce vlákna Vesmírného výtahu je možná.
se-space-genetics-laboratory=Laboratoř vyhrazená pro sekvencování DNA, genetické modifikace a pěstění genetických monokultur.
se-space-gravimetrics-laboratory=Analyzuje a simuluje gravitační odchylky.
se-space-growth-facility=Pěstuje biologické vzorky pod širokou škálou kontrolovaných podmínek, které jsou kdekoli jinde nemožné, například pod vlivem mikrogravitace.
se-space-hypercooling=Provádí tepelnou výměnu na termotekutinách, přičemž jedna ztratí teplo zatímco druhá se oteplí.
se-space-laser-laboratory=Experimety s lasery. Ochrana očí je nutná.
se-lifesupport-facility=Udržování života ve více nehostiných prostředích.
se-space-manufactory=Klíčová technologie pro masovou výrobu ve vesmíru.
se-space-material-fabricator=Syntéza nových materiálů. Průnik mezi částicovým srážečem a 3D tiskárnou.
se-space-matter-fusion=Výroba materiálů pomocí fúze.
se-space-mechanical-laboratory=Umožňuje škálu mechanických procesů: Drcení, trhání, odlamování, vibrování, atd.
se-space-particle-accelerator=Urychlování částic k rychlosti světla.
se-space-particle-collider=Sráží vysokorychlostní částice a zkoumá výsledky.
se-space-plasma-generator=Vytváří různé typy plasmy.
se-space-platform-plating=Robustní plátovaná vesmírná platforma. Hladká a rychlá pro chůzi.
se-space-platform-scaffold=Základní vesmírná platforma. Dobré pro stavbu ale ne tolik pro chůzi.
se-space-radiation-laboratory=Poměrně bezpečné místo na hraní si s radioaktivními materiály. Může být použito pro zpracování uranu.
se-space-radiating-efficiency=Pomalejší ale materiálně efektivnější chlazení ohřáté termotekutiny.
se-space-radiating-speed=Rychlejší ačkoliv materiálně náročnější chlazení ohřáte termotekutiny.
se-space-radiator=Vyzařuje přebytečné teplo z ohřáté termotekutiny.
se-space-radiator-2=Vyzařuje přebytečné teplo z ohřáté termotekutiny.
se-space-rail=Koleje které jsou bezpečné pro použití ve vesmíru, protože zabraňují vlakům vylétat z kolejnic a ničit vše v dosahu. Lze použít i na povrchu pro estetické účely.
se-recycling-facility=Šrotování předmětů a přepracování šrotu na surové materiály.
se-space-science-lab=Umožňuje zpracování raketové vědy a více pokročilých vesmírných věd.
se-space-solar-panel=Vysokoefektivní solární panel po kterém můžete chodit.
se-space-spectrometry-facility=Spektrofotometrie, plynová chromatografie, hmotnostní spektrometrie a další spektrografie. Házej věci na stěnu, nech je zakřivit a čekej kde se ti vrátí.
se-space-supercomputer=Umožňuje pokročilejší manipulaci s daty, jejich zpracování i simulaci.
se-space-telescope=Pokoročilý teleskop citlivý na více vlnových délek okolo viditelného spektra.
se-space-telescope-gammaray=Gama paprsky se nelámou. Tento pokročilý teleskop namísto toho používá zrcadla a speciální detektory.
se-space-telescope-xray=Rentgenové záření je odchýleno většinou atmosfér. Tento pokročilý teleskop je navržen pro vesmírné použití, kde atmosféra není problém.
se-space-telescope-microwave=Obrovský teleskop detekující mikrovlné záření a kosmícké mikrovlné pozadí.
se-space-telescope-radio=Obrovský teleskop který detekuje velmi slabé radiové vlnění ze vzdálených zdrojů.
se-space-thermodynamics-laboratory=Provádí procesy, které zahrnují extrémní teploty. Dokáže také provádět základní termální procesy, jako například tavení rud.
se-spaceship=Plavidlo, které postavíte kousek po kousku za pomocí paluby a stěn a se kterým poté pomocí řídící konzole poletíte k jiným planetám a dál.
se-spaceship-integrity=Každá úroveň zvyšuje limit strukturální integrity o 100.
se-factory-spaceship=Každá úroveň zvyšuje limit strukturální integrity o 500.
se-superconductive-cable=Supravodivý kompozitní kabel který nepotřebuje aktivní chlazení.
se-teleportation=Umožní zkoumat další teleportační technologie. Tato technologie nedělá nic sama o sobě, ale je předpokladem pro další technologie.
se-tesla-gun=Řetězové výboje s vysokou rychlostí palby. Dokáže zasáhnout až 30 nepřátel na jeden výboj. Výboje přeskakují daleko na nepřátele, či na krátkou vzdálenost po zemi, pokud kolem nejsou žádné cíle.
se-thruster-suit=Skafandr s tryskami a magnetickými botami. Bez něj do vesmíru nechoďte.
space-science-pack=Umožňuje výzkum technologií souvisejcích s vesmírnou logistikou, zpracováním exotických surovin a výstavbou vesmírných variant pozemních struktur.
se-rocket-science-pack=Umožňuje vývoj pokročilých raketových systémů a technologií které mají prospěch z těchto vylepšení.
se-computer-science-pack=Umožňuje výzkum technologií souvisejcích s datově řízeným výzkumem a specializované vesmírné továrny.
se-aeroframe-pole=Silná, ale lehká berylliová tyč, která se obyčejně používá jako podpůrný nosník pro letecký a vesmírný průzkum.
se-aeroframe-scaffold=Silný, ale lehký berylliový strukturální rám, který se obyčejně používá jako hlavní vnitřní kostra pro letecká a vesmírná plavidla.
se-aeroframe-bulkhead=Silná, ale lehká vzduchotěsná berylliová stěna, která se používá jako vnější či primární zdivo v leteckých a vesmírných plavidlech.
se-lattice-pressure-vessel=Silná, ale lehká berylliová tlaková nádrž, která dokáže některé kapaliny stlačit za hranici normálních mezí. Je-li tlaková nádrž roztržena, natlakovaná kapalina je bezpečně odvětrána.
se-heavy-girder=Těžký iridiový strukturální nosník, který se používá v těžkém průmyslu a ve vojenských plavidlech.
se-heavy-bearing=Velké těžké iridiové ložisko, které může fungovat nezávisle na působících silách, které by jiné materiály zničily.
se-heavy-composite=Tlustý, téměř neproniknutelný materiál, prakticky imunní proti teplu, korozi, radiaci a mechanickým vlivům, ale je neuvěřitelně těžký.
se-heavy-assembly=Těžký mechanismus složen z koleček a konfigurovatelných komponentů, který se používá v těžkém průmyslu.
se-bioscrubber=Komora, která využívá biologických procesů k rozkladu nežádoucích materiálů.
se-vitalic-epoxy=Neuvěřitelně silná pryskyřice s regenerativními vlastnostmi.
se-vitalic-reagent=Efektivní víceúčelové činidlo použitelné v široké škále chemických reakcí.
se-vitalic-acid=Koncentrovaný koktejl různých kyseliny.
se-self-sealing-gel=Pod tlakem viskózní gel, ale při vystavení vakuu se stává tvrdým jako ocel. Často se používá jako film v přepážkách k pasivnímu těsnění potenciálních děr.
se-holmium-cable=Opláštěný kabel specificky navržrní na krytí nežádaného rušení které by nastalo při kontaktu s jemnou elektrotechnikou.
se-holmium-solenoid=Mimořádně silný elektromagnet
se-quantum-processor=Vužívá superpozic a kvantových provázání k efektivnějším výpočtům velmi složitých problémů.
se-dynamic-emitter=Rychle upravitelný přístroj vyzařující světlo nebo proudy částic, který může měnit vlastnosti k dosažení vyššího dosahu, skenovacího módu, nebo penetraci materiálů.
se-naquium-processor=Výpočty uvnitř naquiového teseraktu obcházejí některé obvyklé limity výpočetní hustoty.
se-naquium-cube=Využívá neobvyklé interakce naquia s časoprostorem k vměstnání velkého objemu do malé krychle.
se-naquium-tessaract=Podivný objekt, který se usazuje do tvaru krychle, ale dokáže měnit svůj tvar na řadu jiných geometrických objeků pokud je aktivován nebo urychlen.
se-compact-beacon=10 slotů pro moduly se 75% přenosovou efektivitou pro maximální sílu 7,5 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 2 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-compact-beacon-2=10 slotů pro moduly se 100% přenosovou efektivitou pro maximální sílu 10 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 2 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-wide-beacon=15 slotů pro moduly s 50% přenosovou efektivitou pro maximální sílu 7,5 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 14 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-wide-beacon-2=20 slotů pro moduly s 50% přenosovou efektivitou pro maximální sílu 10 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 14 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-lifesupport-equipment-1=Zvyšuje efektivitu podpory života +100% (přičitatelné). Pokud je nainstalováno jinde nežli ve skafandru, bonus je poloviční a nebude fungovat ve vesmíru.
se-lifesupport-equipment-2=Zvyšuje efektivitu podpory života +200% (přičitatelné). Pokud je nainstalováno jinde nežli ve skafandru, bonus je poloviční a nebude fungovat ve vesmíru.
se-lifesupport-equipment-3=Zvyšuje efektivitu podpory života +400% (přičitatelné). Pokud je nainstalováno jinde nežli ve skafandru, bonus je poloviční a nebude fungovat ve vesmíru.
se-lifesupport-equipment-4=Zvyšuje efektivitu podpory života +800% (přičitatelné). Pokud je nainstalováno jinde nežli ve skafandru, bonus je poloviční a nebude fungovat ve vesmíru.
se-supercharger=Může nabíjet až 64 robotů vysokou rychlostí. Maximální elektrický odběr je 1GW.
se-addon-power-pole=Malý elektrický sloup, který byl navržen k připojení na budovy a nebo pro precizní kontrolu elektrického pokrytí.
se-pylon=Rozvádí elektrickou energii. Vzdálenost připojení je 64 dlaždic.
se-pylon-substation=Rozvádí elektrickou energii. Vzdálenost připojení je 64 dlaždic, poskytovací oblast je 64x64 dlaždic.
se-pylon-construction=Rozvádí elektrickou energii a rozšiřuje konstrukční oblast. Vzdálenost připojení je 64 dlaždic, konstrukční oblast je 64x64 dlaždic.
se-pylon-construction-radar=Rozvádí elektrickou energii, rozšiřuje konstrukční oblast a dodává vizi radarem. Vzdálenost připojení je 64 dlaždic, konstrukční a radarová oblast je 256x256 dlaždic. Logistická oblast je 4x4.
se-shield-projector=Vytváří ochranné silové pole. Spotřebovává více energie pokud se nabijí, nebo pokud je štít pod náporem. Pokud máte nainstalovanou modifikaci "Walls Block Spitters", dokáže blokovat projektily plivačů.
se-deep-space-transport-belt=Rychlé dálkové dopravní pásy, které mohou být použity ve vesmíru. Různé barvy mohou být použity k jednoduchému rozeznání z dálky.
se-big-turbine=Velký 1GW generátor, který přijímá páru o 5000°C, odevzdává páru o 500°C na druhém konci, a vydává vodu po stranách. Energeticky efektivní na 99%, vodu spořící na 99%.
se-big-heat-exchanger=Velký výměník tepla navržen pro vysoké teploty a velké kapacity.
se-zone-discovery-random=Hledá planety, měsíce a pásy asteroidů pomocí teleskopů.
se-zone-discovery-targeted=Hledá planety, měsíce a pásy asteroidů se zaměřením na určitou surovinu. Zaměření na surovinu vyberte v [img=virtual-signal/informatron] Informatronu > Objev zón.
se-zone-discovery-deep=Hledá zajímavé oblasti v hlubokém vesmíru. Pole asteroidů mohou ukrývat spoustu unikátních a cenných surovin.
se-delivery-cannon=Kolejnicové elektromagnetické dělo schopné střílet suroviny na orbitu a dál a obrněná truhla na jejich záchyt.
se-delivery-cannon-capsule-iridium=Ačkoliv je iridium těžkým kovem, zvýšená odolnost znamená méně použitého materiálu v porovnání se standartní dodávkovou kapslí. Celková váha je stejná, pouze je jednodušší na výrobu.
se-delivery-cannon-weapon=Velké elektromagnetické kolejnicové dělo schopné střílet speciální munici, jako jsou atomové bomby, na jiné povrchy.
se-spaceship-clamps=Umožňuje postavit dokovací svorky na vesmírnou loď tak aby se mohla ukotvit na specifické lokaci k další svorce. Pro automatizaci je vyžadováno aby signály "Ukotvit pomocí" a "Ukotvit k" byly přivedeny do řídící konzole.
se-bio-upgrade-constitution=Zvýšení maximálního počtu životů.
se-bio-upgrade-strength=Zvýšená kapacita inventáře.
se-bio-upgrade-agility=Zvýšená rychlost pohybu.
se-bio-upgrade-dexterity=Vylepšená rychlost vyrábění.
se-bio-upgrade-intelligence=Zvýšené učení získané z každého vědeckého balíčku.
se-energy-beaming=Intenzivní energetický paprsek, který může být použit jako zbraň, nebo k přenosu energie na jiné povrchy.
se-energy-beam-defence=Brání planetu a její orbitu proti energetickým paprskům z vesmíru a výronu koronální hmoty. Funguje levitací magnetických čátic do ochranné bubliny a poté je přeskupí a nahromadí jak je potřeba pro rozptýlení nepřátelských energetických paprsků. 
se-nexus=Zařízení které může být aktivováno pouzeb na pohybující se vesmírné lodi v mezihvězdném prostoru pro generování dat a s dalšími technologiemi může aktivovat prostor zakřivující pole (Vítěství Vesmírnou Lodí).
se-spaceship-victory=Umožňuje Nexusu aktivovat zakřivující pohon pro opuštění místní hvězdokupy. Nech Nexus běžet v módu Zakřivující Pohon ve vesmírné lodi s inegritou __3__ pohybující se rychlostí __1__ po dobu __2__ sekund v mezihvězdném prostoru.
se-arcosphere=Umožňuje sběr arkosfér ztracených v mezihvězdné prázdnotě.
se-arcosphere-folding=Umožňuje extradimenzionální arkosfér.
se-space-probe=Vesmírné raketové silo užívané pro vypouštění vesmírných sond. Může být také použito k levnému vypouštění satelitů.
se-linked-container=Kontejner propojen extradimenzionálním prostorem k jinému kontejnru. Propojení kontejneru závisí na povrchu na který byl poprvé položen.
se-centrifuge=Umoňuje mnohé recepty pro zpracování a rafinaci materiálů.
steam-turbine=Generuje elektřinu z vysokoteplotní páry, jako například z tepelného výměníku (stálá elektřina) nebo z elektrického bojleru (uskladnění energie).
se-space-belt=Rychlé přilnavé a magnetické transportní pásy navržené tak, aby z nich předměty neodplouvali do volného kosmu.
se-space-pipe=Natlakované tepelně izolované potrubí které zamezují tekutinám jako je voda před zamrzáním ve chladném vakuu kosmu. Schopnost cestovat podpovrchem je omezena, zatímco na dlouhé vzdálenosti lze jednoduše využít dlouhé varianty potrubí.
se-pyroflux-smelting-beryllium=Pyroflaxové hutní zpracování berylia je dvakrát tak efektivní, či dokonce více díky produktivitě dalšího kroku.
se-pyroflux-smelting-holmium=Pyroflaxové hutní zpracování holmia je dvakrát tak efektivní, či dokonce více díky produktivitě dalšího kroku.
se-space-capsule-navigation=Odemyká možnost použít kapsli pro osobní přesun. Sekce rakety mohou být přidány přímo do vesmírné kapsle pro vlet bez použití sila pro nákladní rakety. Užitečné pro pohyb hráče kolem, nikoliv však pro jeho náklad.
kr-singularity-beacon=10 slotů pro moduly se 100% přenosovou efektivitou pro maximální sílu 10 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 2 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
se-kr-rare-metal-substrate=Pokroky v chápání našich potřeb pro ukládání dat vedlo k nápadu na zlepšení základního substrátu který, ačkoliv bude vyžadovat vzácné kovy, je efektivněji produkován.
se-kr-efficient-fabrication=Se stále zvyšujícími se náklady na více a lepší elektroniku v našich výrobních řetězcích je pouze přirozené využití lithia za docílení méně plýtvání primárních surovin.
se-kr-fuel-refining=Expanze ještě dál bude vyžadovat lepší zpracování paliv.
se-kr-nutrient-enrichment=Nutriční obohacování umožňující pokročilejší výrobní řetězce.
se-kr-transceiver-trigger=Aktivování intergalaktického vysílače vám umožnilo kontaktovat širší galaxii a lokalizovat se v ní. Nyní se se svojí vesmírnou lodí můžete zachránit.
se-kr-catalysed-condensation=Kryonit je používán pro prudké chlazení které umožňuje okolní atmosféru přenést do kapalného skupenství. Avšak ono prudké chlazení způsobuje nežádoucí nečistoty které jsou pak přítomny ve výsledné kapalině, kterou potřeba vyčistit před dalším zpracování.
se-kr-catalysed-electrolysis=Iridium a jeho kysličníky lze použít pro snížení energie potřebné na elektolýzu vody. To umožňuje rychlejší a efektivnější rozdělení vody na její chemické prvky.
se-always-researched=Tato skrytá technologie má efekt kterým se nezatěžujeme zobrazovat.
cargo-landing-pad=Umožní vám doručovat náklad na pojmenovanou přistávací plochu. S postupným výzkumem může také umožnit opětovné navrácení částí rakety.
se-space-simulation-dual=Efektivnější simulace zkombinováním dvou disciplín.
se-space-simulation-triple=Ještě více efektivnější simulace zkombinováním tří disciplín.
se-space-simulation-quad=Nejefektivnější simulace kombinující každou z vědních disciplín. Nemůže být počítána v základních superpočítačích.
se-thruster-suit-2=Vylepšený skafandr se silnějšími tryskami, větším inventářem, a větší mřížkou na vybavení.
se-thruster-suit-3=Vylepšený skafandr se silnějšími tryskami, větším inventářem, a větší mřížkou na vybavení.
se-thruster-suit-4=Vylepšený skafandr se silnějšími tryskami, větším inventářem, a větší mřížkou na vybavení.
effect-transmission=8 slotů pro moduly s 50% přenosovou efektivitou pro maximální sílu 4 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 3 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování. Malý elektrický odběr.
se-unit-capsule=Kapsle která vyšle __1__ __plural_for_parameter_1_{1=přátelskou jednotku|2=přátelské jednotky|3=přátelské jednotky|4=přátelské jednotky|přátelských jednotek}__.
industrial-furnace=Vetší, rychlejší a s více sloty pro moduly. Může být použita na pokročilou matalurgii a tavení, nikoliv však pro vypalování.
kr-intergalactic-transceiver=Za použití mikro černé díry dokáže toto zařízení umožňuje okamžitou komunikaci s jakýmkoliv jiným příjmačem kdekoliv ve vesmíru.
epic-quality=Toto můžete nalézt kdesi ve vaší sluneční soustavě.
legendary-quality=Toto můžete nalézt kdesi v hlubokém vesmíru.

