confirm-extinction-button=[font=default-bold][color=255, 230, 192]Potvrdit vyhlazení nepřátel[/color][/font]\n__1__
confirm-extinction-button-tooltip=Potvrdit že jste vyhaldili všechny nepřátele na __1__ pro snížení hrozbu na __2__%.\nToto umožňuje oříznout povrch bez dalšího rozšiřování nepřátel.
