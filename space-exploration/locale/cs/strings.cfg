interburbulator_fail_easy_1=Ne.
interburbulator_fail_easy_2=Zkus to lépe.
interburbulator_fail_easy_3=Beznadějné.
interburbulator_fail_easy_4=Ani trochu.
interburbulator_fail_easy_5=Myslel sis, že to mohlo fungovat?
interburbulator_fail_easy_6=Špatně.
interburbulator_fail_easy_7=Málo O₂?
