[technology-description]
energy-shield-equipment=Ochranná bublina která se rychle nabíjí ale spotřebovává hodně elektřiny.
energy-shield-mk2-equipment=Ochranná bublina která se rychle nabíjí ale spotřebovává hodně elektřiny.
energy-shield-mk3-equipment=Ochranná bublina která se rychle nabíjí ale spotřebovává hodně elektřiny.
