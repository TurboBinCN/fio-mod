satellite-view-unlocked=[img=item/satellite] Satalit byl vyslán na orbitu a je schopen vidět celou planetu. Nyní jste odemkl [color=cyan][img=virtual-signal/se-remote-view] Navigační Satalit[/color].\nTen bude automaticky skenovat oblast zatímco jste ve Vzdáleném Pohledu.\nVysláním více satalitů bude objeveno více lokací ve vesmíru.
weapons-cache-found=[img=item/satellite] Satalit detekoval [color=cyan]vojenskou skrýš[/color]. __1__
satellite-discovered-platform=[img=item/satellite] [color=cyan]Satalit objevil jakousi orbitující vesmírnou platformu.[/color] Mohou tam být nějaké užitečné věci.\nOtevřte [img=virtual-signal/se-planet-orbit] [color=cyan] Vesmírný Atlas [/color] [__CONTROL__se-universe-explorer__], vyberte __1__ a klikněte na [color=94,182,99]Ukázat povrch[/color] k náhlédnutí pomicí satalitu.\nVyšlete více satalitů pro objevování dalších kosmických těles.
