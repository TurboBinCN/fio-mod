[mod-setting-description]
se-meteor-interval=Základní interval v minutách mezi dopady meteorů. Interval je náhodný v minutách od 1 do této hodnoty.
se-plague-max-runtime-2=Maximální časovač pro biozbraň v minutách. Poté co mor bude pracovat takto dlouho, všechny biologické entity budou zničeny. Toto může odstranit nepřátelské odplatové útoky před tím, než stihnou dorazit. Toto nastavení je určeno pro ušetření UPS, ne aby byla hra jednodušší.
se-planets=Neměňte uprostřed rozehrané hry.
se-planet-size=Neměňte uprostřed rozehrané hry.
se-seed=Neměňte uprostřed rozehrané hry.
se-skip-experimental-warning=Varování na začátku hry se nebude objevovat, a nebudete dostávat aktualizované zprávy.
se-print-meteor-info=Kdy vypsat upozornění na meteory. Upozornění se zároveň vypíše v chatu stejně jako se ukáže upozornění na mapě.
se-print-satellite-discovered-nothing=Když je vyslán satalit, je vám oznámeno co objevil. Toto nastavení vypne upozornění pokud nebylo nic nového nalezeno.
se-space-pipe-capacity=Kapalinová kapacita vesmírných trubek.
se-electric-boiler=Přidá elektrický boiler do hry.
se-deep-space-belt-speed-2=Hlubokovesmírné přepravní pásy jsou zamýšleny jako nejrychlejší pásy ve hře. Pokud máte další módy které jsou rychlejší, můžete zvýšit rychlost hlubokovesmírných pásů aby dosahovala nebo přesahovala onu rychlost.
se-deep-space-belt-black=Recepty na černé transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-deep-space-belt-white=Recepty na bílé transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-deep-space-belt-red=Recepty na červené transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-deep-space-belt-yellow=Recepty na žluté transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-deep-space-belt-green=Recepty na zelené transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-deep-space-belt-cyan=Recepty na tyrkysové transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-deep-space-belt-blue=Recepty na modré transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-deep-space-belt-magenta=Recepty na purpurové transportní pásy, rozdělovače a podpovrchové pásy mohou být vypnuty pro snížení zahlcení UI.
se-never-show-train-gui=Po odemčení vesmírného výtahu či vesmírných lodí se začne v jízdním řádu zobrazovat GUI pro vybírání stanic napříč zónami. Toto nastavní zastaví zobrazování tohoto GUI.
se-show-zone-preview=Nezaškrtávejte, pokud chcete vypnout náhled na zónu v Prohlížeči vesmíru. Pokud máte aktivní nějaký debug overlay, náhledy na zónu mohou snižovat FPS.
se-pylon-charge-points=Nezaškrtávejte k odstranění nabíjecí kapacity konstrukčního pylonu. To pomůže v kontrole chování robotů, ale možná budete muset vymyslet jiný způsob nabíjení robotů po dlouhých cestách.
se-cmes-max-frequency=Maximální interval mezi Výrony Koronální Hmoty (VKH). Hodnota je v hodinách, 0 = vypnuto. První VKH je naskriptovaný na první minutu hry a je převážně neškodný. Druhý je o zhruba 48 hodin opožděný. Každý další následuje po 50% až 100% maximální hodnoty intervalu. Nenulová hodonta se nasatví pro každý další případ; jakmile bylo dáno předpokládaný čas konání, nebude to ovlivněno. Nulové nastavení zruší naplánované všechny VKH, ačkoliv to může zabrat až sekundu aby to mělo účinek.
se-spawn-small-resources=Přidá dodatečná malá naleziště surovin do začínajcí oblasti. Naleziště surovin jsou pohromadě pro snížení času běháním kolem.
se-show-overhead-button-satellite-mode=Zobrazí malé tlačítko velvo nahoře obrazovky pro zapnutí Navigačního Satalitního přenosu.
se-show-overhead-button-interstellar-map=Zobrazí malé tlačítko velvo nahoře obrazovky pro zapnutí Hvězdné mapy.
se-show-overhead-button-universe-explorer=Zobrazí malé tlačítko velvo nahoře obrazovky pro zapnutí Vesmírného Atlasu.
se-show-pin-help-tooltip=Zobrazí rozšířenou nápovědu na tlačítkách připnutí na to jak je použít.
se-scan-search-budget=Skenování satalitem: Počet již odhalených sektorů které mohou být zkontrolovány a přeskočeny během jedné sekundy. Vysoké hodnoty umožňují rychle skenovat skrze již odhalené sektory aby se rychle přešlo k neprozkoumanému okraji.
se-scan-chart-budget=Skenování satalitem: Počet neobjevených sektorů které mohou být odhaleny během jedné sekundy. Nové nároky nebudou vytvořeny pokud jsou předchozí sektory stále generovány.
se-scan-alert-interval=Interval v sekundách mezi upozorněními na skenování povrchu v sekundách. Odhalování povrchů zvyšuje velikost na disku, není tudíž nejlepší nápad nechat jej zapnutý a poté naň zapomenout.
se-scan-max-range=Satalitní skenování: Maximální vzdálenost (v dlaždicích) pro které je skenování povoleno od počátku povrchu před zastavením. Planety nebudou nikdy skenovány za jejich okraj a maximální velikost planety je 10000 dlaždic. Hodnoty vyšší než 10000 se uplatní pouze ve vemírných zónách
se-core-seam-map-tags=Když je zapnuto, pokaždé co je odhalena další průrva k jádru, bude automaticky označena na mapě štítkem.
se-lifesupport-hud-visibility=Vyberte kdy se bude zobrazovat Rozhraní Podpory Života
se-supercharger-individual-charge-rate=Nastaví rychlost nabíjení každého jednoho nabíjecího portu supernabíječe v MW (novlivňuje maximální nabíjecí rychlost). Minimální (základní) hodnota je 90 MW, dostatek na to aby nabil vanila robota během jednoho tiku, maximální pak 1000 MW (1GW).
se-dropdowns-hide-low-priority-zones=Skryje zóny nízké priority z nabídky pro vybírání destinací. Pokud je zapnuto, pouze zóny s vyšší nebo stejnou prioritou jako je v nastavení "Hranice priority" níže. Priority zóny mohou být upravovány ve Vesmírném Atlasu.
se-dropdowns-priority-threshold=Hraniční hodnota, pod kterou se zóny nebudou zobrazovat v nabídce pro výběr destinací. Nemá žádný efekt pokud je "Skrýt zóny nízké priority z nabídky" vypnuto.
se-add-icon-labels=Některé recepty a ikony předmětů je obtížné od sebe rozlišit. Toto nastavení přidá čísla nebo písmeno k ikoně pro snadnější rozlišení. Například pozorovacím snímkům a úrovním vědeckých vhledů.
se-delivery-cannon-artillery-timeout=Artilerní požadavek pro zbraňový dodávkový kanón vyprší pokud za tolik sekund není vyplněn.
se-use-underground-collision-masks=Když je povoleno, [entity=se-space-underground-belt] a [entity=se-space-pipe-to-ground] nemohou překračovat prázdný prostor.
se-use-new-space-rail-graphics=Dočasné nastavení, mělo by být vypnuté pouze pokud hrajete s Vyvýšenými kolejemi.
se-quality-mod-support=[font=default-bold]Space Exploration + Kvalita nebyly spolu ještě vyváženy![/font]\nStroje a majáky vyhazují moduly kvality jiné než normální.\nCokoliv propojené s kvalitou se může změnit z jedné verze na druhou.
se-space-age-mod-support=[font=default-bold]Space Exploration + Space Age nebyly spolu ještě vyváženy![/font]\nKompatibilita z třetí strany je umožnitelná skrze mod portál.\nCokoliv propojené s kvalitou se může změnit z jedné verze na druhou.
robot-attrition-factor=Násobek šance robotů na pád.\nPoznámka: V Space Exploration, tento násobitel účinkuje 100% na ovlivnění robotů na vašem domovském světě a 50% ovlivňuje v ostatních zónách.
kr-stack-size=Zvýšit velikost stohu mnoha vanila a K2 předmětů. (Základ: Žádná změna)

