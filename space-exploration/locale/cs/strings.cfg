confirm-extinction-success=Potvrzujete že vaše dobývání __1__ je hotové. Žádní další nepřátelé se neobjeví na tomto povrchu. [color=green]Hrozba byla snížana na 0%.[/color]
confirm-extinction-success-biter-meteors=Potvrzujete že vaše povrch __1__ je čist od nepřátel. Žádní další nepřátelé se neobjeví na tomto povrchu, ale hrozba je odhadována na 1% kvůli Meteorům Kousačů. [color=green]Hrozba byla snížana na 1%.[/color]
