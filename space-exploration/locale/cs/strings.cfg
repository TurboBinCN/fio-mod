se-wide-beacon=15 slotů pro moduly s 50% přenosovou efektivitou pro maximální sílu 7,5 modulů. Vysílá tento efekt modulů na přátelské entity v okruhu 14 dlaždic. Více majáků ovlivňujících stejnou výrobnu ji přetíží a omezí její fungování.
